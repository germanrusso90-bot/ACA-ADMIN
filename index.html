<style>

.btn-add{background:var(--y);color:var(--pd);border:none;border-radius:6px;font-size:12px;font-weight:700;padding:7px 12px;cursor:pointer;}
.varios-rows{display:flex;flex-direction:column;gap:10px;}

.vrow select{padding:7px 9px;border:1px solid var(--b);border-radius:6px;font-size:13px;background:#fff;}

.resumen-table{width:100%;border-collapse:collapse;font-size:14px;}
.resumen-table td,.resumen-table th{padding:9px 6px;border-bottom:1px solid var(--b);text-align:left;}
.resumen-table th{color:var(--m2);font-size:12px;text-transform:uppercase;}
.resumen-table .tr-total td{font-weight:800;color:var(--pd);font-size:15px;border-bottom:none;border-top:2px solid var(--p);}
.importe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:500px){.importe-grid{grid-template-columns:1fr;}.calc-grid{grid-template-columns:1fr;}}
.ifield{display:flex;flex-direction:column;gap:4px;}

.result-box{background:var(--p);color:#fff;border-radius:10px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.rl{font-size:13px;opacity:.85;}

.divider{border:none;border-top:1px solid var(--b);margin:14px 0;}
.btn-save{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--g);color:#fff;}
.btn-save:hover{filter:brightness(.92);}
.btn-cancel{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--b);background:#fff;color:var(--m2);}

/* TOAST/LOADING */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pd);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:300;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@keyframes spin{to{transform:rotate(360deg);}}
</style>

<script>
// ── USUARIOS ──────────────────────────────────────────────────
const USERS={
  admin:  {password:'ACAadmin2026',   name:'Administrador',               role:'admin'},
  grusso: {password:'Cipolletti2026', name:'Germán Russo — US Cipolletti',role:'empleado'}
};

// ── ÍTEMS FIJOS ───────────────────────────────────────────────
const US_ITEMS=[
  {key:'energia', label:'Energía Eléctrica', icon:'⚡', title:'ENERGÍA ELÉCTRICA ESTACIÓN (100% DEDUCIDO IVA)'},
  {key:'aguas',   label:'Aguas Rionegrinas',  icon:'💧', title:'AGUAS RIONEGRINAS'},
  {key:'dpa',     label:'DPA',                icon:'🌊', title:'DPA'},
  {key:'telefono',label:'Teléfono',           icon:'📞', title:'TELÉFONO'},
  {key:'canon',   label:'Canon Servicios',    icon:'📄', title:'CANON SERVICIOS'}
];
const VARIOS_ITEMS=[
  {key:'serviclub',     label:'Serviclub'},
  {key:'cosmeticaFull', label:'Cosmética Full'},
  {key:'boxesFiltros',  label:'Boxes Filtros'},
  {key:'boxes20',       label:'Boxes 20%'},
  {key:'acaIncognito',  label:'ACA Incógnito'}
];
const DOC_TYPES=['Factura','Nota de Crédito','Nota de Débito'];
const MAX_FILE=3.5*1024*1024;

// ── STORAGE ───────────────────────────────────────────────────
// ── FIREBASE ──────────────────────────────────────────────────
const firebaseConfig={apiKey:"AIzaSyCw8tsg_WaL-Fo2YJGoEgIMpF6Ed6Wcijc",authDomain:"aca-admin.firebaseapp.com",projectId:"aca-admin",storageBucket:"aca-admin.firebasestorage.app",messagingSenderId:"365461639287",appId:"1:365461639287:web:814f7250fdc5ceedd8b672"};
let _db=null;
async function getDB(){
  if(_db)return _db;
  const {initializeApp,getApps}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {getFirestore,doc,getDoc,setDoc,deleteDoc}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const app=getApps().length?getApps()[0]:initializeApp(firebaseConfig);
  _db={fs:getFirestore(app),doc,getDoc,setDoc,deleteDoc};
  return _db;
}
// Cache en memoria para minimizar lecturas a Firestore
const _cache={};
async function sGet(k){
  if(_cache[k]!==undefined)return _cache[k];
  try{
    const db=await getDB();
    const ref=db.doc(db.fs,'kv',encodeKey(k));
    const snap=await db.getDoc(ref);
    const val=snap.exists()?snap.data().v:null;
    _cache[k]=val;
    return val;
  }catch(e){console.warn('sGet error',k,e);return localStorage.getItem(k);}
}
async function sSet(k,v){
  _cache[k]=v;
  try{
    const db=await getDB();
    await db.setDoc(db.doc(db.fs,'kv',encodeKey(k)),{v,k,updatedAt:Date.now()});
  }catch(e){console.warn('sSet error',k,e);localStorage.setItem(k,v);}
  return true;
}
async function sDel(k){
  delete _cache[k];
  try{
    const db=await getDB();
    await db.deleteDoc(db.doc(db.fs,'kv',encodeKey(k)));
  }catch(e){console.warn('sDel error',k,e);localStorage.removeItem(k);}
}
function encodeKey(k){
  // Firestore no acepta / en IDs de documento
  return k.replace(/\//g,'__').replace(/:/g,'--');
}

// ── ESTADO ────────────────────────────────────────────────────
let CU=null,CP=monthStr(),PD=null,AT='us',APS=[],stimer=null;
let usView=null; // null=grilla, key=vista excel del ítem

function monthStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function periodLabel(p){
  if(!p)return '';
  const [y,m]=p.split('-');
  const mnames=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return mnames[parseInt(m)-1]+'-'+String(y).slice(2);
}

function defPD(){
  const us={};
  US_ITEMS.forEach(it=>{us[it.key]=[];});
  const varios={};
  VARIOS_ITEMS.forEach(it=>{varios[it.key]=[];});
  return{us,full:{ventas:null,nroFacturaACA:'',facturaACA:null,fechaCancelacion:'',comprobanteTransferencia:null,interesMensual:'',diasAtrasados:'',locked:false},hotel:{telefono:{importe:null,iva:null,percepciones:null,intereses:null,nroFacturaACA:'',fecha:'',facturaServicio:null},telHistory:[],canon:{locked:false},canonAlojamiento:null},varios,cancelaciones:[]};
}
function mergeDef(data){
  const def=defPD();
  if(!data.us)data.us={};
  US_ITEMS.forEach(it=>{if(!Array.isArray(data.us[it.key]))data.us[it.key]=def.us[it.key];});
  if(!data.varios)data.varios={};
  if(!data.cancelaciones)data.cancelaciones=[];
  VARIOS_ITEMS.forEach(it=>{if(!data.varios[it.key])data.varios[it.key]=def.varios[it.key];});
  if(!data.full)data.full=def.full;
  if(!data.hotel)data.hotel=def.hotel;
  if(!data.hotel.telefono)data.hotel.telefono=def.hotel.telefono;
  if(!data.hotel.telHistory)data.hotel.telHistory=[];
  if(!data.hotel.canonHistory)data.hotel.canonHistory=[];
  if(!data.hotel.canon)data.hotel.canon={locked:false};
  if(data.hotel.canonAlojamiento===undefined)data.hotel.canonAlojamiento=null;
  return data;
}

// ── HELPERS ───────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=(s===null||s===undefined)?'':String(s);return d.innerHTML;}
function fmt(n){if(n===null||n===undefined||isNaN(n))return '—';return new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);}
function fmtM(n){return n!==null&&n!==undefined&&!isNaN(n)?'$ '+fmt(n):'—';}
function pN(v){const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n;}
function calcRec(row){
  const i=row.importe||0,v=row.iva||0,p=row.percepciones||0,it=row.intereses||0;
  if(row.importe===null&&row.iva===null&&row.percepciones===null&&row.intereses===null)return null;
  return i-v-p-it;
}
function rowDone(row){return !!(row.nroFacturaACA&&row.fecha&&row.importe);}
function usCurrentPeriod(usKey){
  // Canon y Aguas = mes actual (CP); resto = mes anterior
  return (usKey==='canon'||usKey==='aguas')?CP:prevMonth(CP);
}
function isUSDone(usKey){
  const rows=PD.us[usKey];
  const period=usCurrentPeriod(usKey);
  return rows.some(r=>r.period===period&&r.locked===true);
}
function readDU(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});}

function showLoad(show){
  let el=document.getElementById('loading-overlay');

// ── DIAGNÓSTICO FIREBASE ─────────────────────────────────────
async function diagFirebase(){
  try{
    const db=await getDB();
    const {collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap=await getDocs(collection(db.fs,'kv'));
    const keys=[];
    snap.forEach(d=>keys.push({id:d.id,k:d.data().k,size:JSON.stringify(d.data().v||'').length}));
    keys.sort((a,b)=>a.id.localeCompare(b.id));
    const msg=keys.map(k=>`${k.k||k.id} (${k.size} chars)`).join('\n');
    alert('Claves en Firebase ('+keys.length+'):\n\n'+msg);
  }catch(e){alert('Error: '+e.message);}
}

// ── EXCEL VENTAS ─────────────────────────────────────────────
function parseVentas(ab){
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

  // Detectar columnas buscando la fila de encabezados
  let colSec=1, colDet=3, colTotal=11;
  for(let i=0;i<Math.min(10,rows.length);i++){
    const r=rows[i];
    for(let j=0;j<r.length;j++){
      const v=String(r[j]||'').toLowerCase().trim();
      if(v==='sec'||v==='sector') colSec=j;
      if(v.includes('detalle')) colDet=j;
      if(v==='tv8555'||v.includes('total')||v==='importe') colTotal=j;
    }
  }

  let tot=0,cig=0,found=false;
  for(const row of rows){
    const sec=row[colSec];
    const det=row[colDet];
    const total=row[colTotal];
    // Sectores 2 y 21 = Full
    const secNum=typeof sec==='number'?sec:parseFloat(sec);
    if((secNum===2||secNum===21)&&typeof total==='number'&&total>0){
      tot+=total; found=true;
      // Cigarrillos y tabaco
      if(typeof det==='string'&&det.trim()==='Cigarrillos') cig+=total;
    }
  }
  if(!found)return null;
  return{totalVentas:tot,cigarrillos:cig,base:tot-cig,recupero12:(tot-cig)*0.12};
}
// Abrir Excel en visor inline (sin descarga automática)
function openExcelViewer(f){
  try{
    const arr=Uint8Array.from(atob(f.dataUrl.split(',')[1]),c=>c.charCodeAt(0));
    const wb=XLSX.read(arr,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const htmlTable=XLSX.utils.sheet_to_html(ws,{editable:false});
    const wrap=document.createElement('div');
    wrap.className='file-viewer-wrap';wrap.id='fv-wrap';
    // Construir sin template literals anidados para evitar conflicto con el html externo
    const bar=document.createElement('div');
    bar.className='file-viewer-bar';
    const nameSpan=document.createElement('span');
    nameSpan.textContent='📊 '+f.fileName;
    const btnWrap=document.createElement('div');
    btnWrap.style.cssText='display:flex;gap:8px;align-items:center;';
    const dlBtn=document.createElement('button');
    dlBtn.id='fv-dl';dlBtn.textContent='⬇ Descargar';
    dlBtn.style.cssText='background:var(--y);color:var(--pd);border:none;border-radius:6px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;';
    const closeBtn=document.createElement('button');
    closeBtn.id='fv-close';closeBtn.textContent='✕';closeBtn.title='Cerrar';
    closeBtn.style.cssText='background:none;border:none;color:#fff;font-size:22px;cursor:pointer;';
    btnWrap.appendChild(dlBtn);btnWrap.appendChild(closeBtn);
    bar.appendChild(nameSpan);bar.appendChild(btnWrap);
    const contentDiv=document.createElement('div');
    contentDiv.className='file-viewer-content';
    contentDiv.style.cssText='overflow:auto;background:#fff;';
    const inner=document.createElement('div');
    inner.style.cssText='padding:12px;font-size:12px;font-family:monospace;';
    inner.innerHTML=htmlTable;
    contentDiv.appendChild(inner);
    wrap.appendChild(bar);wrap.appendChild(contentDiv);
    document.body.appendChild(wrap);
    closeBtn.addEventListener('click',()=>wrap.remove());
    dlBtn.addEventListener('click',()=>{
      const a=document.createElement('a');a.href=f.dataUrl;a.download=f.fileName;
      document.body.appendChild(a);a.click();a.remove();
    });
    wrap.addEventListener('click',e=>{if(e.target===wrap)wrap.remove();});
  }catch(e){alert('No se pudo mostrar el archivo: '+e.message);}
}

function attachLogin(){
  document.getElementById('lf').addEventListener('submit',async e=>{
    e.preventDefault();
    const u=document.getElementById('lu').value.trim(),p=document.getElementById('lp').value;
    const user=USERS[u];
    if(user&&user.password===p){
      CU={username:u,name:user.name,role:user.role};
      showLoad(true);
      const raw=await sGet('periodos',true);
      APS=raw?JSON.parse(raw):[];

      // Detectar si hay datos guardados del mes anterior que aún no tienen su propia clave
      // (cuando el mes cambió y los datos quedaron solo en data:CP_viejo)
      const prevCP=prevMonth(CP);
      const prevRaw=await sGet('data:'+prevCP,true);
      if(!prevRaw){
        // No hay datos guardados para el mes anterior — puede ser que estén en una clave vieja
        // Buscar en APS si hay un período previo con datos
        const ultimoPeriodoGuardado=APS.filter(p2=>p2<CP).sort().pop();
        if(ultimoPeriodoGuardado&&ultimoPeriodoGuardado!==prevCP){
          // Hay un período guardado distinto — dejar que histData lo encuentre normalmente
        }
      }

      if(!APS.includes(CP)){APS.push(CP);APS.sort();await sSet('periodos',JSON.stringify(APS),true);}
      await loadPeriod(CP);
      await loadYER();
      showLoad(false);AT='us';usView=null;render();
    }else document.getElementById('le').textContent='Usuario o contraseña incorrectos';
  });
}

function renderSearchBar(inputId, placeholder, totalCount){
  return `<div class="search-bar">
    <span class="s-icon">🔍</span>
    <input id="${inputId}" type="text" placeholder="${placeholder}" autocomplete="off">
    <span class="s-count" id="${inputId}-count">${totalCount} registros</span>
    <button class="s-clear" id="${inputId}-clear" title="Limpiar">✕</button>
  </div>`;
}
function activateSearch(inputId, rowSelector, countId){
  const inp=document.getElementById(inputId);
  const cnt=document.getElementById(countId||inputId+'-count');
  if(!inp)return;
  const total=document.querySelectorAll(rowSelector).length;
  const filter=()=>{
    const q=inp.value.toLowerCase().trim();
    let vis=0;
    document.querySelectorAll(rowSelector).forEach(tr=>{
      const show=!q||tr.textContent.toLowerCase().includes(q);
      tr.style.display=show?'':'none';
      if(show)vis++;
    });
    if(cnt)cnt.textContent=vis+' / '+total+' registros';
  };
  inp.addEventListener('input',filter);
  const clr=document.getElementById(inputId+'-clear');
  if(clr)clr.addEventListener('click',()=>{ inp.value=''; filter(); inp.focus(); });
}

// ── TAB: UNIDAD SERVICIAL — grilla ───────────────────────────
function renderUSGrid(){
  const el=document.getElementById('tab-content');
  let html=`<p style="font-size:13px;color:var(--m2);padding:4px 0 12px;">Hacé click en un ítem para ver el historial y cargar el recupero del mes.</p>
  <div class="us-grid">`;
  US_ITEMS.forEach(it=>{
    const done=isUSDone(it.key);
    const period=usCurrentPeriod(it.key);
    const rows=PD.us[it.key];
    const curr=rows.find(r=>r.period===period);
    const dateLabel=curr&&curr.fecha?curr.fecha:(curr&&curr.fechaCancelacion?curr.fechaCancelacion:'Sin cargar');
    const periodLabel2=periodLabel(period);
    html+=`<div class="us-tile ${done?'done':'pending'}" data-open-us="${it.key}">
      <div class="tile-icon">${it.icon}</div>
      <div class="tile-title">${esc(it.label)}</div>
      <div class="tile-period">${done?dateLabel:periodLabel2+' — Pendiente'}</div>
      <span class="tile-badge ${done?'done':'pending'}">${done?'✓ Realizado':'Pendiente'}</span>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
  el.querySelectorAll('[data-open-us]').forEach(c=>{
    c.addEventListener('click',()=>{usView=c.getAttribute('data-open-us');renderTab();});
  });
}

function ensureDemoData(usKey){
  const existingByPeriod={};
  PD.us[usKey].forEach(r=>{ existingByPeriod[r.period]=r; });
  const realRows=REAL_DATA[usKey]||[];
  const newRows=[];
  const realPeriods=new Set(realRows.map(r=>r.period));
  for(const row of realRows){
    const existing=existingByPeriod[row.period];
    if(existing){
      // Si el usuario desbloqueó la fila (locked=false) o la modificó, preservar sus datos
      const userUnlocked=existing.locked===false&&row.locked===true;
      const userModified=existing.nroFacturaACA&&existing.nroFacturaACA!==row.nroFacturaACA
        ||existing.importe!=null&&existing.importe!==row.importe
        ||existing.facturaServicio!=null
        ||existing.precioSuper!=null;
      if(userUnlocked||userModified){
        newRows.push(existing);
      } else {
        newRows.push({...row,facturaServicio:existing.facturaServicio||null});
      }
    } else {
      newRows.push({...row});
    }
  }
  for(const [period,row] of Object.entries(existingByPeriod)){
    if(!realPeriods.has(period)) newRows.push(row);
  }
  PD.us[usKey]=newRows;
}

function prevMonth(p){
  const [y,m]=p.split('-').map(Number);
  return m===1?(y-1)+'-12':y+'-'+String(m-1).padStart(2,'0');
}

      const key=btn.getAttribute('data-save-us');
      const period=btn.getAttribute('data-save-period');
      const trEl=el.querySelector(`tr[data-row-period="${period}"]`);
      if(!trEl)return;
      const g=f=>{const i=trEl.querySelector(`input[data-field="${f}"]`);return i?i.value.trim():'';};
      const imp=pN(g('importe')),iva=pN(g('iva')),per=pN(g('percepciones')),int=pN(g('intereses'));
      const nro=g('nroFacturaACA'),fecha=g('fecha');
      let idx=PD.us[key].findIndex(r=>r.period===period);
      if(idx===-1){PD.us[key].push({period});idx=PD.us[key].length-1;}
      const rObj=PD.us[key][idx];
      rObj.importe=imp;rObj.iva=iva;rObj.percepciones=per;rObj.intereses=int;
      rObj.nroFacturaACA=nro;rObj.fecha=fecha;
      rObj.locked=true;
      showLoad(true);await saveP();showLoad(false);
      toast('Guardado ✓');
      renderTab();
    });
  });

  // ── Editar (desbloquea la fila) — excluye canon que tiene handler propio ──
  el.querySelectorAll('[data-edit-us]:not([data-edit-us="canon"])').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const key=btn.getAttribute('data-edit-us');
      const period=btn.getAttribute('data-edit-period');
      let idx=PD.us[key].findIndex(r=>r.period===period);
      if(idx===-1)return;
      PD.us[key][idx].locked=false;
      await saveP();
      renderTab();
    });
  });

  // Upload factura servicio
  el.querySelectorAll('[data-upload-us]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const key=inp.getAttribute('data-upload-us');
      const period=inp.getAttribute('data-upload-period');
      showLoad(true);
      try{
        const dataUrl=await readDU(file);
        const fileKey=`us:${key}:${period}:fs`;
        await sSet('file:'+fileKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl}),true);
        let rowIdx=PD.us[key].findIndex(r=>r.period===period);
        if(rowIdx===-1){PD.us[key].push({period});rowIdx=PD.us[key].length-1;}
        PD.us[key][rowIdx].facturaServicio={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        await saveP();toast('Factura subida ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // Eliminar factura
  el.querySelectorAll('[data-del-fs]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar factura?'))return;
      const key=btn.getAttribute('data-del-fs');
      const period=btn.getAttribute('data-del-period');
      showLoad(true);
      const fileKey=`us:${key}:${period}:fs`;
      await sDel('file:'+fileKey,true);
      const rowIdx=PD.us[key].findIndex(r=>r.period===period);
      if(rowIdx!==-1)PD.us[key][rowIdx].facturaServicio=null;
      await saveP();showLoad(false);toast('Eliminada');renderTab();
    });
  });

  // Ver archivo
  el.querySelectorAll('[data-ver-file]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const fk=btn.getAttribute('data-ver-file');
      showLoad(true);
      const raw=await sGet('file:'+fk,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      const f=JSON.parse(raw);
      openFileViewer(f);
    });
  });
}

// ── VISOR DE ARCHIVO INLINE ───────────────────────────────────
function openFileViewer(f){
  const isImg=f.type&&f.type.startsWith('image/');
  const wrap=document.createElement('div');
  wrap.className='file-viewer-wrap';
  wrap.id='fv-wrap';
  const content=isImg
    ?`<img src="${f.dataUrl}" alt="${esc(f.fileName)}" style="max-width:100%;max-height:80vh;display:block;margin:auto;object-fit:contain;">`
    :`<iframe src="${f.dataUrl}" title="${esc(f.fileName)}"></iframe>`;
  wrap.innerHTML=`
    <div class="file-viewer-bar">
      <span>📎 ${esc(f.fileName)}</span>
      <button id="fv-close" title="Cerrar">✕</button>
    </div>
    <div class="file-viewer-content">${content}</div>`;
  document.body.appendChild(wrap);
  document.getElementById('fv-close').addEventListener('click',()=>wrap.remove());
  wrap.addEventListener('click',e=>{if(e.target===wrap)wrap.remove();});
}

function ensureFullHistory(){
  if(!PD.fullHistory) PD.fullHistory=[];
  const existingPeriods=new Set(PD.fullHistory.map(r=>r.period));
  for(const row of REAL_DATA_FULL){
    if(!existingPeriods.has(row.period)) PD.fullHistory.push({...row});
  }
}

function calcIntereses(f){
  const tasa=pN(f.interesMensual);
  const diasAtr=pN(f.diasAtrasados);
  if(!tasa||!diasAtr||!f.ventas)return null;
  const [y,m]=CP.split('-').map(Number);
  const diasMes=new Date(y,m,0).getDate();
  const tasaDiaria=tasa/diasMes;
  const montoInt=f.ventas.recupero12*(tasaDiaria/100)*diasAtr;
  return{tasaDiaria,montoInt};
}

function attachHotel(){
  const el=document.getElementById('tab-content');

  // ── CANON handlers ────────────────────────────────────────────
  if(!PD.hotel.canonHistory) PD.hotel.canonHistory=[];

  // Extraer N° y total de un PDF de ACA usando pdf.js
  async function extractCanonPDF(file){
    try{
      // Usar pdf.js sin worker para evitar problemas de seguridad en archivos locales
      const pdfjsLib=window['pdfjs-dist/build/pdf'];
      if(!pdfjsLib){throw new Error('pdf.js no disponible');}
      pdfjsLib.GlobalWorkerOptions.workerSrc='';
      const ab=await file.arrayBuffer();
      const loadingTask=pdfjsLib.getDocument({data:new Uint8Array(ab),disableWorker:true,useSystemFonts:true});
      const pdf=await loadingTask.promise;
      let text='';
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        text+=content.items.map(it=>it.str).join(' ')+'\n';
      }
      // N° Factura: "FACTURA N° 0650 00022038"
      const factMatch=text.match(/FACTURA\s+N[°o]?\s*(\d{4})\s+(\d{8})/i);
      // N° NC: "N.CREDITO N° 0650 00007679"
      const ncMatch=text.match(/N\.?CREDITO\s+N[°o]?\s*(\d{4})\s+(\d{8})/i);
      // TOTAL: buscar el último "TOTAL 9.504.132,01"
      const totalMatches=[...text.matchAll(/TOTAL\s+([\d.]+,\d{2})/gi)];
      const lastTotal=totalMatches.length?totalMatches[totalMatches.length-1][1]:null;
      const total=lastTotal?parseFloat(lastTotal.replace(/\./g,'').replace(',','.')):null;
      return{nroFactura:factMatch?factMatch[1]+'-'+factMatch[2]:null,nroNC:ncMatch?ncMatch[1]+'-'+ncMatch[2]:null,total};
    }catch(err){
      console.warn('PDF.js falló:',err.message);
      return{nroFactura:null,nroNC:null,total:null};
    }
  }

  // Upload archivos del canon por fila
  el.querySelectorAll('[data-canon-upload-row]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0]; if(!file) return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const slotKey=inp.getAttribute('data-canon-upload-row');
      const period=inp.getAttribute('data-canon-period');
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+slotKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        let row=PD.hotel.canonHistory.find(r=>r.period===period);
        if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
        const meta={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        if(slotKey.endsWith(':fact')){
          row.facturaACA=meta;
          const ex=await extractCanonPDF(file);
          if(ex.nroFactura)row.factNro=ex.nroFactura;
          if(ex.total)row.factTotal=ex.total;
          toast('Factura cargada ✓');
        } else if(slotKey.endsWith(':nc')){
          row.notaCredito=meta;
          const ex=await extractCanonPDF(file);
          if(ex.nroNC)row.ncNro=ex.nroNC;
          if(ex.total)row.ncTotal=ex.total;
          toast('Nota de crédito cargada ✓');
        } else if(slotKey.endsWith(':transf')){
          row.transf=meta;
          toast('Comprobante cargado ✓');
        }
        await saveP();
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // Recálculo live de transferencia al escribir montos
  el.querySelectorAll('.canon-recalc').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.getAttribute('data-canon-period');
      const ft=parseFloat(el.querySelector('#canon-fact-total-'+period)?.value)||0;
      const nc=parseFloat(el.querySelector('#canon-nc-total-'+period)?.value)||0;
      const disp=document.getElementById('canon-transf-display-'+period);
      if(disp) disp.textContent=ft>0?'$ '+fmtArg(ft-nc):'—';
    });
  });

  // Guardar fila canon — lee campos manuales
  el.querySelectorAll('[data-canon-save]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-save');
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      // Leer campos manuales
      row.factNro  = el.querySelector('#canon-fact-nro-'+period)?.value.trim()||row.factNro||'';
      row.factTotal= parseFloat(el.querySelector('#canon-fact-total-'+period)?.value)||row.factTotal||null;
      row.ncNro    = el.querySelector('#canon-nc-nro-'+period)?.value.trim()||row.ncNro||'';
      row.ncTotal  = parseFloat(el.querySelector('#canon-nc-total-'+period)?.value)||row.ncTotal||null;
      row.nroRecibo= el.querySelector('#canon-nro-'+period)?.value.trim()||'';
      row.locked=true;
      showLoad(true);await saveP();showLoad(false);toast('Canon guardado ✓');renderTab();
    });
  });

  // Editar fila canon
  el.querySelectorAll('[data-canon-edit]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-edit');
      const row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(row){row.locked=false;await saveP();renderTab();}
    });
  });

  // Eliminar fila completa del canon
  el.querySelectorAll('[data-canon-row-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-row-del');
      if(!confirm('¿Eliminar todos los datos del canon de '+periodLabel(period)+'?'))return;
      showLoad(true);
      await sDel('file:canon:'+period+':fact',true);
      await sDel('file:canon:'+period+':nc',true);
      await sDel('file:canon:'+period+':transf',true);
      PD.hotel.canonHistory=PD.hotel.canonHistory.filter(r=>r.period!==period);
      await saveP();showLoad(false);toast('Eliminado');renderTab();
    });
  });

  // Eliminar archivo canon
  el.querySelectorAll('[data-canon-file-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar este archivo?'))return;
      const slotKey=btn.getAttribute('data-canon-file-del');
      const period=btn.getAttribute('data-canon-period');
      showLoad(true);
      await sDel('file:'+slotKey,true);
      const row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(row){
        if(slotKey.endsWith(':fact')){row.facturaACA=null;row.factNro='';row.factTotal=null;}
        else if(slotKey.endsWith(':nc')){row.notaCredito=null;row.ncNro='';row.ncTotal=null;}
        else if(slotKey.endsWith(':transf')){row.transf=null;}
      }
      await saveP();showLoad(false);renderTab();
    });
  });

  // ── TELÉFONO handlers ─────────────────────────────────────────
  // Live recalc
  el.querySelectorAll('[data-tel-f]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.getAttribute('data-tel-p');
      const field=inp.getAttribute('data-tel-f');
      const row=PD.hotel.telHistory.find(r=>r.period===period);
      if(row){
        row[field]=inp.type==='number'?pN(inp.value):inp.value;
        const rec=calcRec(row);
        const td=document.getElementById('tel-rec-'+period);
        if(td)td.textContent=rec!==null?'$ '+fmt(rec):'—';
        saveD();
      }
    });
  });

  // Guardar fila teléfono
  el.querySelectorAll('[data-tel-save]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-tel-save');
      let row=PD.hotel.telHistory.find(r=>r.period===period);
      if(!row){row={period};PD.hotel.telHistory.push(row);}
      const tr=el.querySelector(`tr[data-tel-row="${period}"]`);
      if(tr){
        tr.querySelectorAll('[data-tel-f]').forEach(inp=>{
          const f=inp.getAttribute('data-tel-f');
          row[f]=inp.type==='number'?pN(inp.value):inp.value;
        });
      }
      row.locked=true;
      showLoad(true);await saveP();showLoad(false);toast('Guardado ✓');renderTab();
    });
  });

  // Editar fila teléfono
  el.querySelectorAll('[data-tel-edit]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-tel-edit');
      const row=PD.hotel.telHistory.find(r=>r.period===period);
      if(row){row.locked=false;await saveP();renderTab();}
    });
  });

  // Upload factura teléfono
  el.querySelectorAll('[data-tel-upload]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande');return;}
      const period=inp.getAttribute('data-tel-upload');
      const fileKey=`hotel.tel:${period}:fs`;
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+fileKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        let row=PD.hotel.telHistory.find(r=>r.period===period);
        if(!row){row={period};PD.hotel.telHistory.push(row);}
        row.facturaServicio={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        await saveP();toast('Factura subida ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // Eliminar factura teléfono
  el.querySelectorAll('[data-tel-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar factura?'))return;
      const period=btn.getAttribute('data-tel-del');
      showLoad(true);
      await sDel('file:hotel.tel:'+period+':fs',true);
      const row=PD.hotel.telHistory.find(r=>r.period===period);
      if(row)row.facturaServicio=null;
      await saveP();showLoad(false);toast('Eliminada');renderTab();
    });
  });

  // Ver factura teléfono
  // ── Guardar inputs del canon en tiempo real (sin renderTab) ──
  el.querySelectorAll('[id^="canon-fact-nro-"],[id^="canon-fact-total-"],[id^="canon-nc-nro-"],[id^="canon-nc-total-"],[id^="canon-nro-"]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.id.split('-').pop();
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      if(inp.id.startsWith('canon-fact-nro-')) row.factNro=inp.value.trim();
      else if(inp.id.startsWith('canon-fact-total-')){ row.factTotal=parseFloat(inp.value)||null; }
      else if(inp.id.startsWith('canon-nc-nro-')) row.ncNro=inp.value.trim();
      else if(inp.id.startsWith('canon-nc-total-')){ row.ncTotal=parseFloat(inp.value)||null; }
      else if(inp.id.startsWith('canon-nro-')) row.nroRecibo=inp.value.trim();
      // Recalcular transferencia en tiempo real
      if(inp.id.startsWith('canon-fact-total-')||inp.id.startsWith('canon-nc-total-')){
        const ft=row.factTotal||0, nc=row.ncTotal||0;
        const disp=document.getElementById('canon-transf-display-'+period);
        if(disp) disp.textContent=ft>0?'$ '+fmtArg(ft-nc):'—';
      }
      saveD(); // guardar sin renderTab
    });
  });

  // Búsqueda en tabla teléfono
  activateSearch('hotel-tel-search','table.ex tbody tr[data-tel-row]');

  // Handlers genéricos de archivos (canon)
  attachGenericFiles();
}

async function loadHist(){
  const body=document.getElementById('hist-body');
  if(!body)return;
  const rows=[];
  for(const p of [...APS].sort((a,b)=>b.localeCompare(a))){
    const raw=await sGet('data:'+p,true);
    if(!raw)continue;
    const d=mergeDef(JSON.parse(raw));
    const usDone=US_ITEMS.filter(it=>d.us[it.key].some(r=>r.period===p&&rowDone(r))).length;
    const fullM=(d.full&&d.full.ventas)?d.full.ventas.recupero12:null;
    rows.push({p,usDone,fullM});
  }
  body.innerHTML=rows.length
    ?`<table class="resumen-table"><tr><th>Período</th><th>US</th><th>Full</th></tr>`+
      rows.map(r=>`<tr><td>${r.p}</td><td>${r.usDone}/${US_ITEMS.length}</td><td>${r.fullM!=null?'$ '+fmt(r.fullM):'—'}</td></tr>`).join('')+`</table>`
    :'<p style="color:var(--m2)">Sin datos todavía.</p>';
}

  }

}

function renderTab(){
  const el=document.getElementById('tab-content');
  if(AT==='us'){
    if(usView){renderUSExcel(usView);}
    else{renderUSGrid();}
    return;
  }
  switch(AT){
    case 'full':   el.innerHTML=renderFull();attachFull();break;
    case 'hotel':  el.innerHTML=renderHotel();attachHotel();break;
    case 'yer':    {
      const _vl=YER._viewingLiq, _bl=YER._backup, _el=YER._editingLiq;
      loadYER().then(()=>{
        // Restaurar flags de estado (no se persisten en storage)
        if(_vl!=null) YER._viewingLiq=_vl;
        if(_bl!=null) YER._backup=_bl;
        if(_el!=null) YER._editingLiq=_el;
        el.innerHTML=renderYER();
        attachYER();
      });break;
    }
    case 'cancel': el.innerHTML=renderCancel();attachCancel();break;
    case 'varios': el.innerHTML=renderVarios();attachVarios();break;
    case 'resumen':el.innerHTML=renderResumen();loadHist();break;
  }
  attachGenericFiles();
}

// ── GENERIC FILE HANDLERS ─────────────────────────────────────
function attachGenericFiles(){
  const el=document.getElementById('tab-content');
  el.querySelectorAll('[data-upload]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const sid=inp.getAttribute('data-upload');
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+CP+':'+sid,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        setMeta(sid,{fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()});
        await saveP();toast('Archivo guardado ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });
  el.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const sid=btn.getAttribute('data-view');
      const period=btn.getAttribute('data-view-period')||CP;
      showLoad(true);
      const raw=await sGet('file:'+period+':'+sid,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      openFileViewer(JSON.parse(raw));
    });
  });
  el.querySelectorAll('[data-delete]').forEach(btn=>{

      const sid=btn.getAttribute('data-delete');
      showLoad(true);
      await sDel('file:'+CP+':'+sid,true);
      setMeta(sid,null);
      await saveP();showLoad(false);toast('Eliminado');renderTab();
    });

}
function setMeta(sid,meta){
  if(sid==='full.ventas'){PD.full.ventas=meta;return;}
  if(sid==='full.facturaACA'){PD.full.facturaACA=meta;return;}
  if(sid==='full.comprobanteTransferencia'){PD.full.comprobanteTransferencia=meta;return;}
  if(sid==='hotel.canon.factura'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.facturaACA=meta;return;}
  if(sid==='hotel.canon.nc'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.notaCredito=meta;return;}
  if(sid==='hotel.canon.transf'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.transferencia=meta;return;}
  if(sid==='hotel.canon'){PD.hotel.canonAlojamiento=meta;return;}
  if(sid==='hotel.tel.fs'){PD.hotel.telefono.facturaServicio=meta;return;}
  if(sid.startsWith('varios.')){
    const p=sid.split('.');
    const row=PD.varios[p[1]].find(r=>r.id===p[2]);
    if(row)row.file=meta;
  }
}

const YER_COMBUST = [
  { key:'infinia_diesel', label:'INFINIA DIESEL', descs:['D-INFINIA'] },
  { key:'super',          label:'SUPER',           descs:['N-SUPER'] },
  { key:'infinia',        label:'INFINIA',          descs:['N-INFINIA'] },
  { key:'diesel500',      label:'DIESEL 500',       descs:['D. DIESEL 500','D-DIESEL500','DIESEL 500'] }
];

let YER = {
  pcts: { infinia_diesel:0, super:0, infinia:0, diesel500:0 },
  pctLocked: true,
  rows: [],
  evRows: [],
  ventasFile: null,
  everilioFile: null

function parseArg(v){
  if(v===null||v===undefined||v==='') return 0;
  return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}
function fmtArg(n, dec=2){
  return new Intl.NumberFormat('es-AR',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);
}
function descToCombust(desc){
  const d = String(desc).trim();
  for(const c of YER_COMBUST){
    if(c.descs.some(ds => d.toLowerCase().includes(ds.toLowerCase()))) return c.key;
  }
  return null;
}
function normRemito(r){
  r = String(r).trim();
  const parts = r.split('-');
  // Comparar solo el número de remito (parte derecha), sin ceros iniciales
  // El prefijo puede variar (3573 vs 03573 vs 3753) por errores de tipeo entre sistemas
  if(parts.length === 2) return parts[1].replace(/^0+/,'');
  return r;
}
function yerPeriod(){
  const [y, m] = CP.split('-').map(Number);
  const mesLiq = m === 1 ? 12 : m - 1;
  const anyoLiq = m === 1 ? y - 1 : y;
  const mesAnterior = mesLiq === 1 ? 12 : mesLiq - 1;
  const anyoAnterior = mesLiq === 1 ? anyoLiq - 1 : anyoLiq;
  const lastDayAnterior = new Date(anyoAnterior, mesAnterior, 0).getDate();
  const lastDayLiq = new Date(anyoLiq, mesLiq, 0).getDate();
  const desde = new Date(anyoAnterior, mesAnterior - 1, lastDayAnterior, 22, 0, 0);
  const hasta  = new Date(anyoLiq, mesLiq - 1, lastDayLiq, 22, 0, 0);
  return { desde, hasta, mesLiq, anyoLiq };
}
function yerMesLabel(){
  const { mesLiq, anyoLiq } = yerPeriod();
  const mnames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return mnames[mesLiq-1]+' '+anyoLiq;
}

function processVentasExcel(ab){
  const wb = XLSX.read(ab, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(!data.length) return [];
  const header = data[0].map(h => String(h).trim().toLowerCase());
  const col = name => header.findIndex(h => h.includes(name));
  const cFecha=col('fecha'), cDesc=col('descripcion'), cLitros=col('litros');
  const cTotal=col('total'), cTipoV=col('tipo venta'), cRemito=col('remitonro');
  const cMotivo=col('motivo');
  const { desde, hasta } = yerPeriod();
  const seen = new Set(), rows = [];
  for(let i=1; i<data.length; i++){
    const r = data[i];
    const tipoVenta = String(r[cTipoV]||'').trim();
    const motivo    = String(r[cMotivo]||'').trim();
    // Incluir YER normales y YER_NoComb
    const isYER      = tipoVenta === 'YER';
    const isNoComb   = motivo === 'YER_NoComb';
    if(!isYER && !isNoComb) continue;
    const fechaStr = String(r[cFecha]||'').trim();
    const fparts = fechaStr.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(!fparts) continue;
    const fDate = new Date(+fparts[3], +fparts[2]-1, +fparts[1], +fparts[4], +fparts[5]);
    if(fDate < desde || fDate > hasta) continue;
    const remito = String(r[cRemito]||'').trim();
    if(remito && seen.has(remito)) continue;
    if(remito) seen.add(remito);
    const litros=parseArg(r[cLitros]), total=parseArg(r[cTotal]);
    const desc=String(r[cDesc]||'').trim();
    // NoComb: sin combustible ni comisión
    const ck   = isNoComb ? null : descToCombust(desc);
    const pct  = ck ? (YER.pcts[ck]||0) : 0;
    const precio = litros > 0 ? total / litros : 0;
    const comxLt = precio*(pct/100);
    rows.push({
      id:Math.random().toString(36).slice(2,9),
      fecha:fechaStr, desc, litros, total,
      remito, precio, combustKey:ck, pct, comxLt,
      totalCom:litros*comxLt,
      motivo: isNoComb ? 'YER_NoComb' : 'YER'
    });
  }
  return rows;
}

function processEverilioExcel(ab){
  const wb = XLSX.read(ab, {type:'array', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
  if(!data.length) return [];
  // Columnas fijas: A(0)=fecha, D(3)=remito, I(8)=importe (TOTAL PVP)
  const { desde, hasta } = yerPeriod();
  const rows = [];
  for(let i=1; i<data.length; i++){
    const r = data[i];
    const remito = String(r[3]||'').trim();
    if(!remito || remito.startsWith('00000-')) continue;
    const fechaStr = String(r[0]||'').slice(0,16);
    // Parsear fecha "dd/mm/yyyy hh:mm" para filtrar por período
    const fparts = fechaStr.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(fparts){
      const fDate = new Date(+fparts[3], +fparts[2]-1, +fparts[1], +fparts[4], +fparts[5]);
      if(fDate < desde || fDate > hasta) continue;
    }
    const importe = parseFloat(String(r[8]||'0')) || 0;
    rows.push({
      id: Math.random().toString(36).slice(2,9),
      fecha: fechaStr,
      remito,
      remitoNorm: normRemito(remito),
      pvp: importe,
      totalYer: 0
    });
  }
  return rows;
}

function calcConciliacion(){
  const vRows=YER.rows||[], eRows=YER.evRows||[];
  const eByRemito={};
  eRows.forEach(r=>{ eByRemito[r.remitoNorm]=r; });
  // Set de remitos de ventas (todos: YER + NoComb)
  const vSet=new Set(vRows.map(r=>normRemito(r.remito)));
  // Set específico de NoComb — sus remitos no son inconsistencias aunque no estén en Everilio como YER
  const noCombSet=new Set(vRows.filter(r=>r.motivo==='YER_NoComb').map(r=>normRemito(r.remito)));
  const eSet=new Set(eRows.map(r=>r.remitoNorm));
  // Solo en ventas: excluir NoComb (no se espera que estén en Everilio)
  const soloVentas=vRows.filter(r=>r.motivo!=='YER_NoComb'&&!eSet.has(normRemito(r.remito)));
  // Solo en everilio: excluir los que matchean con NoComb de ventas
  const soloEv=eRows.filter(r=>!vSet.has(r.remitoNorm)&&!noCombSet.has(r.remitoNorm));
  const diffMonto=[];
  vRows.forEach(r=>{
    if(r.motivo==='YER_NoComb') return; // NoComb no participa en diff de monto
    const rn=normRemito(r.remito), eRow=eByRemito[rn];
    if(!eRow) return;
    const diff=r.total-eRow.pvp;
    if(Math.abs(diff)>20) diffMonto.push({vRow:r,eRow,diff});
  });
  // Contar solo YER normales para las estadísticas
  const vYER=vRows.filter(r=>r.motivo!=='YER_NoComb');
  return { soloVentas, soloEv, diffMonto,
    vTotalPesos:vYER.reduce((a,r)=>a+r.total,0),
    vTotalLitros:vYER.reduce((a,r)=>a+r.litros,0),
    eTotalPesos:eRows.reduce((a,r)=>a+r.pvp,0),
    vCount:vYER.length, eCount:eRows.length };
}

function recalcYERRows(){
  YER.rows=YER.rows.map(r=>{
    const pct=r.combustKey?(YER.pcts[r.combustKey]||0):0;
    const comxLt=r.precio*(pct/100);
    return {...r,pct,comxLt,totalCom:r.litros*comxLt};
  });
}

  // ── Período ya liquidado: solo mostrar historial + porcentajes ──

  if(yaLiquidado){
    const mesLabel=yerMesLabel();

    // Modo vista o edición desde historial
    const modoVista=YER._viewingLiq!=null;

    const liqRows=liqHistory.map((liq,i)=>`<tr style="background:${i%2===0?'#FFFFF0':'#FFFDE0'}">
      <td style="padding:8px 10px;border:1px solid #D4C830;font-weight:700;font-size:13px;">${esc(liq.mesLabel)}</td>
      ${YER_COMBUST.map(c=>{const s=liq.detalle.find(d=>d.key===c.key)||{litros:0,importe:0};return `<td style="padding:8px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;"><div style="font-size:11px;color:var(--m2);">${fmtArg(Math.round(s.litros),0)} Lt</div><div style="font-weight:700;color:var(--g);">$ ${fmtArg(s.importe)}</div></td>`;}).join('')}

        </div>

    // Modo VISTA — mostrar todo el detalle del período con banner de volver
    if(modoVista){
      const archivosVista=`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Ventas Especiales</div>${YER.ventasFile?`<span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.ventasFile.fileName)}</span>`:`<span style="font-size:12px;color:var(--m2);">Sin archivo</span>`}</div>
        <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Everilio</div>${YER.everilioFile?`<span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.everilioFile.fileName)}</span>`:`<span style="font-size:12px;color:var(--m2);">Sin archivo</span>`}</div>
      </div>`;
      let subVista='';
      if(yerSub==='diferencias') subVista=renderYERDiferencias();
      else if(yerSub==='detalle-ventas') subVista=renderYERDetalleVentas();
      else if(yerSub==='detalle-everilio') subVista=renderYERDetalleEverilio();
      const btnLiqEdicion=modoEdicion&&(YER.rows||[]).filter(r=>r.motivo!=='YER_NoComb').length>0?`
        <div style="margin-top:16px;text-align:right;">
          <button id="yer-liquidar" style="background:#1B6B35;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(27,107,53,.35);">
            💰 RE-LIQUIDAR ${yerMesLabel().toUpperCase()}
          </button>
        </div>`:'';
      return `<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:16px;"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;"><div style="font-size:14px;font-weight:800;color:var(--pd);">PORCENTAJES DE COMISION POR COMBUSTIBLE</div>${pctBtns}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">${pctGrid}</div></div>${bannerVista}${archivosVista}${renderYERSubTabs()}${subVista}${btnLiqEdicion}
      <div id="yer-modal-liq" style="display:none;position:fixed;inset:0;background:rgba(20,10,36,.6);z-index:200;align-items:center;justify-content:center;padding:20px;"><div style="background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;"><div id="yer-liq-content" style="overflow-y:auto;flex:1;"></div><div style="padding:12px 20px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--b);flex-shrink:0;"><button id="yer-liq-save" style="display:none;background:var(--g);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar liquidación</button><button id="yer-liq-print" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir</button><button id="yer-liq-close" style="background:#fff;color:var(--m2);border:1px solid var(--b);border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Cerrar</button></div></div></div>`;
    }

    return `
    <div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="font-size:14px;font-weight:800;color:var(--pd);">PORCENTAJES DE COMISION POR COMBUSTIBLE</div>
        ${pctBtns}
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">${pctGrid}</div>
    </div>

    <div style="background:var(--gb);border:1px solid var(--gbr);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">
      <div>
        <div style="font-size:13px;font-weight:800;color:var(--g);">✓ Período ${mesLabel} liquidado</div>
        <div style="font-size:12px;color:var(--m2);margin-top:2px;">Para cargar el nuevo período subí los archivos del mes siguiente.</div>
      </div>
      <button id="yer-nuevo-periodo" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;">+ Nuevo período</button>
    </div>

    <div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;">
      <div style="background:var(--p);color:#fff;padding:10px 14px;font-size:13px;font-weight:800;">📋 Liquidaciones guardadas</div>
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;min-width:700px;">
        <thead><tr>
          <th style="${thL}">MES</th>
          ${YER_COMBUST.map(c=>`<th style="${thL}">${c.label}</th>`).join('')}
          <th style="${thL}">TOTAL COMISIÓN</th>
          <th style="${thL}"></th>
        </tr></thead>
        <tbody>${liqRows}</tbody>
      </table></div>
    </div>

    <div id="yer-modal-liq" style="display:none;position:fixed;inset:0;background:rgba(20,10,36,.6);z-index:200;align-items:center;justify-content:center;padding:20px;">
      <div style="background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
        <div id="yer-liq-content" style="overflow-y:auto;flex:1;"></div>
        <div style="padding:12px 20px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--b);flex-shrink:0;">
          <button id="yer-liq-save" style="display:none;background:var(--g);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar liquidación</button>
          <button id="yer-liq-print" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir</button>
          <button id="yer-liq-close" style="background:#fff;color:var(--m2);border:1px solid var(--b);border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Cerrar</button>
        </div>
      </div>
    </div>`;
  }

  // ── Período sin liquidar: mostrar todo ─────────────────────────
  const archivos=`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:8px;">Ventas Especiales (Excel)</div>
    ${YER.ventasFile?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.ventasFile.fileName)}</span><button style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;" id="yer-del-ventas">Quitar</button></div>`:`<label style="background:var(--p);color:#fff;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;display:inline-block;">Subir archivo<input type="file" id="yer-ventas-input" accept=".xlsx,.xls" hidden></label>`}</div>
    <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:8px;">Everilio (Excel)</div>
    ${YER.everilioFile?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.everilioFile.fileName)}</span><button style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;" id="yer-del-everilio">Quitar</button></div>`:`<label style="background:var(--p);color:#fff;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;display:inline-block;">Subir archivo<input type="file" id="yer-everilio-input" accept=".xlsx,.xls" hidden></label>`}</div>
  </div>`;
  let subContent='';
  if(yerSub==='diferencias') subContent=renderYERDiferencias();
  else if(yerSub==='detalle-ventas') subContent=renderYERDetalleVentas();
  else if(yerSub==='detalle-everilio') subContent=renderYERDetalleEverilio();
  return `<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:16px;"><div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;"><div style="font-size:14px;font-weight:800;color:var(--pd);">PORCENTAJES DE COMISION POR COMBUSTIBLE</div>${pctBtns}</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">${pctGrid}</div></div>${archivos}${renderYERSubTabs()}${subContent}
  <div id="yer-modal-liq" style="display:none;position:fixed;inset:0;background:rgba(20,10,36,.6);z-index:200;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
      <div id="yer-liq-content" style="overflow-y:auto;flex:1;"></div>
      <div style="padding:12px 20px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--b);flex-shrink:0;">
        <button id="yer-liq-save" style="display:none;background:var(--g);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar liquidación</button>
        <button id="yer-liq-print" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir</button>
        <button id="yer-liq-close" style="background:#fff;color:var(--m2);border:1px solid var(--b);border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Cerrar</button>
      </div>
    </div>
  </div>`;
}

function renderYERDiferencias(){
  const ambos=YER.ventasFile&&YER.everilioFile;
  if(!ambos) return `<div class="empty-s"><p>Carga ambos archivos (Ventas Especiales y Everilio) para ver las diferencias entre bases.</p></div>`;
  const {soloVentas,soloEv,diffMonto,vTotalPesos,vTotalLitros,eTotalPesos,vCount,eCount}=calcConciliacion();
  const parseF=s=>{const m=(s||'').match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);return m?new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]):0;};
  soloVentas.sort((a,b)=>parseF(a.fecha)-parseF(b.fecha));
  soloEv.sort((a,b)=>parseF(a.fecha)-parseF(b.fecha));
  diffMonto.sort((a,b)=>parseF(a.vRow.fecha)-parseF(b.vRow.fecha));
  const ok=vCount-soloVentas.length-diffMonto.length;

  if(!YER.validaciones)YER.validaciones={};
  const val=YER.validaciones;

  // Celda de validación reutilizable
  const valCell=(key)=>{
    const v=val[key]||{};
    const estado=v.estado||'';
    const comentario=v.comentario||'';
    const validado=estado==='ok'||estado==='error'||estado==='pendiente';
    const badgeColor={'ok':'#1B6B35','error':'var(--r)','pendiente':'#7B5800'}[estado]||'transparent';
    const badgeLabel={'ok':'✓ OK','error':'✗ Error','pendiente':'⏳ Pendiente'}[estado]||'';
    return `<td style="padding:5px 8px;border:1px solid var(--b);min-width:220px;vertical-align:middle;">
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div style="display:flex;align-items:center;gap:5px;">
          <select data-val-key="${esc(key)}" data-val-field="estado" style="padding:4px 6px;border:1px solid var(--b);border-radius:5px;font-size:12px;background:#fff;">
            <option value="">— Sin validar</option>
            <option value="ok" ${estado==='ok'?'selected':''}>✓ OK</option>
            <option value="error" ${estado==='error'?'selected':''}>✗ Error</option>
            <option value="pendiente" ${estado==='pendiente'?'selected':''}>⏳ Pendiente</option>
          </select>
          ${validado?`<span style="font-size:11px;font-weight:700;color:${badgeColor};">${badgeLabel}</span>`:''}
        </div>
        <input type="text" data-val-key="${esc(key)}" data-val-field="comentario"
          placeholder="Comentario breve..." value="${esc(comentario)}"
          style="padding:4px 7px;border:1px solid var(--b);border-radius:5px;font-size:12px;width:100%;background:${comentario?'#FFFDE0':'#fff'};">
      </div>
    </td>`;
  };

  const cards=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;">
    <div style="background:#F8F5FB;border:1px solid var(--b);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Registros Ventas</div><div style="font-size:22px;font-weight:800;color:var(--pd);">${vCount}</div><div style="font-size:12px;color:var(--m2);margin-top:3px;">$ ${fmtArg(vTotalPesos)}</div><div style="font-size:12px;color:var(--m2);">${fmtArg(vTotalLitros,2)} Lt</div></div>
    <div style="background:#F8F5FB;border:1px solid var(--b);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Registros Everilio</div><div style="font-size:22px;font-weight:800;color:var(--pd);">${eCount}</div><div style="font-size:12px;color:var(--m2);margin-top:3px;">$ ${fmtArg(eTotalPesos)}</div></div>
    <div style="background:var(--rb);border:1px solid var(--rbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--r);text-transform:uppercase;margin-bottom:6px;">Solo en Ventas</div><div style="font-size:22px;font-weight:800;color:var(--r);">${soloVentas.length}</div><div style="font-size:12px;color:var(--r);margin-top:3px;">$ ${fmtArg(soloVentas.reduce((a,r)=>a+r.total,0))}</div></div>
    <div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:#7B5800;text-transform:uppercase;margin-bottom:6px;">Solo en Everilio</div><div style="font-size:22px;font-weight:800;color:#7B5800;">${soloEv.length}</div><div style="font-size:12px;color:#7B5800;margin-top:3px;">$ ${fmtArg(soloEv.reduce((a,r)=>a+r.pvp,0))}</div></div>
    <div style="background:var(--rb);border:1px solid var(--rbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--r);text-transform:uppercase;margin-bottom:6px;">Dif. monto &gt;$20</div><div style="font-size:22px;font-weight:800;color:var(--r);">${diffMonto.length}</div></div>
    <div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;margin-bottom:6px;">Sin diferencias</div><div style="font-size:22px;font-weight:800;color:var(--g);">${Math.max(0,ok)}</div></div>
  </div>`;

  const th=`padding:8px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;`;

  // Filas con validador
  const svRows=soloVentas.map((r,i)=>{
    const vKey='sv:'+normRemito(r.remito);
    const v=val[vKey]||{};
    const rowBg=v.estado==='ok'?'#F0FFF4':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFF8F8';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(r.remito)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;color:var(--m2);">${esc(r.fecha.slice(0,16))}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;">${esc(r.desc)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">${fmtArg(Math.round(r.litros),0)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;font-weight:700;color:var(--r);">$ ${fmtArg(r.total)}</td>
      ${valCell(vKey)}
    </tr>`;
  }).join('');

  const seRows=soloEv.map((r,i)=>{
    const vKey='se:'+normRemito(r.remito);
    const v=val[vKey]||{};
    const rowBg=v.estado==='ok'?'#F0FFF4':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFFCF0';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(r.remito)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;color:var(--m2);">${esc(r.fecha)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;font-weight:700;color:#7B5800;">$ ${fmtArg(r.pvp)}</td>
      ${valCell(vKey)}
    </tr>`;
  }).join('');

  const dmRows=diffMonto.map((d,i)=>{
    const s=d.diff>0?'+':'';
    const col=Math.abs(d.diff)>500?'var(--r)':'#B8860B';
    const vKey='dm:'+normRemito(d.vRow.remito);
    const v=val[vKey]||{};
    const rowBg=v.estado==='ok'?'#F0FFF4':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFF8F8';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(d.vRow.remito)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;">${esc(d.vRow.desc)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">${fmtArg(Math.round(d.vRow.litros),0)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">$ ${fmtArg(d.vRow.total)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">$ ${fmtArg(d.eRow.pvp)}</td>

      ${valCell(vKey)}
    </tr>`;
  }).join('');

  const tbSV=soloVentas.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:var(--rb);padding:9px 14px;font-size:13px;font-weight:800;color:var(--r);">En Ventas sin respaldo en Everilio — <span id="sv-count-lbl">${soloVentas.length}</span> de ${soloVentas.length} registros</div>
    ${renderSearchBar('sv-search','Buscar remito, fecha, producto...',soloVentas.length)}

      <th style="${th}">Remito</th><th style="${th}">Fecha</th><th style="${th}">Producto</th><th style="${th}">Litros</th><th style="${th}">Total $</th>
      <th style="${th}">Validación</th>
    </tr></thead><tbody class="sv-tbody">${svRows}</tbody></table></div></div>`
    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Todos los remitos de Ventas tienen respaldo en Everilio</div>`;

  const tbSE=soloEv.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:#FFF8E1;padding:9px 14px;font-size:13px;font-weight:800;color:#7B5800;">En Everilio sin respaldo en Ventas — <span id="se-count-lbl">${soloEv.length}</span> de ${soloEv.length} registros</div>
    ${renderSearchBar('se-search','Buscar remito, fecha...',soloEv.length)}
    <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="${th}">Remito</th><th style="${th}">Fecha</th><th style="${th}">Total PVP $</th>
      <th style="${th}">Validación</th>
    </tr></thead><tbody class="se-tbody">${seRows}</tbody></table></div></div>`
    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Todos los remitos de Everilio tienen respaldo en Ventas</div>`;

  const tbDM=diffMonto.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:var(--rb);padding:9px 14px;font-size:13px;font-weight:800;color:var(--r);">Diferencias de monto significativas (&gt;$20) — <span id="dm-count-lbl">${diffMonto.length}</span> de ${diffMonto.length} casos</div>

      <th style="${th}">Remito</th><th style="${th}">Producto</th><th style="${th}">Litros</th><th style="${th}">$ Ventas</th><th style="${th}">$ Everilio</th><th style="${th}">Diferencia</th>
      <th style="${th}">Validación</th>

    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Sin diferencias de monto significativas</div>`;

  // ── HISTORIAL DE LIQUIDACIONES ────────────────────────────────
  const liqHistory = YER.liqHistory||[];
  const thL=`padding:8px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;text-align:center;`;

  const liqRows=liqHistory.map((liq,i)=>{
    return `<tr style="background:${i%2===0?'#FFFFF0':'#FFFDE0'}">
      <td style="padding:8px 10px;border:1px solid #D4C830;font-weight:700;font-size:13px;">${esc(liq.mesLabel)}</td>
      ${YER_COMBUST.map(c=>{
        const s=liq.detalle.find(d=>d.key===c.key)||{litros:0,importe:0};
        return `<td style="padding:8px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;">
          <div style="font-size:11px;color:var(--m2);">${fmtArg(Math.round(s.litros),0)} Lt</div>
          <div style="font-weight:700;color:var(--g);">$ ${fmtArg(s.importe)}</div>
        </td>`;
      }).join('')}
      <td style="padding:8px 10px;border:1px solid #D4C830;font-size:14px;font-weight:900;color:var(--p);text-align:right;">$ ${fmtArg(liq.totalCom)}</td>
      <td style="padding:8px 10px;border:1px solid #D4C830;text-align:center;">
        <div style="display:flex;gap:5px;justify-content:center;">
          <button data-liq-ver="${i}" style="background:var(--yl);color:var(--pd);border:1px solid var(--y2);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">👁 Ver</button>
          <button data-liq-edit="${i}" style="background:var(--p);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">✏</button>
          <button data-liq-del="${i}" style="background:var(--rb);color:var(--r);border:1px solid var(--rbr);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const liqHistorialHtml = liqHistory.length ? `
    <div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-top:14px;">
      <div style="background:var(--p);color:#fff;padding:10px 14px;font-size:13px;font-weight:800;">📋 Liquidaciones guardadas</div>
      <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;min-width:700px;">
        <thead><tr>
          <th style="${thL}">MES</th>
          ${YER_COMBUST.map(c=>`<th style="${thL}">${c.label}</th>`).join('')}
          <th style="${thL}">TOTAL COMISIÓN</th>
          <th style="${thL}"></th>
        </tr></thead>
        <tbody>${liqRows}</tbody>
      </table></div>
    </div>` : '';

  // Botón LIQUIDAR (solo si hay ventas cargadas)
  const canLiquidar=(YER.rows||[]).filter(r=>r.motivo!=='YER_NoComb').length>0;
  const btnLiquidar=canLiquidar?`
    <div style="margin-top:16px;text-align:right;">
      <button id="yer-liquidar" style="background:#1B6B35;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(27,107,53,.35);">
        💰 LIQUIDAR ${yerMesLabel().toUpperCase()}
      </button>
    </div>` : '';

  return cards+tbSV+tbSE+tbDM+liqHistorialHtml+btnLiquidar;
}
