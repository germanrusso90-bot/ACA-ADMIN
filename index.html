body{font-family:'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;}

/* TABS */

.tab-btn{border:1px solid var(--b);background:#fff;color:var(--p);font-weight:600;font-size:13px;padding:9px 18px;border-radius:999px;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:var(--p);color:#fff;border-color:var(--p);}
.tab-btn:hover:not(.active){background:#EFE9F5;}

.us-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;padding:8px 0 12px;}

.us-tile{

.us-tile:hover{transform:translateY(-5px);box-shadow:0 12px 36px rgba(36,19,56,.22);}

.us-tile.pending{background:var(--rb);border-color:var(--rbr);}

.tile-title{font-size:17px;font-weight:800;line-height:1.3;}
.tile-period{font-size:13px;color:var(--m2);}
.tile-badge{font-size:12px;font-weight:800;padding:5px 16px;border-radius:999px;}
.tile-badge.done{background:var(--g);color:#fff;}
.tile-badge.pending{background:var(--r);color:#fff;}

table.ex col.c-num{width:10%;}
table.ex col.c-rec{width:11%;}
table.ex col.c-nro{width:9%;}
table.ex col.c-fecha{width:10%;}
table.ex col.c-fs{width:16%;}
table.ex col.c-acc{width:7%;}

.btn-f-edit{background:#EFE9F5;color:var(--p);border:1px solid var(--b);}

.btn-add{background:var(--y);color:var(--pd);border:none;border-radius:6px;font-size:12px;font-weight:700;padding:7px 12px;cursor:pointer;}
.varios-rows{display:flex;flex-direction:column;gap:10px;}
.vrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#F8F5FB;border:1px solid var(--b);border-radius:8px;padding:10px;}
.vrow select{padding:7px 9px;border:1px solid var(--b);border-radius:6px;font-size:13px;background:#fff;}

.vrow .file-slot{flex:1 1 200px;border-bottom:none;padding:0;}
.resumen-table{width:100%;border-collapse:collapse;font-size:14px;}
.resumen-table td,.resumen-table th{padding:9px 6px;border-bottom:1px solid var(--b);text-align:left;}
.resumen-table th{color:var(--m2);font-size:12px;text-transform:uppercase;}

.importe-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:500px){.importe-grid{grid-template-columns:1fr;}.calc-grid{grid-template-columns:1fr;}}
.ifield{display:flex;flex-direction:column;gap:4px;}
.ifield label{font-size:12px;font-weight:700;color:var(--m2);text-transform:uppercase;}
.ifield input{padding:9px 11px;border:1px solid var(--b);border-radius:8px;font-size:15px;font-weight:600;}
.result-box{background:var(--p);color:#fff;border-radius:10px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.rl{font-size:13px;opacity:.85;}
.rv{font-size:24px;font-weight:900;color:var(--y);}
.divider{border:none;border-top:1px solid var(--b);margin:14px 0;}
.btn-save{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:none;background:var(--g);color:#fff;}
.btn-save:hover{filter:brightness(.92);}
.btn-cancel{padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--b);background:#fff;color:var(--m2);}

/* TOAST/LOADING */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--pd);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 6px 18px rgba(0,0,0,.25);z-index:300;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#loading-overlay{position:fixed;inset:0;background:rgba(36,19,56,.25);display:flex;align-items:center;justify-content:center;z-index:400;}
.spinner{width:42px;height:42px;border:4px solid #fff;border-top-color:var(--y);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>

// ── CACHÉ EN TRES CAPAS ──────────────────────────────────────
// 1. Memoria (_cache): instantáneo, se limpia al recargar
// 2. localStorage: persiste entre sesiones, TTL configurable
// 3. Firebase: fuente de verdad, se consulta en background
// ─────────────────────────────────────────────────────────────
let _cache={};
const LS_TTL_CORTO=5*60*1000;    // 5 min — datos que cambian seguido (periodos, data:CP)
const LS_TTL_LARGO=60*60*1000;   // 1 hora — checks, historial (cambian poco)

function lsGet(key){
  try{
    const raw=localStorage.getItem('_ttl:'+key);
    if(!raw)return null;
    const{v,ts,ttl}=JSON.parse(raw);
    if(Date.now()-ts>ttl)return null; // expirado
    return v;
  }catch(e){return null;}
}
function lsSet(key,v,ttl=LS_TTL_CORTO){
  try{localStorage.setItem('_ttl:'+key,JSON.stringify({v,ts:Date.now(),ttl}));}
  catch(e){/* localStorage lleno */}
}
function lsDel(key){
  localStorage.removeItem('_ttl:'+key);
  localStorage.removeItem(key); // limpiar formato viejo también
}

function getTTL(key){
  // Checks y archivos cambian poco → TTL largo
  if(key.includes('check:')||key.includes('file:')||key.includes('periodos'))return LS_TTL_LARGO;
  return LS_TTL_CORTO;
}

function fullKey(k){
  const globalKeys=['yer:pcts','canon:litros'];
  return globalKeys.includes(k)||k.startsWith('check:')||k.startsWith('file:')?`cr${CURRENT_CR}:${k}`:
    k.startsWith('cr')?k:`cr${CURRENT_CR}:${k}`;
}

async function sGet(k,sh=true){
  const fk=fullKey(k);
  // 1. Memoria
  if(_cache[fk]!==undefined)return _cache[fk];
  // 2. localStorage con TTL
  const lv=lsGet(fk);
  if(lv!==null){
    _cache[fk]=lv;
    _fbRefresh(fk);
    return lv;
  }
  // 3. Firebase con clave nueva (con prefijo cr3531:)
  try{
    const db=await getDB();
    const snap=await db.getDoc(db.doc(db.fs,'kv',encodeKey(fk)));
    if(snap.exists()){
      const val=snap.data().v;
      _cache[fk]=val;
      if(val!==null)lsSet(fk,val,getTTL(fk));
      return val;
    }
  }catch(e){console.warn('sGet error',fk,e.message?.slice(0,40));}

  // 4. Fallback: buscar claves VIEJAS (datos antes del sistema multi-tenant)
  // La clave "cr3531:data:2026-05" puede estar guardada como "data:2026-05"
  // Construir lista de claves viejas posibles
  const oldKeys=[];
  if(fk.startsWith(`cr${CURRENT_CR}:`)){
    // Quitar el prefijo cr3531:
    oldKeys.push(fk.slice(`cr${CURRENT_CR}:`.length));
  }
  // También probar sin encode (el encodeKey puede haber cambiado)
  for(const oldKey of oldKeys){
    if(!oldKey)continue;
    try{
      const db=await getDB();
      const snapOld=await db.getDoc(db.doc(db.fs,'kv',encodeKey(oldKey)));
      if(snapOld.exists()){
        const val=snapOld.data().v;
        console.log(`✅ Migración automática: "${oldKey}" → "${fk}"`);
        _cache[fk]=val;
        lsSet(fk,val,getTTL(fk));
        // Guardar con clave nueva y borrar la vieja en background
        getDB().then(async db=>{
          await db.setDoc(db.doc(db.fs,'kv',encodeKey(fk)),{v:val,k:fk,updatedAt:Date.now()});
          await db.deleteDoc(db.doc(db.fs,'kv',encodeKey(oldKey)));
          console.log(`✅ Clave migrada y vieja eliminada: ${oldKey}`);
        }).catch(e=>console.warn('Error migrando clave',e));
        return val;
      }
    }catch(e){console.warn('sGet fallback error para',oldKey,e.message?.slice(0,40));}
  }
  return null;
}

// Refresca Firebase en background (sin await) y actualiza caché si cambió
function _fbRefresh(fk){
  getDB().then(db=>db.getDoc(db.doc(db.fs,'kv',encodeKey(fk)))).then(snap=>{
    const val=snap.exists()?snap.data().v:null;
    if(val!==null&&val!==_cache[fk]){
      _cache[fk]=val;
      lsSet(fk,val,getTTL(fk));
    }
  }).catch(()=>{});
}

async function sSet(k,v,sh=true){
  const fk=fullKey(k);
  _cache[fk]=v;
  lsSet(fk,v,getTTL(fk)); // guardar en localStorage inmediatamente
  try{
    const db=await getDB();
    await db.setDoc(db.doc(db.fs,'kv',encodeKey(fk)),{v,k:fk,updatedAt:Date.now()});
  }catch(e){
    console.warn('sSet Firebase error (guardado en localStorage)',fk,e.message?.slice(0,50));
  }
  return true;
}
async function sDel(k,sh=true){
  const fk=k.startsWith('cr')?k:`cr${CURRENT_CR}:${k}`;
  delete _cache[fk];
  lsDel(fk);
  try{
    const db=await getDB();
    await db.deleteDoc(db.doc(db.fs,'kv',encodeKey(fk)));
  }catch(e){console.warn('sDel error',fk);}
}
function encodeKey(k){
  // Firestore no acepta / en IDs de documento
  return k.replace(/\//g,'__').replace(/:/g,'--');
}

function monthStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function periodLabel(p){
  if(!p)return '';
  const [y,m]=p.split('-');
  const mnames=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return mnames[parseInt(m)-1]+'-'+String(y).slice(2);
}

function defPD(){
  const us={};
  US_ITEMS.forEach(it=>{us[it.key]=[];});
  const varios={};
  VARIOS_ITEMS.forEach(it=>{varios[it.key]=[];});
  return{us,full:{ventas:null,nroFacturaACA:'',facturaACA:null,fechaCancelacion:'',comprobanteTransferencia:null,interesMensual:'',diasAtrasados:'',locked:false},hotel:{telefono:{importe:null,iva:null,percepciones:null,intereses:null,nroFacturaACA:'',fecha:'',facturaServicio:null},telHistory:[],canon:{locked:false},canonAlojamiento:null},varios,cancelaciones:[]};
}
function mergeDef(data){
  const def=defPD();
  if(!data.us)data.us={};
  US_ITEMS.forEach(it=>{if(!Array.isArray(data.us[it.key]))data.us[it.key]=def.us[it.key];});
  if(!data.varios)data.varios={};
  if(!data.cancelaciones)data.cancelaciones=[];
  VARIOS_ITEMS.forEach(it=>{if(!data.varios[it.key])data.varios[it.key]=def.varios[it.key];});
  if(!data.full)data.full=def.full;
  if(!data.hotel)data.hotel=def.hotel;
  if(!data.hotel.telefono)data.hotel.telefono=def.hotel.telefono;
  if(!data.hotel.telHistory)data.hotel.telHistory=[];
  if(!data.hotel.canonHistory)data.hotel.canonHistory=[];
  if(!data.hotel.canon)data.hotel.canon={locked:false};
  if(data.hotel.canonAlojamiento===undefined)data.hotel.canonAlojamiento=null;
  return data;
}

function fmt(n){if(n===null||n===undefined||isNaN(n))return '—';return new Intl.NumberFormat('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);}
function fmtM(n){return n!==null&&n!==undefined&&!isNaN(n)?'$ '+fmt(n):'—';}
function pN(v){const n=parseFloat(String(v).replace(',','.'));return isNaN(n)?null:n;}
function calcRec(row){
  const i=row.importe||0,v=row.iva||0,p=row.percepciones||0,it=row.intereses||0;
  if(row.importe===null&&row.iva===null&&row.percepciones===null&&row.intereses===null)return null;
  return i-v-p-it;
}
function rowDone(row){return !!(row.nroFacturaACA&&row.fecha&&row.importe);}
function usCurrentPeriod(usKey){
  // Canon y Aguas = mes actual (CP); resto = mes anterior
  return (usKey==='canon'||usKey==='aguas')?CP:prevMonth(CP);
}
function isUSDone(usKey){
  const rows=PD.us[usKey];
  const period=usCurrentPeriod(usKey);
  return rows.some(r=>r.period===period&&r.locked===true);
}

// ── DIAGNÓSTICO FIREBASE ─────────────────────────────────────
async function diagFirebase(){
  try{
    const db=await getDB();
    const {collection,getDocs}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap=await getDocs(collection(db.fs,'kv'));
    const keys=[];
    snap.forEach(d=>{
      const data=d.data();
      const k=data.k||d.id;
      keys.push({id:d.id,k,size:JSON.stringify(data.v||'').length});
    });
    keys.sort((a,b)=>a.k.localeCompare(b.k));
    const viejas=keys.filter(k=>!k.k.startsWith('cr'));
    const nuevas=keys.filter(k=>k.k.startsWith('cr'));
    const msg=`CLAVES CON PREFIJO (${nuevas.length}):\n${nuevas.map(k=>`  ✓ ${k.k} (${k.size}ch)`).join('\n')}\n\nCLAVES SIN PREFIJO - VIEJAS (${viejas.length}):\n${viejas.map(k=>`  ⚠️ ${k.k} (${k.size}ch)`).join('\n')||'  (ninguna)'}`;
    const migrar=viejas.length>0&&confirm(`${msg}\n\n¿Migrar ahora las ${viejas.length} claves viejas al CR ${CURRENT_CR}?`);
    if(migrar)await migrarClavesViejas(viejas,db);
    else alert(msg);
  }catch(e){alert('Error: '+e.message);}
}

async function migrarClavesViejas(viejas,db){
  let ok=0,err=0;
  showLoad(true);
  for(const item of viejas){
    try{
      const oldKey=item.k;
      const newKey=`cr${CURRENT_CR}:${oldKey}`;
      // Leer valor original
      const snap=await db.getDoc(db.doc(db.fs,'kv',encodeKey(oldKey)));
      if(!snap.exists())continue;
      const val=snap.data().v;
      // Guardar con clave nueva
      await db.setDoc(db.doc(db.fs,'kv',encodeKey(newKey)),{v:val,k:newKey,updatedAt:Date.now()});
      // Borrar clave vieja
      await db.deleteDoc(db.doc(db.fs,'kv',encodeKey(oldKey)));
      // Actualizar caché
      _cache[newKey]=val;
      lsSet(newKey,val,getTTL(newKey));
      console.log(`Migrado: ${oldKey} → ${newKey}`);
      ok++;
    }catch(e){console.warn('Error migrando',item.k,e);err++;}
  }
  showLoad(false);
  // Recargar datos
  _cache={};
  await loadPeriod(CP);
  await loadYER();
  render();
  alert(`Migración completa ✓\n${ok} claves migradas${err>0?`\n${err} errores`:''}\n\nLos datos del historial ahora deberían aparecer.`);
}


async function loadPeriod(p){
  const raw=await sGet('data:'+p,true);
  PD=raw?mergeDef(JSON.parse(raw)):defPD();
  CP=p;

  // Si el PD actual está vacío (mes nuevo), intentar migrar datos históricos del mes anterior
  // Esto soluciona el problema de cambio de mes: Full, Hotel Canon, YER liqHistory
  if(!raw){
    const prevP=prevMonth(p);
    const prevRaw=await sGet('data:'+prevP,true);
    if(prevRaw){
      const prevPD=mergeDef(JSON.parse(prevRaw));
      // Migrar fullHistory (registros históricos del Full)
      if(prevPD.fullHistory&&prevPD.fullHistory.length>0){
        PD.fullHistory=JSON.parse(JSON.stringify(prevPD.fullHistory));
      }
      // Migrar el Full del mes anterior al historial si estaba locked
      if(prevPD.full&&prevPD.full.locked){
        if(!PD.fullHistory)PD.fullHistory=[];
        if(!PD.fullHistory.find(r=>r.period===prevP)){
          const int=prevPD.full.ventas?{montoInt:prevPD.full.importe_interes||0}:{montoInt:0};
          const subtotal=prevPD.full.ventas?prevPD.full.ventas.recupero12:null;
          PD.fullHistory.push({
            period:prevP,
            importe:prevPD.full.ventas?prevPD.full.ventas.totalVentas:null,
            cigarrillos:prevPD.full.ventas?prevPD.full.ventas.cigarrillos:null,
            recuperar:subtotal,
            nroFacturaACA:prevPD.full.nroFacturaACA||'',
            fechaCancelacion:prevPD.full.fechaCancelacion||'',
            importe_interes:int.montoInt||null,
            totalFinal:(subtotal||0)+int.montoInt,
            comprobanteTransferencia:prevPD.full.comprobanteTransferencia||null,
            locked:true
          });
        }
      }
      // Migrar canonHistory del Hotel
      if(prevPD.hotel&&prevPD.hotel.canonHistory&&prevPD.hotel.canonHistory.length>0){
        PD.hotel.canonHistory=JSON.parse(JSON.stringify(prevPD.hotel.canonHistory));
      }
      // Migrar telHistory del Hotel
      if(prevPD.hotel&&prevPD.hotel.telHistory&&prevPD.hotel.telHistory.length>0){
        PD.hotel.telHistory=JSON.parse(JSON.stringify(prevPD.hotel.telHistory));
      }
      // Migrar cancelaciones
      if(prevPD.cancelaciones&&prevPD.cancelaciones.length>0){
        PD.cancelaciones=JSON.parse(JSON.stringify(prevPD.cancelaciones));
      }
      // Migrar us (datos históricos de Unidad Servicial)
      // Para cada ítem de US, traer las filas del mes anterior que estén locked
      const usKeys=['electricidad','aguas','telefono','dpa','canon'];
      for(const k of usKeys){
        if(prevPD.us&&prevPD.us[k]){
          const prevRows=prevPD.us[k].filter(r=>r.locked);
          if(prevRows.length>0&&PD.us[k]){
            const existing=new Set(PD.us[k].map(r=>r.period));
            prevRows.forEach(r=>{if(!existing.has(r.period))PD.us[k].push({...r});});
          }
        }
      }
      // Guardar el PD migrado para que no tenga que migrar cada vez
      await saveP();
    }
  }
}
async function saveP(){
  // Guardar en la clave del período actual
  await sSet('data:'+CP,JSON.stringify(PD),true);
}
async function savePeriod(p,data){
  // Guardar datos de un período específico (para preservar historial al cambiar de mes)
  await sSet('data:'+p,JSON.stringify(data),true);
}

// ── EXCEL VENTAS ─────────────────────────────────────────────
function parseVentas(ab){
  const wb=XLSX.read(ab,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});

  // Detectar columnas buscando la fila de encabezados
  let colSec=1, colDet=3, colTotal=11;
  for(let i=0;i<Math.min(10,rows.length);i++){
    const r=rows[i];
    for(let j=0;j<r.length;j++){
      const v=String(r[j]||'').toLowerCase().trim();
      if(v==='sec'||v==='sector') colSec=j;
      if(v.includes('detalle')) colDet=j;
      if(v==='tv8555'||v.includes('total')||v==='importe') colTotal=j;
    }
  }

  let tot=0,cig=0,found=false;
  for(const row of rows){
    const sec=row[colSec];
    const det=row[colDet];
    const total=row[colTotal];
    // Sectores 2 y 21 = Full
    const secNum=typeof sec==='number'?sec:parseFloat(sec);
    if((secNum===2||secNum===21)&&typeof total==='number'&&total>0){
      tot+=total; found=true;
      // Cigarrillos y tabaco
      if(typeof det==='string'&&det.trim()==='Cigarrillos') cig+=total;
    }
  }
  if(!found)return null;
  return{totalVentas:tot,cigarrillos:cig,base:tot-cig,recupero12:(tot-cig)*0.12};
}
// Abrir Excel en visor inline (sin descarga automática)
function openExcelViewer(f){
  try{
    const arr=Uint8Array.from(atob(f.dataUrl.split(',')[1]),c=>c.charCodeAt(0));
    const wb=XLSX.read(arr,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const htmlTable=XLSX.utils.sheet_to_html(ws,{editable:false});
    const wrap=document.createElement('div');
    wrap.className='file-viewer-wrap';wrap.id='fv-wrap';
    // Construir sin template literals anidados para evitar conflicto con el html externo
    const bar=document.createElement('div');
    bar.className='file-viewer-bar';
    const nameSpan=document.createElement('span');
    nameSpan.textContent='📊 '+f.fileName;
    const btnWrap=document.createElement('div');
    btnWrap.style.cssText='display:flex;gap:8px;align-items:center;';
    const dlBtn=document.createElement('button');
    dlBtn.id='fv-dl';dlBtn.textContent='⬇ Descargar';
    dlBtn.style.cssText='background:var(--y);color:var(--pd);border:none;border-radius:6px;padding:6px 14px;font-weight:700;font-size:13px;cursor:pointer;';
    const closeBtn=document.createElement('button');
    closeBtn.id='fv-close';closeBtn.textContent='✕';closeBtn.title='Cerrar';
    closeBtn.style.cssText='background:none;border:none;color:#fff;font-size:22px;cursor:pointer;';
    btnWrap.appendChild(dlBtn);btnWrap.appendChild(closeBtn);
    bar.appendChild(nameSpan);bar.appendChild(btnWrap);
    const contentDiv=document.createElement('div');
    contentDiv.className='file-viewer-content';
    contentDiv.style.cssText='overflow:auto;background:#fff;';
    const inner=document.createElement('div');
    inner.style.cssText='padding:12px;font-size:12px;font-family:monospace;';
    inner.innerHTML=htmlTable;
    contentDiv.appendChild(inner);
    wrap.appendChild(bar);wrap.appendChild(contentDiv);
    document.body.appendChild(wrap);
    closeBtn.addEventListener('click',()=>wrap.remove());
    dlBtn.addEventListener('click',()=>{
      const a=document.createElement('a');a.href=f.dataUrl;a.download=f.fileName;
      document.body.appendChild(a);a.click();a.remove();
    });
    wrap.addEventListener('click',e=>{if(e.target===wrap)wrap.remove();});
  }catch(e){alert('No se pudo mostrar el archivo: '+e.message);}
}

function syncDepSelect(cr){
  const sel=document.getElementById('lu-dep');
  if(sel&&cr.length===4){
    const opt=[...sel.options].find(o=>o.value===cr);
    if(opt)sel.value=cr;
  }
}
function syncCrInput(cr){
  const inp=document.getElementById('lu-cr');
  if(inp)inp.value=cr;
}
function attachLogin(){
  document.getElementById('lf').addEventListener('submit',async e=>{
    e.preventDefault();
    const cr=document.getElementById('lu-dep').value||document.getElementById('lu-cr').value.trim();
    const p=document.getElementById('lp').value;
    const le=document.getElementById('le');

    // Buscar en DEPENDENCIAS
    const dep=DEPENDENCIAS.find(d=>d.cr===cr);
    if(dep&&dep.password===p){
      CURRENT_CR=dep.cr;
      _cache={}; // limpiar cache al cambiar de dependencia
      CU={username:dep.usuario,name:`${dep.nombre} (CR ${dep.cr})`,role:dep.role,cr:dep.cr,depNombre:dep.nombre};
      showLoad(true);
      const raw=await sGet('periodos',true);
      APS=raw?JSON.parse(raw):[];
      if(!APS.includes(CP)){APS.push(CP);APS.sort();await sSet('periodos',JSON.stringify(APS),true);}
      await loadPeriod(CP);
      await loadYER();
      showLoad(false);AT='us';usView=null;render();
      return;
    }
    // Buscar en USERS (admin)
    if(cr==='0000'||cr==='admin'){
      const user=USERS['admin'];
      if(user&&user.password===p){
        CURRENT_CR='0000';
        _cache={};
        CU={username:'admin',name:'Administrador',role:'admin',cr:'0000'};
        showLoad(true);
        await loadPeriod(CP);await loadYER();
        showLoad(false);AT='us';usView=null;render();
        return;
      }
    }
    le.textContent='CR o contraseña incorrectos';
  });
}

function activateSearch(inputId, rowSelector, countId){
  const inp=document.getElementById(inputId);
  const cnt=document.getElementById(countId||inputId+'-count');
  if(!inp)return;
  const total=document.querySelectorAll(rowSelector).length;
  const filter=()=>{
    const q=inp.value.toLowerCase().trim();
    let vis=0;
    document.querySelectorAll(rowSelector).forEach(tr=>{
      const show=!q||tr.textContent.toLowerCase().includes(q);
      tr.style.display=show?'':'none';
      if(show)vis++;
    });
    if(cnt)cnt.textContent=vis+' / '+total+' registros';
  };
  inp.addEventListener('input',filter);
  const clr=document.getElementById(inputId+'-clear');
  if(clr)clr.addEventListener('click',()=>{ inp.value=''; filter(); inp.focus(); });
}

// ── TAB: UNIDAD SERVICIAL — grilla ───────────────────────────
function renderUSGrid(){
  const el=document.getElementById('tab-content');
  let html=`<p style="font-size:13px;color:var(--m2);padding:4px 0 12px;">Hacé click en un ítem para ver el historial y cargar el recupero del mes.</p>
  <div class="us-grid">`;
  US_ITEMS.forEach(it=>{
    const done=isUSDone(it.key);
    const period=usCurrentPeriod(it.key);
    const rows=PD.us[it.key];
    const curr=rows.find(r=>r.period===period);
    const dateLabel=curr&&curr.fecha?curr.fecha:(curr&&curr.fechaCancelacion?curr.fechaCancelacion:'Sin cargar');
    const periodLabel2=periodLabel(period);
    html+=`<div class="us-tile ${done?'done':'pending'}" data-open-us="${it.key}">
      <div class="tile-icon">${it.icon}</div>
      <div class="tile-title">${esc(it.label)}</div>
      <div class="tile-period">${done?dateLabel:periodLabel2+' — Pendiente'}</div>
      <span class="tile-badge ${done?'done':'pending'}">${done?'✓ Realizado':'Pendiente'}</span>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
  el.querySelectorAll('[data-open-us]').forEach(c=>{
    c.addEventListener('click',()=>{usView=c.getAttribute('data-open-us');renderTab();});
  });
}

function ensureDemoData(usKey){
  const existingByPeriod={};
  PD.us[usKey].forEach(r=>{ existingByPeriod[r.period]=r; });
  const realRows=REAL_DATA[usKey]||[];
  const newRows=[];
  const realPeriods=new Set(realRows.map(r=>r.period));
  for(const row of realRows){
    const existing=existingByPeriod[row.period];
    if(existing){
      // Si el usuario desbloqueó la fila (locked=false) o la modificó, preservar sus datos
      const userUnlocked=existing.locked===false&&row.locked===true;
      const userModified=existing.nroFacturaACA&&existing.nroFacturaACA!==row.nroFacturaACA
        ||existing.importe!=null&&existing.importe!==row.importe
        ||existing.facturaServicio!=null
        ||existing.precioSuper!=null;
      if(userUnlocked||userModified){
        newRows.push(existing);
      } else {
        newRows.push({...row,facturaServicio:existing.facturaServicio||null});
      }
    } else {
      newRows.push({...row});
    }
  }
  for(const [period,row] of Object.entries(existingByPeriod)){
    if(!realPeriods.has(period)) newRows.push(row);
  }
  PD.us[usKey]=newRows;
}

function prevMonth(p){
  const [y,m]=p.split('-').map(Number);
  return m===1?(y-1)+'-12':y+'-'+String(m-1).padStart(2,'0');
}

  const raw=await sGet('canon:litros',true);

  return {litros:null,locked:true};
}

// ── TAB: UNIDAD SERVICIAL — vista excel ──────────────────────
async function renderUSExcel(usKey){
  const el=document.getElementById('tab-content');
  const item=US_ITEMS.find(it=>it.key===usKey);

  ensureDemoData(usKey);

  const rows=PD.us[usKey];
  // Canon y Aguas = mes actual (CP); resto = mes anterior
  const currentPeriod=(usKey==='aguas')?CP:prevMonth(CP);

  // Generar todos los períodos desde 12 meses atrás hasta el actual
  // Esto asegura que aparezcan meses aunque no estén en APS
  const periodsSet=new Set();
  const [cy,cm]=currentPeriod.split('-').map(Number);
  for(let i=11;i>=0;i--){
    let y=cy,m=cm-i;
    while(m<=0){m+=12;y--;}
    periodsSet.add(`${y}-${String(m).padStart(2,'0')}`);
  }
  // Agregar también los que están en APS y los que tienen datos en PD
  rows.forEach(r=>{if(r.period<=currentPeriod)periodsSet.add(r.period);});
  APS.filter(p=>p<=currentPeriod).forEach(p=>periodsSet.add(p));
  periodsSet.add(currentPeriod);
  const sortedPeriods=[...periodsSet].sort((a,b)=>a.localeCompare(b));

  const histData={};
  for(const p of sortedPeriods){
    if(p===CP){
      // Período actual: usar PD en memoria (puede tener ediciones no guardadas)
      const localRow=rows.find(r=>r.period===p);
      if(localRow){histData[p]=localRow;}
    } else {
      // Períodos anteriores: leer siempre desde storage para no perder datos del usuario
      const raw=await sGet('data:'+p,true);
      if(raw){
        const d=mergeDef(JSON.parse(raw));
        const r=d.us[usKey].find(x=>x.period===p);
        if(r){histData[p]=r;continue;}
      }
      // Fallback: buscar en PD actual (por si no hay en storage)
      const localRow=rows.find(r=>r.period===p);
      if(localRow)histData[p]=localRow;
    }
  }

  // ── CANON SERVICIOS: tabla especial ──────────────────────────
  if(usKey==='canon'){
    ensureCanonData(); // carga datos históricos reales + asegura período actual
    const canonLitros=await loadCanonLitros();
    const litrosFijos=canonLitros.litros||0;
    const litrosLocked=canonLitros.locked!==false;
    const lro=litrosLocked?'readonly':'';
    const lbgl=litrosLocked?'background:#F0FFF4;border-color:#C8E6C9;':'';
    const canonCurrentPeriod=CP;
    // Usar PD.us.canon directamente (no histData que puede tener datos viejos)
    const canonPeriods=[...new Set(PD.us.canon.map(r=>r.period).filter(p=>p<=canonCurrentPeriod))].sort((a,b)=>a.localeCompare(b));

    // Cuadro de Litros SUPER

        <div style="display:flex;align-items:center;gap:8px;">

          <span style="font-size:14px;font-weight:700;color:var(--m2);">Lt</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:2px;">
        ${litrosLocked
          ?`<button id="canon-litros-edit" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;">✏ Editar</button>`
          :`<button id="canon-litros-save" style="background:var(--g);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar</button>`

      </div>
      <div style="color:var(--m2);font-size:12px;border-left:2px solid var(--b);padding-left:16px;">
        Fórmula: <strong>Litros × Precio Super = Importe &nbsp;|&nbsp; Recuperar = Importe + IVA 21%</strong>

    let tableRows='';
    for(const p of canonPeriods){

      const precio=row?row.precioSuper:null;
      const nro=row?row.nroFacturaACA||'':'';

  el.querySelectorAll('tr[data-row-period][data-locked="false"]').forEach(trEl=>{

  // ── Editar (desbloquea la fila) — excluye canon que tiene handler propio ──
  el.querySelectorAll('[data-edit-us]:not([data-edit-us="canon"])').forEach(btn=>{

  // Upload factura servicio
  el.querySelectorAll('[data-upload-us]').forEach(inp=>{

      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const key=inp.getAttribute('data-upload-us');

      try{
        const dataUrl=await readDU(file);

        await sSet('file:'+fileKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl}),true);

        if(rowIdx===-1){PD.us[key].push({period});rowIdx=PD.us[key].length-1;}
        PD.us[key][rowIdx].facturaServicio={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};

      if(rowIdx!==-1)PD.us[key][rowIdx].facturaServicio=null;

  });

  // Ver archivo
  el.querySelectorAll('[data-ver-file]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const fk=btn.getAttribute('data-ver-file');
      showLoad(true);
      const raw=await sGet('file:'+fk,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      const f=JSON.parse(raw);
      openFileViewer(f);
    });
  });
}

// ── VISOR DE ARCHIVO INLINE ───────────────────────────────────
function openFileViewer(f){
  const isImg=f.type&&f.type.startsWith('image/');
  const wrap=document.createElement('div');
  wrap.className='file-viewer-wrap';
  wrap.id='fv-wrap';

  let content='';
  let blobUrl=null;

  if(isImg){
    content=`<img src="${f.dataUrl}" alt="${esc(f.fileName)}" style="max-width:100%;max-height:80vh;display:block;margin:auto;object-fit:contain;">`;
  } else {
    // Convertir base64 a Blob para que el iframe funcione en todos los browsers
    try{
      const b64=f.dataUrl.split(',')[1];
      const byteChars=atob(b64);
      const byteNums=new Array(byteChars.length);
      for(let i=0;i<byteChars.length;i++)byteNums[i]=byteChars.charCodeAt(i);
      const blob=new Blob([new Uint8Array(byteNums)],{type:'application/pdf'});
      blobUrl=URL.createObjectURL(blob);
      content=`<iframe src="${blobUrl}" style="width:100%;height:100%;border:none;" title="${esc(f.fileName)}"></iframe>`;
    }catch(e){
      // Fallback a dataUrl
      content=`<iframe src="${f.dataUrl}" style="width:100%;height:100%;border:none;" title="${esc(f.fileName)}"></iframe>`;
    }
  }

  wrap.innerHTML=`
    <div class="file-viewer-bar">
      <span>📎 ${esc(f.fileName)}</span>
      <div style="display:flex;gap:8px;align-items:center;">
        ${blobUrl?`<a href="${blobUrl}" download="${esc(f.fileName)}" style="background:rgba(255,255,255,.2);color:#fff;text-decoration:none;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;">⬇ Descargar</a>`:''}
        <button id="fv-close" title="Cerrar" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:5px;padding:4px 10px;font-size:14px;cursor:pointer;">✕</button>
      </div>
    </div>
    <div class="file-viewer-content">${content}</div>`;

  document.body.appendChild(wrap);
  document.getElementById('fv-close').addEventListener('click',()=>{
    if(blobUrl)URL.revokeObjectURL(blobUrl);
    wrap.remove();
  });
  wrap.addEventListener('click',e=>{if(e.target===wrap){
    if(blobUrl)URL.revokeObjectURL(blobUrl);
    wrap.remove();
  }});
}

function ensureFullHistory(){
  if(!PD.fullHistory) PD.fullHistory=[];
  const existingPeriods=new Set(PD.fullHistory.map(r=>r.period));
  for(const row of REAL_DATA_FULL){
    if(!existingPeriods.has(row.period)) PD.fullHistory.push({...row});
  }
}

function calcIntereses(f, periodo){
  const tasa=pN(f.interesMensual);
  const diasAtr=pN(f.diasAtrasados);
  if(!tasa||!diasAtr||!f.ventas)return null;
  // Usar el período que se está liquidando para calcular días del mes
  const per=periodo||prevMonth(CP);
  const [y,m]=per.split('-').map(Number);
  const diasMes=new Date(y,m,0).getDate();
  const tasaDiaria=tasa/diasMes;
  const montoInt=f.ventas.recupero12*(tasaDiaria/100)*diasAtr;
  return{tasaDiaria,montoInt};
}

  const currentPeriod=prevMonth(CP);

  // Generar todos los períodos desde 12 meses atrás hasta el actual

  const[cy,cm]=currentPeriod.split('-').map(Number);
  for(let i=11;i>=0;i--){
    let y=cy,m=cm-i;
    while(m<=0){m+=12;y--;}
    allPeriods.add(`${y}-${String(m).padStart(2,'0')}`);
  }
  allPeriods.add(currentPeriod);
  history.forEach(r=>{if(r.period<=currentPeriod)allPeriods.add(r.period);});

  // Construir filas: usar historial si existe, o fila vacía

  ensureHotelTelHistory();
  ensureCanonHistory();

  // Generar todos los períodos desde 12 meses atrás
  function buildPeriods(history,current){
    const all=new Set();
    const[cy,cm]=current.split('-').map(Number);
    for(let i=11;i>=0;i--){let y=cy,m=cm-i;while(m<=0){m+=12;y--;}all.add(`${y}-${String(m).padStart(2,'0')}`);}
    all.add(current);
    history.forEach(r=>{if(r.period<=current)all.add(r.period);});
    return [...all].sort((a,b)=>a.localeCompare(b));
  }

  // ── CANON ALOJAMIENTO — tabla histórica estilo Full ───────────
  const canonPeriods=buildPeriods(PD.hotel.canonHistory||[],currentPeriod);
  const canonRows=canonPeriods.map(p=>{
    const ex=(PD.hotel.canonHistory||[]).find(r=>r.period===p);
    return ex||{period:p,factNro:'',factTotal:null,ncNro:'',ncTotal:null,transferencia:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};
  });

  const th=`padding:9px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;text-align:center;`;

  const canonTrs=canonRows.map(row=>{
    const isCurr=row.period===currentPeriod;

    const transf=row.factTotal&&row.ncTotal!=null?(row.factTotal-row.ncTotal):row.factTotal||null;

    };

    if(!isCurr || locked){
      // Fila histórica (o ACTUAL ya guardada)
      return `<tr style="background:${isCurr?'#F0FFF4':locked?'#F8FFF8':'#FFFFF0'};${isCurr?'border-left:4px solid var(--g);':''}">
        <td style="padding:7px 10px;border:1px solid #D4C830;font-weight:700;font-size:13px;text-align:center;white-space:nowrap;">

        <td style="padding:7px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;">${row.factNro?`<div style="font-size:11px;color:var(--m2);">N° ${esc(row.factNro)}</div>`:''}<div style="font-weight:700;color:var(--g);">${row.factTotal?'$ '+fmtArg(row.factTotal):'—'}</div></td>

              style="width:100%;padding:8px 10px;border:1px solid var(--b);border-radius:7px;font-size:13px;">

            <button data-canon-save="${row.period}" style="background:var(--g);color:#fff;border:none;border-radius:7px;padding:8px 20px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar</button>
          </div>

  }).join('');

  const canonHtml=`<div class="card" style="order:-1;">
    <div class="card-header"><h3>🏨 Canon Alojamiento</h3></div>
    <div class="card-body" style="padding:0;">
      <div style="overflow-x:auto;">

function attachHotel(){
  const el=document.getElementById('tab-content');

  // ── CANON handlers ────────────────────────────────────────────
  if(!PD.hotel.canonHistory) PD.hotel.canonHistory=[];

  // Extraer N° y total de un PDF de ACA usando pdf.js
  async function extractCanonPDF(file){
    try{
      const pdfjsLib=window['pdfjs-dist/build/pdf'];
      if(!pdfjsLib)throw new Error('pdf.js no disponible');
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const ab=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
      let text='';
      for(let i=1;i<=pdf.numPages;i++){
        const page=await pdf.getPage(i);
        const content=await page.getTextContent();
        // Extraer línea por línea (un item por str)
        text+=content.items.map(it=>it.str).join('\n')+'\n';
      }
      const parsed=parseHotelPDF(text);
      return{
        nroFactura: parsed.tipo==='FACTURA' ? parsed.nroCompleto : null,
        nroNC:      parsed.tipo==='N.CREDITO'? parsed.nroCompleto: null,
        total:      parsed.total ? Math.abs(parsed.total) : null
      };
    }catch(err){
      console.warn('extractCanonPDF error:',err.message);
      return{nroFactura:null,nroNC:null,total:null};
    }
  }

  // Upload archivos del canon por fila
  el.querySelectorAll('[data-canon-upload-row]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0]; if(!file) return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const slotKey=inp.getAttribute('data-canon-upload-row');
      const period=inp.getAttribute('data-canon-period');
      // Guardar campos manuales ANTES de todo para no perderlos al re-renderizar
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      const fnroEl=el.querySelector('#canon-fact-nro-'+period);
      const ftotEl=el.querySelector('#canon-fact-total-'+period);
      const ncnroEl=el.querySelector('#canon-nc-nro-'+period);
      const nctotEl=el.querySelector('#canon-nc-total-'+period);
      const reciboEl=el.querySelector('#canon-recibo-'+period);
      if(fnroEl?.value.trim()) row.factNro=fnroEl.value.trim();
      if(ftotEl?.value) row.factTotal=parseFloat(ftotEl.value)||row.factTotal;
      if(ncnroEl?.value.trim()) row.ncNro=ncnroEl.value.trim();
      if(nctotEl?.value) row.ncTotal=parseFloat(nctotEl.value)||row.ncTotal;
      if(reciboEl?.value.trim()) row.nroRecibo=reciboEl.value.trim();
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+slotKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        const meta={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        if(slotKey.endsWith(':fact')){
          row.facturaACA=meta;
          const ex=await extractCanonPDF(file);
          if(ex.nroFactura){row.factNro=ex.nroFactura; toast(`Factura cargada ✓ — N° ${ex.nroFactura}${ex.total?' · $'+fmtArg(ex.total):''}`);}
          else toast('Factura cargada ✓');
          if(ex.total) row.factTotal=ex.total;
        } else if(slotKey.endsWith(':nc')){
          row.notaCredito=meta;
          const ex=await extractCanonPDF(file);
          if(ex.nroNC){row.ncNro=ex.nroNC; toast(`NC cargada ✓ — N° ${ex.nroNC}${ex.total?' · $'+fmtArg(ex.total):''}`);}
          else toast('Nota de crédito cargada ✓');
          if(ex.total) row.ncTotal=ex.total;
        } else if(slotKey.endsWith(':transf')){
          row.transf=meta;
          toast('Comprobante cargado ✓');
        }
        await saveP();
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);
      renderTab();
    });
  });

  // Recálculo live de transferencia al escribir montos
  el.querySelectorAll('.canon-recalc').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.getAttribute('data-canon-period');
      const ft=parseFloat(el.querySelector('#canon-fact-total-'+period)?.value)||0;
      const nc=parseFloat(el.querySelector('#canon-nc-total-'+period)?.value)||0;
      const disp=document.getElementById('canon-transf-display-'+period);
      if(disp) disp.textContent=ft>0?'$ '+fmtArg(ft-nc):'—';
    });
  });

  // Guardar fila canon — lee campos manuales
  el.querySelectorAll('[data-canon-save]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-save');
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      // Leer campos manuales
      row.factNro  = el.querySelector('#canon-fact-nro-'+period)?.value.trim()||row.factNro||'';
      row.factTotal= parseFloat(el.querySelector('#canon-fact-total-'+period)?.value)||row.factTotal||null;
      row.ncNro    = el.querySelector('#canon-nc-nro-'+period)?.value.trim()||row.ncNro||'';
      row.ncTotal  = parseFloat(el.querySelector('#canon-nc-total-'+period)?.value)||row.ncTotal||null;
      row.nroRecibo= el.querySelector('#canon-nro-'+period)?.value.trim()||'';
      row.locked=true;
      showLoad(true);await saveP();showLoad(false);toast('Canon guardado ✓');renderTab();
    });
  });

  // N° Recibo ACA editable inline en filas bloqueadas
  el.querySelectorAll('[data-canon-recibo-inline]').forEach(inp=>{
    inp.addEventListener('change',async()=>{
      const period=inp.getAttribute('data-canon-recibo-inline');
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      row.nroRecibo=inp.value.trim();
      showLoad(true);await saveP();showLoad(false);
      toast('N° Recibo guardado ✓');
    });
  });

  // Editar fila canon
  el.querySelectorAll('[data-canon-edit]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-edit');
      if(!PD.hotel.canonHistory)PD.hotel.canonHistory=[];
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){
        row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,transferencia:null,
             nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};
        PD.hotel.canonHistory.push(row);
        PD.hotel.canonHistory.sort((a,b)=>a.period.localeCompare(b.period));
      }
      row.locked=false;
      await saveP();renderTab();
    });
  });

  // Eliminar fila completa del canon
  el.querySelectorAll('[data-canon-row-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-canon-row-del');
      if(!confirm('¿Eliminar todos los datos del canon de '+periodLabel(period)+'?'))return;
      showLoad(true);
      await sDel('file:canon:'+period+':fact',true);
      await sDel('file:canon:'+period+':nc',true);
      await sDel('file:canon:'+period+':transf',true);
      PD.hotel.canonHistory=PD.hotel.canonHistory.filter(r=>r.period!==period);
      await saveP();showLoad(false);toast('Eliminado');renderTab();
    });
  });

  // Eliminar archivo canon
  el.querySelectorAll('[data-canon-file-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar este archivo?'))return;
      const slotKey=btn.getAttribute('data-canon-file-del');
      const period=btn.getAttribute('data-canon-period');
      showLoad(true);
      await sDel('file:'+slotKey,true);
      const row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(row){
        if(slotKey.endsWith(':fact')){row.facturaACA=null;row.factNro='';row.factTotal=null;}
        else if(slotKey.endsWith(':nc')){row.notaCredito=null;row.ncNro='';row.ncTotal=null;}
        else if(slotKey.endsWith(':transf')){row.transf=null;}
      }
      await saveP();showLoad(false);renderTab();
    });
  });

  // ── TELÉFONO handlers ─────────────────────────────────────────
  // Live recalc
  el.querySelectorAll('[data-tel-f]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.getAttribute('data-tel-p');
      const field=inp.getAttribute('data-tel-f');
      const row=PD.hotel.telHistory.find(r=>r.period===period);
      if(row){
        row[field]=inp.type==='number'?pN(inp.value):inp.value;
        const rec=calcRec(row);
        const td=document.getElementById('tel-rec-'+period);
        if(td)td.textContent=rec!==null?'$ '+fmt(rec):'—';
        saveD();
      }
    });
  });

  // Guardar fila teléfono
  el.querySelectorAll('[data-tel-save]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-tel-save');
      let row=PD.hotel.telHistory.find(r=>r.period===period);
      if(!row){row={period};PD.hotel.telHistory.push(row);}
      const tr=el.querySelector(`tr[data-tel-row="${period}"]`);
      if(tr){
        tr.querySelectorAll('[data-tel-f]').forEach(inp=>{
          const f=inp.getAttribute('data-tel-f');
          row[f]=inp.type==='number'?pN(inp.value):inp.value;
        });
      }
      row.locked=true;
      showLoad(true);await saveP();showLoad(false);toast('Guardado ✓');renderTab();
    });
  });

  // Editar fila teléfono
  el.querySelectorAll('[data-tel-edit]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-tel-edit');
      if(!PD.hotel.telHistory)PD.hotel.telHistory=[];
      let row=PD.hotel.telHistory.find(r=>r.period===period);
      if(!row){
        row={period,importe:null,iva:0,percepciones:0,intereses:0,
             nroFacturaACA:'',fecha:'',facturaServicio:null,locked:false};
        PD.hotel.telHistory.push(row);
        PD.hotel.telHistory.sort((a,b)=>a.period.localeCompare(b.period));
      }
      row.locked=false;
      await saveP();renderTab();
    });
  });

  // Upload factura teléfono
  el.querySelectorAll('[data-tel-upload]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande');return;}
      const period=inp.getAttribute('data-tel-upload');
      const fileKey=`hotel.tel:${period}:fs`;
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+fileKey,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        let row=PD.hotel.telHistory.find(r=>r.period===period);
        if(!row){row={period};PD.hotel.telHistory.push(row);}
        row.facturaServicio={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        await saveP();toast('Factura subida ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // Eliminar factura teléfono
  el.querySelectorAll('[data-tel-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar factura?'))return;
      const period=btn.getAttribute('data-tel-del');
      showLoad(true);
      await sDel('file:hotel.tel:'+period+':fs',true);
      const row=PD.hotel.telHistory.find(r=>r.period===period);
      if(row)row.facturaServicio=null;
      await saveP();showLoad(false);toast('Eliminada');renderTab();
    });
  });

  // Ver factura teléfono
  // ── Guardar inputs del canon en tiempo real (sin renderTab) ──
  el.querySelectorAll('[id^="canon-fact-nro-"],[id^="canon-fact-total-"],[id^="canon-nc-nro-"],[id^="canon-nc-total-"],[id^="canon-nro-"]').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const period=inp.id.split('-').pop();
      let row=PD.hotel.canonHistory.find(r=>r.period===period);
      if(!row){row={period,factNro:'',factTotal:null,ncNro:'',ncTotal:null,nroRecibo:'',facturaACA:null,notaCredito:null,transf:null,locked:false};PD.hotel.canonHistory.push(row);}
      if(inp.id.startsWith('canon-fact-nro-')) row.factNro=inp.value.trim();
      else if(inp.id.startsWith('canon-fact-total-')){ row.factTotal=parseFloat(inp.value)||null; }
      else if(inp.id.startsWith('canon-nc-nro-')) row.ncNro=inp.value.trim();
      else if(inp.id.startsWith('canon-nc-total-')){ row.ncTotal=parseFloat(inp.value)||null; }
      else if(inp.id.startsWith('canon-nro-')) row.nroRecibo=inp.value.trim();
      // Recalcular transferencia en tiempo real
      if(inp.id.startsWith('canon-fact-total-')||inp.id.startsWith('canon-nc-total-')){
        const ft=row.factTotal||0, nc=row.ncTotal||0;
        const disp=document.getElementById('canon-transf-display-'+period);
        if(disp) disp.textContent=ft>0?'$ '+fmtArg(ft-nc):'—';
      }
      saveD(); // guardar sin renderTab
    });
  });

  // Búsqueda en tabla teléfono
  activateSearch('hotel-tel-search','table.ex tbody tr[data-tel-row]');

  // Handlers genéricos de archivos (canon)
  attachGenericFiles();
}

// ── VARIOS ────────────────────────────────────────────────────
function renderVarios(){
  let html=`<div class="cards">`;
  VARIOS_ITEMS.forEach(it=>{
    const rows=PD.varios[it.key];
    const rhtml=rows.length?rows.map(r=>renderVRow(it.key,r)).join(''):'<p style="color:var(--m2);margin:0;font-size:13px;">Sin comprobantes.</p>';
    html+=`<div class="card"><div class="card-header"><h3>${esc(it.label)}</h3><button class="btn-add" data-va="${it.key}">+ Agregar</button></div><div class="card-body varios-rows">${rhtml}</div></div>`;
  });
  return html+`</div>`;
}
function renderVRow(ik,row){
  const sid=`varios.${ik}.${row.id}`;
  return`<div class="vrow">
    <select data-vt="${sid}">${DOC_TYPES.map(t=>`<option ${row.tipo===t?'selected':''}>${t}</option>`).join('')}</select>
    <input type="number" step="0.01" placeholder="Monto" data-vm="${sid}" value="${row.monto!=null?row.monto:''}">
    ${renderFileSlotG(sid,'Comprobante (PDF)',row.file,true,CP)}
    <button class="btn-lnk d" data-vr="${sid}">Quitar</button>
  </div>`;
}

// ── RESUMEN ───────────────────────────────────────────────────
function renderResumen(){
  const usCompleto=US_ITEMS.filter(it=>isUSDone(it.key)).length;
  const fullOk=!!PD.full.ventas;
  const fullM=fullOk?PD.full.ventas.recupero12:0;
  const hotelOk=rowDone(PD.hotel.telefono);
  const canonOk=!!PD.hotel.canonAlojamiento;
  let vT=0,vC=0;
  VARIOS_ITEMS.forEach(it=>{PD.varios[it.key].forEach(r=>{vC++;if(typeof r.monto==='number')vT+=(r.tipo==='Nota de Crédito'?-r.monto:r.monto);});});
  const usRows=US_ITEMS.map(it=>{
    const rows=PD.us[it.key];
    const curr=rows.find(r=>r.period===CP);
    const rec=curr?calcRec(curr):null;
    return`<tr><td>${it.icon} ${it.label}</td><td>${rowDone(curr||{})?`<span style="color:var(--g);">✓</span> ${curr.nroFacturaACA} — ${curr.fecha}`:'<span style="color:var(--r);">Pendiente</span>'}</td><td style="text-align:right">${fmtM(rec)}</td></tr>`;
  }).join('');
  return`<div class="cards">
    <div class="card"><div class="card-header"><h3>Estado del período ${CP}</h3></div><div class="card-body">
      <table class="resumen-table"><tr><th>Ítem</th><th>Estado</th><th>Monto</th></tr>
        ${usRows}
        <tr><td>Full</td><td>${fullOk?'✓ Calculado':'Sin excel'}</td><td style="text-align:right">${fullOk?'$ '+fmt(fullM):'—'}</td></tr>
        <tr><td>Hotel — Teléfono</td><td>${hotelOk?'✓':'Pendiente'}</td><td>—</td></tr>
        <tr><td>Hotel — Canon</td><td>${canonOk?'✓ Cargado':'Pendiente'}</td><td>—</td></tr>
        <tr><td>Varios (${vC})</td><td></td><td style="text-align:right">$ ${fmt(vT)}</td></tr>
        <tr class="tr-total"><td colspan="2">Total (Full + Varios)</td><td style="text-align:right">$ ${fmt(fullM+vT)}</td></tr>
      </table>
    </div></div>
    <div class="card"><div class="card-header"><h3>Historial de períodos</h3></div>
    <div class="card-body" id="hist-body"><p style="color:var(--m2)">Cargando…</p></div></div>
  </div>`;
}
async function loadHist(){
  const body=document.getElementById('hist-body');
  if(!body)return;
  const rows=[];
  for(const p of [...APS].sort((a,b)=>b.localeCompare(a))){
    const raw=await sGet('data:'+p,true);
    if(!raw)continue;
    const d=mergeDef(JSON.parse(raw));
    const usDone=US_ITEMS.filter(it=>d.us[it.key].some(r=>r.period===p&&rowDone(r))).length;
    const fullM=(d.full&&d.full.ventas)?d.full.ventas.recupero12:null;
    rows.push({p,usDone,fullM});
  }
  body.innerHTML=rows.length
    ?`<table class="resumen-table"><tr><th>Período</th><th>US</th><th>Full</th></tr>`+
      rows.map(r=>`<tr><td>${r.p}</td><td>${r.usDone}/${US_ITEMS.length}</td><td>${r.fullM!=null?'$ '+fmt(r.fullM):'—'}</td></tr>`).join('')+`</table>`
    :'<p style="color:var(--m2)">Sin datos todavía.</p>';
}

// ── FILE SLOT GENÉRICO ────────────────────────────────────────
function renderFileSlotG(slotId,label,fileMeta,editable,period){
  let actions;
  if(fileMeta){
    actions=`<button class="btn-lnk" data-view="${slotId}" data-view-period="${period}">Ver</button>`;
    if(editable)actions+=` <button class="btn-lnk d" data-delete="${slotId}">Eliminar</button>`;
  }else{
    actions=editable?`<label class="btn-ul" style="font-size:12px;padding:6px 12px;">Subir<input type="file" data-upload="${slotId}" hidden></label>`:`<span style="color:var(--m2);font-size:12px;">Sin archivo</span>`;
  }
  return`<div class="file-slot"><div class="fsl">${esc(label)}</div><div class="fsi">${fileMeta?esc(fileMeta.fileName):'<span style="color:var(--m2)">Sin subir</span>'}</div><div class="fsa">${actions}</div></div>`;
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(!CU){app.innerHTML=renderLogin();attachLogin();return;}
  app.innerHTML=renderShell();attachShell();
  if(CU.role==='divisional'){renderDivisionalTablero();}
  else{renderTab();}
}
function renderTab(){
  const el=document.getElementById('tab-content');
  if(!el)return;
  if(AT==='us'){
    if(usView){renderUSExcel(usView);}
    else{renderUSGrid();}
    return;
  }
  switch(AT){
    case 'full':   el.innerHTML=renderFull();attachFull();break;
    case 'hotel':  el.innerHTML=renderHotel();attachHotel();break;
    case 'yer':    {
      const _vl=YER._viewingLiq, _bl=YER._backup, _el=YER._editingLiq, _pa=YER._periodoAnterior;
      loadYER().then(()=>{
        // Restaurar flags de estado (no se persisten en storage)
        if(_vl!=null) YER._viewingLiq=_vl;
        if(_bl!=null) YER._backup=_bl;
        if(_el!=null) YER._editingLiq=_el;
        if(_pa!=null) YER._periodoAnterior=_pa;
        el.innerHTML=renderYER();
        attachYER();
      });break;
    }
    case 'checks': {
      (async()=>{
        el.innerHTML=renderChecksGrid();
        attachChecks();
        if(checksView){
          el.innerHTML=await renderChecksMes(checksView);
          attachChecks();
        }
      })();
      break;
    }
    case 'cancel': el.innerHTML=renderCancel();attachCancel();break;
    case 'varios': el.innerHTML=renderVarios();attachVarios();break;
    case 'resumen':el.innerHTML=renderResumen();loadHist();break;
  }
  attachGenericFiles();
}

// ── GENERIC FILE HANDLERS ─────────────────────────────────────
function attachGenericFiles(){
  const el=document.getElementById('tab-content');
  el.querySelectorAll('[data-upload]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const sid=inp.getAttribute('data-upload');
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      // Si es un archivo de Full, preservar campos manuales
      if(sid.startsWith('full.')){
        const nro=el.querySelector('#full-nro-aca')?.value.trim()||'';
        const fecha=el.querySelector('#full-fecha-cancel')?.value||'';
        const tasa=el.querySelector('#full-tasa')?.value||'';
        const dias=el.querySelector('#full-dias')?.value||'';
        if(nro) PD.full.nroFacturaACA=nro;
        if(fecha) PD.full.fechaCancelacion=fecha;
        if(tasa) PD.full.interesMensual=tasa;
        if(dias) PD.full.diasAtrasados=dias;
      }
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:'+CP+':'+sid,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        setMeta(sid,{fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()});
        await saveP();toast('Archivo guardado ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });
  el.querySelectorAll('[data-view]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const sid=btn.getAttribute('data-view');
      const period=btn.getAttribute('data-view-period')||CP;
      showLoad(true);
      // Los archivos del canon se guardan como file:canon:PERIOD:fact (sid ya tiene la clave completa)
      // Los archivos normales se guardan como file:PERIOD:sid
      // Detectar: si sid empieza con "canon:" o "tel:" la clave es file:sid
      let raw=null;
      if(sid.startsWith('canon:')||sid.startsWith('tel:')){
        raw=await sGet('file:'+sid,true);
      } else {
        raw=await sGet('file:'+period+':'+sid,true);
      }
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo. Puede que no esté guardado en Firebase todavía.');return;}
      openFileViewer(JSON.parse(raw));
    });
  });
  el.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      if(!confirm('¿Eliminar este archivo?'))return;
      const sid=btn.getAttribute('data-delete');
      showLoad(true);
      await sDel('file:'+CP+':'+sid,true);
      setMeta(sid,null);
      await saveP();showLoad(false);toast('Eliminado');renderTab();
    });
  });
}
function setMeta(sid,meta){
  if(sid==='full.ventas'){PD.full.ventas=meta;return;}
  if(sid==='full.facturaACA'){PD.full.facturaACA=meta;return;}
  if(sid==='full.comprobanteTransferencia'){PD.full.comprobanteTransferencia=meta;return;}
  if(sid==='hotel.canon.factura'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.facturaACA=meta;return;}
  if(sid==='hotel.canon.nc'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.notaCredito=meta;return;}
  if(sid==='hotel.canon.transf'){if(!PD.hotel.canon)PD.hotel.canon={};PD.hotel.canon.transferencia=meta;return;}
  if(sid==='hotel.canon'){PD.hotel.canonAlojamiento=meta;return;}
  if(sid==='hotel.tel.fs'){PD.hotel.telefono.facturaServicio=meta;return;}
  if(sid.startsWith('varios.')){
    const p=sid.split('.');
    const row=PD.varios[p[1]].find(r=>r.id===p[2]);
    if(row)row.file=meta;
  }
}

// ── FULL HANDLERS ─────────────────────────────────────────────
function attachFull(){
  const el=document.getElementById('tab-content');

  // Subir excel (fila actual)
  const xi=el.querySelector('#full-xl');
  if(xi)xi.addEventListener('change',async e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>MAX_FILE){alert('Archivo muy grande.');return;}
    // Guardar campos manuales antes de procesar para no perderlos
    const nro=el.querySelector('#full-nro-aca')?.value.trim()||'';
    const fecha=el.querySelector('#full-fecha-cancel')?.value||'';
    const tasa=el.querySelector('#full-tasa')?.value||'';
    const dias=el.querySelector('#full-dias')?.value||'';
    if(nro) PD.full.nroFacturaACA=nro;
    if(fecha) PD.full.fechaCancelacion=fecha;
    if(tasa) PD.full.interesMensual=tasa;
    if(dias) PD.full.diasAtrasados=dias;
    showLoad(true);
    try{
      const buf=await file.arrayBuffer();
      const calc=parseVentas(buf);
      if(!calc){showLoad(false);alert('No se encontraron filas del Sector 2 o 21.');return;}
      const du=await readDU(file);
      await sSet('file:'+CP+':full.ventas',JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
      PD.full.ventas={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString(),...calc};
      await saveP();toast('Excel procesado ✓');
    }catch(err){alert('Error: '+err.message);}
    showLoad(false);renderTab();
  });

  // Ver excel inline
  el.querySelectorAll('[data-view-excel]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const sid=btn.getAttribute('data-view-excel');
      showLoad(true);
      const raw=await sGet('file:'+CP+':'+sid,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      openExcelViewer(JSON.parse(raw));
    });
  });

  // Editar fila histórica del Full
  el.querySelectorAll('.full-hist-edit').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-period');
      if(!PD.fullHistory)PD.fullHistory=[];
      let row=PD.fullHistory.find(r=>r.period===period);
      if(!row){
        // Crear fila vacía para el período si no existe
        row={period,importe:null,cigarrillos:null,recuperar:null,nroFacturaACA:'',
             fechaCancelacion:'',interesMensual:'',diasAtrasados:'',
             comprobanteTransferencia:null,facturaACA:null,locked:false,ventas:null};
        PD.fullHistory.push(row);
        PD.fullHistory.sort((a,b)=>a.period.localeCompare(b.period));
      }
      row.locked=false;
      // Cargar este período como el activo para editar
      // Copiar datos de la fila al PD.full actual para que el formulario de edición los muestre
      PD.full={...PD.full,
        ventas:row.ventas||null,
        nroFacturaACA:row.nroFacturaACA||'',
        fechaCancelacion:row.fechaCancelacion||'',
        interesMensual:row.interesMensual||'',
        diasAtrasados:row.diasAtrasados||'',
        comprobanteTransferencia:row.comprobanteTransferencia||null,
        facturaACA:row.facturaACA||null,
        locked:false,
        _editingPeriod:period  // marcar qué período se está editando
      };
      await saveP();
      renderTab();
    });
  });

  // Carga manual (contingencia)
  el.querySelector('#full-manual-btn')?.addEventListener('click',()=>{
    const form=el.querySelector('#full-manual-form');
    if(form) form.style.display=form.style.display==='none'?'block':'none';
  });
  const manTotal=el.querySelector('#full-man-total');
  const manCig=el.querySelector('#full-man-cig');
  const recalcManual=()=>{
    const tot=pN(manTotal?.value)||0;
    const cig=pN(manCig?.value)||0;
    const base=tot-cig;
    const rec=base*0.12;
    const baseEl=el.querySelector('#full-man-base');
    const recEl=el.querySelector('#full-man-rec');
    if(baseEl)baseEl.textContent=tot?'$ '+fmt(base):'—';
    if(recEl)recEl.textContent=tot?'$ '+fmt(rec):'—';
  };
  manTotal?.addEventListener('input',recalcManual);
  manCig?.addEventListener('input',recalcManual);
  el.querySelector('#full-man-confirm')?.addEventListener('click',async()=>{
    const tot=pN(manTotal?.value)||0;
    const cig=pN(manCig?.value)||0;
    if(!tot){alert('Ingresá el total de ventas.');return;}
    const base=tot-cig;
    PD.full.ventas={fileName:'Carga manual',size:0,uploadedAt:new Date().toISOString(),
      totalVentas:tot,cigarrillos:cig,base,recupero12:base*0.12,manual:true};
    showLoad(true);await saveP();showLoad(false);toast('Datos cargados ✓');renderTab();
  });
  function recalcIntereses(){
    const tasa=pN(el.querySelector('#full-tasa')?.value);
    const diasAtr=pN(el.querySelector('#full-diasatr')?.value);
    const [y,m]=prevMonth(CP).split('-').map(Number);
    const diasMes=new Date(y,m,0).getDate();
    const icEl=el.querySelector('#full-intcalc');
    const totEl=document.getElementById('full-total');
    const subtotal=PD.full.ventas?PD.full.ventas.recupero12:0;
    if(tasa&&diasMes){
      const tasaDiaria=tasa/diasMes;
      const montoInt=(diasAtr&&PD.full.ventas)?subtotal*(tasaDiaria/100)*diasAtr:0;
      if(icEl)icEl.value=montoInt.toFixed(2);
      if(totEl)totEl.textContent='$ '+fmt(subtotal+montoInt);
      PD.full.interesMensual=String(tasa);
      if(diasAtr)PD.full.diasAtrasados=String(diasAtr);
      PD.full.importe_interes=montoInt; // guardar para persistir
      saveD();
    } else {
      if(icEl)icEl.value='';
      if(totEl)totEl.textContent='$ '+fmt(subtotal);
      PD.full.importe_interes=0;
    }
  }
  el.querySelector('#full-tasa')?.addEventListener('input',recalcIntereses);
  el.querySelector('#full-diasatr')?.addEventListener('input',recalcIntereses);

  // ── Subir comprobante en fila histórica ──
  el.querySelectorAll('[data-upload-full-comp]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const period=inp.getAttribute('data-upload-full-comp');
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:full:comp:'+period,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        if(!PD.fullHistory)PD.fullHistory=[];
        const row=PD.fullHistory.find(r=>r.period===period);
        const meta={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        if(row){row.comprobanteTransferencia=meta;}
        // También actualizar en PD.full si es el período actual
        if(period===prevMonth(CP)) PD.full.comprobanteTransferencia=meta;
        await saveP();toast('Comprobante subido ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // ── Ver comprobante en fila histórica ──
  el.querySelectorAll('[data-view-full-comp]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const period=btn.getAttribute('data-view-full-comp');
      showLoad(true);
      const raw=await sGet('file:full:comp:'+period,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      openFileViewer(JSON.parse(raw));
    });
  });

  // ── Nuevo mes ──
  el.querySelector('#full-nuevo-mes')?.addEventListener('click',async()=>{
    if(!confirm('¿Iniciar el recupero del nuevo mes?\nSe va a limpiar el formulario actual.'))return;
    PD.full={ventas:null,nroFacturaACA:'',facturaACA:null,fechaCancelacion:'',comprobanteTransferencia:null,interesMensual:'',diasAtrasados:'',locked:false};
    showLoad(true);await saveP();showLoad(false);
    toast('Listo para el nuevo mes ✓');renderTab();
  });

  // ── Guardar registro de cancelación ──
  el.querySelector('#full-reg-save')?.addEventListener('click',async()=>{
    const nro=el.querySelector('#full-nro-aca')?.value.trim()||'';
    const fecha=el.querySelector('#full-fecha-cancel')?.value||'';
    PD.full.nroFacturaACA=nro;
    PD.full.fechaCancelacion=fecha;
    PD.full.locked=true;

    // Determinar el período a guardar — puede ser un período histórico editado
    const targetPeriod=PD.full._editingPeriod||prevMonth(CP);

    // Calcular totales para guardar en historial
    const int=calcIntereses(PD.full, PD.full._editingPeriod||prevMonth(CP));
    const subtotal=PD.full.ventas?PD.full.ventas.recupero12:null;
    const montoInt=int?int.montoInt:0;
    const totalFinal=(subtotal||0)+montoInt;

    // Guardar en fullHistory como registro del período
    if(!PD.fullHistory)PD.fullHistory=[];
    const existIdx=PD.fullHistory.findIndex(r=>r.period===targetPeriod);
    const histRow={
      period:targetPeriod,
      importe:PD.full.ventas?PD.full.ventas.totalVentas:null,
      cigarrillos:PD.full.ventas?PD.full.ventas.cigarrillos:null,
      recuperar:subtotal,
      nroFacturaACA:nro,
      fechaCancelacion:fecha,
      interesMensual:PD.full.interesMensual,
      diasAtrasados:PD.full.diasAtrasados,
      importe_interes:montoInt||null,
      totalFinal,
      comprobanteTransferencia:PD.full.comprobanteTransferencia||null,
      facturaACA:PD.full.facturaACA||null,
      ventas:PD.full.ventas||null,
      locked:true
    };
    if(existIdx>=0) PD.fullHistory[existIdx]=histRow;
    else PD.fullHistory.push(histRow);

    // Limpiar el período de edición temporal y resetear formulario si era período anterior
    const erasEditingPeriod = PD.full._editingPeriod && PD.full._editingPeriod !== prevMonth(CP);
    delete PD.full._editingPeriod;
    if(erasEditingPeriod){
      // Limpiar el formulario para que el mes actual quede vacío
      PD.full={ventas:null,nroFacturaACA:'',fechaCancelacion:'',interesMensual:'',
               diasAtrasados:'',comprobanteTransferencia:null,facturaACA:null,locked:false};
    }

    showLoad(true);await saveP();showLoad(false);
    toast('Registro guardado ✓');renderTab();
  });

  // ── Editar registro ──
  el.querySelector('#full-reg-edit')?.addEventListener('click',async()=>{
    PD.full.locked=false;
    await saveP();renderTab();
  });

  // ── Eliminar registro ──
  el.querySelector('#full-reg-del')?.addEventListener('click',async()=>{
    if(!confirm('¿Eliminar el registro de cancelación?\n(Se eliminarán también los archivos subidos)'))return;
    showLoad(true);
    await sDel('file:'+CP+':full.facturaACA',true);
    await sDel('file:'+CP+':full.comprobanteTransferencia',true);
    PD.full.nroFacturaACA='';PD.full.fechaCancelacion='';
    PD.full.facturaACA=null;PD.full.comprobanteTransferencia=null;
    PD.full.locked=false;
    await saveP();showLoad(false);toast('Registro eliminado');renderTab();
  });
}

const YER_COMBUST = [
  { key:'infinia_diesel', label:'INFINIA DIESEL', descs:['D-INFINIA'] },
  { key:'super',          label:'SUPER',           descs:['N-SUPER'] },
  { key:'infinia',        label:'INFINIA',          descs:['N-INFINIA'] },
  { key:'diesel500',      label:'DIESEL 500',       descs:['D. DIESEL 500','D-DIESEL500','DIESEL 500'] }
];

let YER = {
  pcts: { infinia_diesel:0, super:0, infinia:0, diesel500:0 },
  pctLocked: true,
  rows: [],
  evRows: [],
  ventasFile: null,
  everilioFile: null
};
let yerSub = 'diferencias';

async function loadYER(){
  const raw = await sGet('yer:'+CP, true);
  if(raw){
    YER = JSON.parse(raw);
  } else {
    // Mes nuevo: traer liqHistory y pcts del mes anterior
    const prevP=prevMonth(CP);
    const prevRaw=await sGet('yer:'+prevP,true);
    if(prevRaw){
      const prevYER=JSON.parse(prevRaw);
      // Migrar historial de liquidaciones y porcentajes, pero NO los datos del mes (rows, evRows)
      if(prevYER.liqHistory&&prevYER.liqHistory.length>0){
        YER.liqHistory=JSON.parse(JSON.stringify(prevYER.liqHistory));
      }
      if(prevYER.pcts) YER.pcts=JSON.parse(JSON.stringify(prevYER.pcts));
      // Si el mes anterior tenía una liquidación del mes anterior (la última)
      // y no está ya en el historial, agregarla
    } else {
      const praw = await sGet('yer:pcts', true);
      if(praw) YER.pcts = JSON.parse(praw);
    }
  }
  if(!YER.evRows) YER.evRows = [];
  if(!YER.everilioFile) YER.everilioFile = null;
  if(!YER.liqHistory) YER.liqHistory = [];
}
async function saveYER(){
  await sSet('yer:'+CP, JSON.stringify(YER), true);
  await sSet('yer:pcts', JSON.stringify(YER.pcts), true);
}

function parseArg(v){
  if(v===null||v===undefined||v==='') return 0;
  return parseFloat(String(v).replace(/\./g,'').replace(',','.')) || 0;
}
function fmtArg(n, dec=2){
  return new Intl.NumberFormat('es-AR',{minimumFractionDigits:dec,maximumFractionDigits:dec}).format(n);
}
function descToCombust(desc){
  const d = String(desc).trim();
  for(const c of YER_COMBUST){
    if(c.descs.some(ds => d.toLowerCase().includes(ds.toLowerCase()))) return c.key;
  }
  return null;
}
function normRemito(r){
  r = String(r).trim();
  const parts = r.split('-');
  // Comparar solo el número de remito (parte derecha), sin ceros iniciales
  // El prefijo puede variar (3573 vs 03573 vs 3753) por errores de tipeo entre sistemas
  if(parts.length === 2) return parts[1].replace(/^0+/,'');
  return r;
}
function yerPeriod(){
  // Si hay un período anterior seleccionado manualmente, usarlo
  if(YER._periodoAnterior){
    const [y,m]=YER._periodoAnterior.split('-').map(Number);
    const mesLiq=m, anyoLiq=y;
    const mesAnterior=mesLiq===1?12:mesLiq-1;
    const anyoAnterior=mesLiq===1?anyoLiq-1:anyoLiq;
    const lastDayAnterior=new Date(anyoAnterior,mesAnterior,0).getDate();
    const lastDayLiq=new Date(anyoLiq,mesLiq,0).getDate();
    const desde=new Date(anyoAnterior,mesAnterior-1,lastDayAnterior,22,0,0);
    const hasta=new Date(anyoLiq,mesLiq-1,lastDayLiq,22,0,0);
    return{desde,hasta,mesLiq,anyoLiq};
  }
  const [y, m] = CP.split('-').map(Number);
  const mesLiq = m === 1 ? 12 : m - 1;
  const anyoLiq = m === 1 ? y - 1 : y;
  const mesAnterior = mesLiq === 1 ? 12 : mesLiq - 1;
  const anyoAnterior = mesLiq === 1 ? anyoLiq - 1 : anyoLiq;
  const lastDayAnterior = new Date(anyoAnterior, mesAnterior, 0).getDate();
  const lastDayLiq = new Date(anyoLiq, mesLiq, 0).getDate();
  const desde = new Date(anyoAnterior, mesAnterior - 1, lastDayAnterior, 22, 0, 0);
  const hasta  = new Date(anyoLiq, mesLiq - 1, lastDayLiq, 22, 0, 0);
  return { desde, hasta, mesLiq, anyoLiq };
}
function yerMesLabel(){
  const { mesLiq, anyoLiq } = yerPeriod();
  const mnames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return mnames[mesLiq-1]+' '+anyoLiq;
}

function processVentasExcel(ab){
  const wb = XLSX.read(ab, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if(!data.length) return [];
  const header = data[0].map(h => String(h).trim().toLowerCase());
  const col = name => header.findIndex(h => h.includes(name));
  const cFecha=col('fecha'), cDesc=col('descripcion'), cLitros=col('litros');
  const cTotal=col('total'), cTipoV=col('tipo venta'), cRemito=col('remitonro');
  const cMotivo=col('motivo');
  const { desde, hasta } = yerPeriod();
  const seen = new Set(), rows = [];
  for(let i=1; i<data.length; i++){
    const r = data[i];
    const tipoVenta = String(r[cTipoV]||'').trim();
    const motivo    = String(r[cMotivo]||'').trim();
    // Incluir YER normales y YER_NoComb
    const isYER      = tipoVenta === 'YER';
    const isNoComb   = motivo === 'YER_NoComb';
    if(!isYER && !isNoComb) continue;
    const fechaStr = String(r[cFecha]||'').trim();
    const fparts = fechaStr.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(!fparts) continue;
    const fDate = new Date(+fparts[3], +fparts[2]-1, +fparts[1], +fparts[4], +fparts[5]);
    if(fDate < desde || fDate > hasta) continue;
    const remito = String(r[cRemito]||'').trim();
    if(remito && seen.has(remito)) continue;
    if(remito) seen.add(remito);
    const litros=parseArg(r[cLitros]), total=parseArg(r[cTotal]);
    const desc=String(r[cDesc]||'').trim();
    // NoComb: sin combustible ni comisión
    const ck   = isNoComb ? null : descToCombust(desc);
    const pct  = ck ? (YER.pcts[ck]||0) : 0;
    const precio = litros > 0 ? total / litros : 0;
    const comxLt = precio*(pct/100);
    rows.push({
      id:Math.random().toString(36).slice(2,9),
      fecha:fechaStr, desc, litros, total,
      remito, precio, combustKey:ck, pct, comxLt,
      totalCom:litros*comxLt,
      motivo: isNoComb ? 'YER_NoComb' : 'YER'
    });
  }
  return rows;
}

function processEverilioExcel(ab){
  const wb = XLSX.read(ab, {type:'array', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:'', raw:false});
  if(!data.length) return [];
  // Columnas fijas: A(0)=fecha, D(3)=remito, I(8)=importe (TOTAL PVP)
  const { desde, hasta } = yerPeriod();
  const rows = [];
  for(let i=1; i<data.length; i++){
    const r = data[i];
    const remito = String(r[3]||'').trim();
    if(!remito || remito.startsWith('00000-')) continue;
    const fechaStr = String(r[0]||'').slice(0,16);
    // Parsear fecha "dd/mm/yyyy hh:mm" para filtrar por período
    const fparts = fechaStr.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
    if(fparts){
      const fDate = new Date(+fparts[3], +fparts[2]-1, +fparts[1], +fparts[4], +fparts[5]);
      if(fDate < desde || fDate > hasta) continue;
    }
    const importe = parseFloat(String(r[8]||'0')) || 0;
    rows.push({
      id: Math.random().toString(36).slice(2,9),
      fecha: fechaStr,
      remito,
      remitoNorm: normRemito(remito),
      pvp: importe,
      totalYer: 0
    });
  }
  return rows;
}

function calcConciliacion(){
  const vRows=YER.rows||[], eRows=YER.evRows||[];
  const eByRemito={};
  eRows.forEach(r=>{ eByRemito[r.remitoNorm]=r; });
  // Set de remitos de ventas (todos: YER + NoComb)
  const vSet=new Set(vRows.map(r=>normRemito(r.remito)));
  // Set específico de NoComb — sus remitos no son inconsistencias aunque no estén en Everilio como YER
  const noCombSet=new Set(vRows.filter(r=>r.motivo==='YER_NoComb').map(r=>normRemito(r.remito)));
  const eSet=new Set(eRows.map(r=>r.remitoNorm));
  // Solo en ventas: excluir NoComb (no se espera que estén en Everilio)
  const soloVentas=vRows.filter(r=>r.motivo!=='YER_NoComb'&&!eSet.has(normRemito(r.remito)));
  // Solo en everilio: excluir los que matchean con NoComb de ventas
  const soloEv=eRows.filter(r=>!vSet.has(r.remitoNorm)&&!noCombSet.has(r.remitoNorm));
  const diffMonto=[];
  vRows.forEach(r=>{
    if(r.motivo==='YER_NoComb') return; // NoComb no participa en diff de monto
    const rn=normRemito(r.remito), eRow=eByRemito[rn];
    if(!eRow) return;
    const diff=r.total-eRow.pvp;
    if(Math.abs(diff)>20) diffMonto.push({vRow:r,eRow,diff});
  });
  // Contar solo YER normales para las estadísticas
  const vYER=vRows.filter(r=>r.motivo!=='YER_NoComb');
  return { soloVentas, soloEv, diffMonto,
    vTotalPesos:vYER.reduce((a,r)=>a+r.total,0),
    vTotalLitros:vYER.reduce((a,r)=>a+r.litros,0),
    eTotalPesos:eRows.reduce((a,r)=>a+r.pvp,0),
    vCount:vYER.length, eCount:eRows.length };
}

function recalcYERRows(){
  YER.rows=YER.rows.map(r=>{
    const pct=r.combustKey?(YER.pcts[r.combustKey]||0):0;
    const comxLt=r.precio*(pct/100);
    return {...r,pct,comxLt,totalCom:r.litros*comxLt};
  });
}
