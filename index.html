function renderYERHistorial(){
  const liqHistory=(YER.liqHistory||[]).slice().sort((a,b)=>(a.period||'').localeCompare(b.period||''));
  if(!liqHistory.length) return `<div style="text-align:center;padding:40px;color:var(--m2);border:2px dashed var(--b);border-radius:10px;">
    <div style="font-size:28px;margin-bottom:10px;">📋</div>
    <div style="font-size:14px;font-weight:700;">Sin liquidaciones registradas</div>
    <div style="font-size:12px;margin-top:6px;">Cargá un período anterior con el botón 📅 Cargar período anterior</div>
  </div>`;

  const th=`padding:9px 12px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;text-align:left;`;
  const fmtLt=v=>v!=null?new Intl.NumberFormat('es-AR').format(Math.round(v))+' Lt':'—';

  const rows=liqHistory.map((liq,i)=>{
    const bg=i%2===0?'#FEFEFE':'#F8F5FB';
    const detalle=liq.detalle||[];
    return`<tr style="background:${bg}">
      <td style="padding:9px 12px;border:1px solid #E8E4F0;font-weight:800;font-size:13px;white-space:nowrap;">${esc(liq.mesLabel||liq.period||'')}</td>
      ${YER_COMBUST.map(c=>{
        const d=detalle.find(x=>x.key===c.key);
        return`<td style="padding:9px 12px;border:1px solid #E8E4F0;font-size:12px;">
          <div style="font-size:11px;color:var(--m2);">${d?(fmtLt(d.litros||d.lt||0)):'—'}</div>
          <div style="font-weight:700;color:var(--pd);">${d!=null?'$'+fmtArg(d.importe||d.comision||0):'—'}</div>
        </td>`;
      }).join('')}
      <td style="padding:9px 12px;border:1px solid #E8E4F0;font-size:13px;font-weight:800;color:var(--g);">${liq.totalCom!=null?'$'+fmtArg(liq.totalCom):'—'}</td>
      <td style="padding:9px 12px;border:1px solid #E8E4F0;text-align:center;">
        <div style="display:flex;gap:6px;justify-content:center;">
          <button onclick="yerHistorialVer(${i})" style="background:var(--yl);color:var(--pd);border:1px solid var(--y2);border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;">👁 Ver</button>
          <button onclick="yerHistorialDel(${i})" style="background:var(--rb);color:var(--r);border:1px solid var(--rbr);border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return`<div style="overflow-x:auto;border-radius:10px;border:1px solid var(--b);">
    <table style="border-collapse:collapse;width:100%;min-width:700px;">
      <thead><tr>
        <th style="${th}">Período</th>
        ${YER_COMBUST.map(c=>`<th style="${th}">${c.label}</th>`).join('')}
        <th style="${th}">Total Comisión</th>
        <th style="${th}"></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
function renderYER(){
  const locked=YER.pctLocked!==false;
  const ro=locked?'readonly':'', bgl=locked?'background:#F0FFF4;border-color:#C8E6C9;':'';
  const pctGrid=YER_COMBUST.map(c=>{
    const val=YER.pcts[c.key]||0;
    return `<div style="background:#fff;border:2px solid var(--b);border-radius:10px;padding:14px;text-align:center;">
      <div style="font-size:11px;font-weight:800;color:var(--m2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;">${c.label}</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:4px;">
        <input type="number" step="0.001" data-pct="${c.key}" value="${val}" ${ro}
          style="width:80px;padding:8px;border:1.5px solid var(--b);border-radius:7px;font-size:18px;font-weight:700;text-align:center;${bgl}">
        <span style="font-size:16px;font-weight:700;color:var(--m2);">%</span>
      </div>
    </div>`;
  }).join('');
  const pctBtns=locked
    ?`<button id="yer-pct-edit" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">Editar %</button>`
    :`<button id="yer-pct-save" style="background:var(--g);color:#fff;border:none;border-radius:7px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;">Guardar %</button>`;

  const pctBox=`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <div style="font-size:14px;font-weight:800;color:var(--pd);">PORCENTAJES DE COMISION POR COMBUSTIBLE</div>
      ${pctBtns}
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">${pctGrid}</div>
  </div>`;

  // ── MODO: vista historial, normal, etc. ─────────────────────
  // _viewingLiq = null → pantalla actual (Liquidación actual)
  // _viewingLiq = N   → viendo liquidación histórica N
  // yerSub = 'historial' → tabla de historial
  const enHistorial = yerSub==='historial' && YER._viewingLiq==null;
  const enVistaLiq  = YER._viewingLiq!=null;

  // ── BARRA FIJA ───────────────────────────────────────────────
  const esActual = !enHistorial && !enVistaLiq;
  const bstyle = (activo)=>activo
    ?'background:var(--p);color:#fff;border:2px solid var(--p);'
    :'background:var(--card2);color:var(--pd);border:2px solid var(--b);';
  const bbase = 'border-radius:7px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;';

  const barraTop=`<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;border-bottom:2px solid var(--b);padding-bottom:12px;">
    <button onclick="YER._viewingLiq=null;YER._editingLiq=null;YER._backup=null;yerSub='diferencias';renderTab();"
      style="${bstyle(esActual)}${bbase}">💰 Liquidación actual</button>
    <button onclick="YER._viewingLiq=null;YER._editingLiq=null;YER._backup=null;yerSub='historial';renderTab();"
      style="${bstyle(enHistorial)}${bbase}">📋 Historial${(YER.liqHistory||[]).length>0?' ('+(YER.liqHistory||[]).length+')':''}</button>
    <button onclick="abrirModalPeriodoAnteriorYER();"
      style="background:var(--yl);color:var(--pd);border:2px solid var(--y2);${bbase}">📅 Cargar período anterior</button>
  </div>`;

  const modal=`<div id="yer-modal-liq" style="display:none;position:fixed;inset:0;background:rgba(20,10,36,.6);z-index:200;align-items:center;justify-content:center;padding:20px;">
    <div style="background:#fff;border-radius:14px;width:100%;max-width:640px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
      <div id="yer-liq-content" style="overflow-y:auto;flex:1;"></div>
      <div style="padding:12px 20px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--b);flex-shrink:0;">
        <button id="yer-liq-save" style="display:none;background:var(--g);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">💾 Guardar liquidación</button>
        <button id="yer-liq-print" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir</button>
        <button id="yer-liq-close" style="background:#fff;color:var(--m2);border:1px solid var(--b);border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Cerrar</button>
      </div>
    </div>
  </div>`;

  // ── 1. HISTORIAL ─────────────────────────────────────────────
  if(enHistorial){
    return pctBox + barraTop + renderYERHistorial() + modal;
  }

  // ── 2. VISTA LIQUIDACIÓN HISTÓRICA ──────────────────────────
  if(enVistaLiq){
    const liq=(YER.liqHistory||[])[YER._viewingLiq];
    if(!liq) return pctBox + barraTop + '<p>Liquidación no encontrada.</p>';

    const vf=liq.snapshot?.ventasFile||liq.ventasFile;
    const ef=liq.snapshot?.everilioFile||liq.everilioFile;
    const archivos=`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Ventas Especiales</div>
        ${vf?`<span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(vf.fileName||vf.name||'')}</span>`:'<span style="font-size:12px;color:var(--m2);">Sin archivo</span>'}
      </div>
      <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Everilio</div>
        ${ef?`<span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(ef.fileName||ef.name||'')}</span>`:'<span style="font-size:12px;color:var(--m2);">Sin archivo</span>'}
      </div>
    </div>`;

    // Validar que el snapshot tiene rows del período correcto
    // Comparar el mes/año de la primera fila con el período de la liquidación
    const rows=YER.rows||[];
    const [liqY,liqM]=( liq.period||'').split('-').map(Number);
    let snapshotEsCorrecto=false;
    if(rows.length>0 && liqY && liqM){
      // Buscar una fecha en los rows para verificar el mes
      const primeraFecha=rows.find(r=>r.fecha||r.date||r.Fecha)?.fecha||
                         rows.find(r=>r.fecha||r.date||r.Fecha)?.date||
                         rows.find(r=>r.fecha||r.date||r.Fecha)?.Fecha||'';
      if(primeraFecha){
        const d=new Date(primeraFecha);
        snapshotEsCorrecto=(d.getFullYear()===liqY && d.getMonth()+1===liqM);
      }
    }

    const banner=`<div style="background:#FFF8E1;border:2px solid #F5C842;border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:13px;font-weight:700;color:#7B5800;">👁 Viendo liquidación: <strong>${esc(liq.mesLabel||liq.period||'')}</strong></span>
      <button onclick="YER._viewingLiq=null;YER._editingLiq=null;if(YER._backup){YER.rows=YER._backup.rows;YER.evRows=YER._backup.evRows;YER.ventasFile=YER._backup.ventasFile;YER.everilioFile=YER._backup.everilioFile;YER.validaciones=YER._backup.validaciones;YER._backup=null;}yerSub='diferencias';renderTab();"
        style="background:var(--p);color:#fff;border:none;border-radius:6px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;">← Volver</button>
    </div>`;

    if(snapshotEsCorrecto){
      // Snapshot válido — mostrar pantalla completa
      let sub='';
      if(yerSub==='diferencias'||yerSub==='historial') sub=renderYERDiferencias();
      else if(yerSub==='detalle-ventas') sub=renderYERDetalleVentas();
      else if(yerSub==='detalle-everilio') sub=renderYERDetalleEverilio();
      else if(yerSub==='liq-resumen') sub=buildLiqContent(liq);
      return pctBox + barraTop + banner + archivos + renderYERSubTabs() + sub + modal;
    } else {
      // Sin snapshot válido — mostrar solo el resumen guardado
      const aviso=rows.length>0?`<div style="background:var(--rb);border:1px solid var(--rbr);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--r);">
        ⚠️ Los datos de diferencias de este período no están disponibles (la liquidación fue realizada con un proceso anterior). Se muestra el resumen de comisiones guardado.
      </div>`:''
      return pctBox + barraTop + banner + aviso + buildLiqContent(liq) + modal;
    }
  }

  // ── 3. PANTALLA PRINCIPAL (Liquidación actual) ───────────────
  const yaLiquidado=!YER._periodoAnterior && !!(YER.liqHistory||[]).find(l=>l.period===prevMonth(CP));

  // Banner período anterior activo
  const bannerAnterior=YER._periodoAnterior?`
    <div style="background:#FFF8E1;border:2px solid #F5C842;border-radius:12px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
      <div>
        <div style="font-size:13px;font-weight:800;color:#7B5800;">📅 Cargando período anterior: <strong>${yerMesLabel()}</strong></div>
        <div style="font-size:12px;color:#92400E;margin-top:2px;">Subí los archivos. Al liquidar se guardará como ${yerMesLabel()}.</div>
      </div>
      <button id="yer-cancelar-anterior" style="background:#fff;color:var(--r);border:1px solid var(--r);border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;">✕ Cancelar</button>
    </div>`:'';

  if(yaLiquidado){
    const mesLabel=yerMesLabel();
    // Ver si hay datos en memoria para imprimir (del período actual liquidado)
    const hayDatos=(YER.rows||[]).length>0;
    const banner=`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;">
      <div>
        <div style="font-size:13px;font-weight:800;color:var(--g);">✓ Período ${mesLabel} liquidado</div>
        <div style="font-size:12px;color:var(--m2);margin-top:2px;">Subí los archivos del mes siguiente para cargar el nuevo período.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">

        <button id="yer-nuevo-periodo" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;">+ Nuevo período</button>
      </div>
    </div>`;
    // Mostrar también las subtabs si hay datos
    const subLiq=hayDatos?(()=>{
      let s='';
      if(yerSub==='diferencias') s=renderYERDiferencias();
      else if(yerSub==='detalle-ventas') s=renderYERDetalleVentas();
      else if(yerSub==='detalle-everilio') s=renderYERDetalleEverilio();
      return renderYERSubTabs()+s;
    })():'';
    return pctBox + barraTop + banner + subLiq + modal;
  }

  // Sin liquidar — pantalla de carga
  const archivos=`<div style="background:var(--card);border:1px solid var(--b);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:14px;">
    <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:8px;">Ventas Especiales (Excel)</div>
    ${YER.ventasFile?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.ventasFile.fileName)}</span><button style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;" id="yer-del-ventas">Quitar</button></div>`:`<label style="background:var(--p);color:#fff;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;display:inline-block;">Subir archivo<input type="file" id="yer-ventas-input" accept=".xlsx,.xls" hidden></label>`}</div>
    <div><div style="font-size:12px;font-weight:800;color:var(--m2);text-transform:uppercase;margin-bottom:8px;">Everilio (Excel)</div>
    ${YER.everilioFile?`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:13px;font-weight:600;color:var(--pd);">📊 ${esc(YER.everilioFile.fileName)}</span><button style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;" id="yer-del-everilio">Quitar</button></div>`:`<label style="background:var(--p);color:#fff;border-radius:6px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;display:inline-block;">Subir archivo<input type="file" id="yer-everilio-input" accept=".xlsx,.xls" hidden></label>`}</div>
  </div>`;

  let subContent='';
  if(yerSub==='diferencias') subContent=renderYERDiferencias();
  else if(yerSub==='detalle-ventas') subContent=renderYERDetalleVentas();
  else if(yerSub==='detalle-everilio') subContent=renderYERDetalleEverilio();

  const canLiquidar=(YER.rows||[]).filter(r=>r.motivo!=='YER_NoComb').length>0;
  const hayDif=(YER.rows||[]).some(r=>r.motivo==='SoloVentas'||r.motivo==='DifMonto')||(YER.evRows||[]).some(r=>!r.matched);

  const btnLiq=canLiquidar?`<button id="yer-liquidar" style="background:#1B6B35;color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(27,107,53,.35);">💰 LIQUIDAR ${yerMesLabel().toUpperCase()}</button>`:'';
  const btnPrint=hayDif?`<button id="btn-yer-imprimir" style="background:var(--p);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir diferencias</button>`:'';
  const btnBar=(btnLiq||btnPrint)?`<div style="margin-top:20px;display:flex;justify-content:flex-end;gap:10px;">${btnPrint}${btnLiq}</div>`:'';

  return pctBox + barraTop + bannerAnterior + archivos + renderYERSubTabs() + subContent + btnBar + modal;
}


function renderYERDiferencias(){
  const ambos=YER.ventasFile&&YER.everilioFile;
  if(!ambos) return `<div class="empty-s"><p>Carga ambos archivos (Ventas Especiales y Everilio) para ver las diferencias entre bases.</p></div>`;
  const {soloVentas,soloEv,diffMonto,vTotalPesos,vTotalLitros,eTotalPesos,vCount,eCount}=calcConciliacion();
  const parseF=s=>{const m=(s||'').match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);return m?new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]):0;};
  soloVentas.sort((a,b)=>parseF(a.fecha)-parseF(b.fecha));
  soloEv.sort((a,b)=>parseF(a.fecha)-parseF(b.fecha));
  diffMonto.sort((a,b)=>parseF(a.vRow.fecha)-parseF(b.vRow.fecha));
  const ok=vCount-soloVentas.length-diffMonto.length;

  if(!YER.validaciones)YER.validaciones={};
  const val=YER.validaciones;

  // Celda de validación reutilizable
  // Construir lista de remitos de Everilio para el selector cruzado
  const evRemitoOpts=soloEv.map(r=>`<option value="${esc(r.remitoNorm||r.remito)}">${esc(r.remito)} — $${fmtArg(r.pvp)}</option>`).join('');

  const valCell=(key, tipo='sv')=>{
    const v=val[key]||{};
    const estado=v.estado||'';
    const comentario=v.comentario||'';
    const evLink=v.evLink||''; // remito de Everilio vinculado
    const isOK=estado==='ok';

    // Selector de remito Everilio (solo en filas de Ventas)
    const evSelect=tipo==='sv'?`
      <select data-val-key="${esc(key)}" data-val-field="evLink"
        style="padding:4px 6px;border:1px solid ${evLink?'#1B6B35':'var(--b)'};border-radius:5px;font-size:11px;background:${evLink?'#F0FFF4':'#fff'};min-width:140px;max-width:180px;">
        <option value="">Vincular Everilio...</option>
        ${evRemitoOpts}
      </select>`:'';

    // Selector preseleccionado si ya tiene vínculo
    const evSelectWithVal=tipo==='sv'?`
      <select data-val-key="${esc(key)}" data-val-field="evLink"
        style="padding:4px 6px;border:1px solid ${evLink?'#1B6B35':'var(--b)'};border-radius:5px;font-size:11px;background:${evLink?'#F0FFF4':'#fff'};min-width:140px;max-width:180px;">
        <option value="">Vincular Everilio...</option>
        ${soloEv.map(r=>`<option value="${esc(r.remitoNorm||r.remito)}" ${evLink===(r.remitoNorm||r.remito)?'selected':''}>${esc(r.remito)} — $${fmtArg(r.pvp)}</option>`).join('')}
      </select>`:'';

    return `<td style="padding:5px 8px;border:1px solid var(--b);min-width:${tipo==='sv'?'320':'220'}px;vertical-align:middle;">
      <div style="display:flex;flex-direction:column;gap:4px;">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
          <select data-val-key="${esc(key)}" data-val-field="estado"
            style="padding:4px 6px;border:1px solid ${isOK?'#1B6B35':'var(--b)'};border-radius:5px;font-size:12px;background:${isOK?'#F0FFF4':'#fff'};">
            <option value="">— Sin validar</option>
            <option value="ok" ${estado==='ok'?'selected':''}>✓ OK</option>
            <option value="error" ${estado==='error'?'selected':''}>✗ Error</option>
            <option value="pendiente" ${estado==='pendiente'?'selected':''}>⏳ Pendiente</option>
          </select>
          ${tipo==='sv'?evSelectWithVal:''}
        </div>
        <input type="text" data-val-key="${esc(key)}" data-val-field="comentario"
          placeholder="Comentario breve..." value="${esc(comentario)}"
          style="padding:4px 7px;border:1px solid var(--b);border-radius:5px;font-size:12px;width:100%;background:${comentario?'#FFFDE0':'#fff'};">
      </div>
    </td>`;
  };

  const cards=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;">
    <div style="background:#F8F5FB;border:1px solid var(--b);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Registros Ventas</div><div style="font-size:22px;font-weight:800;color:var(--pd);">${vCount}</div><div style="font-size:12px;color:var(--m2);margin-top:3px;">$ ${fmtArg(vTotalPesos)}</div><div style="font-size:12px;color:var(--m2);">${fmtArg(vTotalLitros,2)} Lt</div></div>
    <div style="background:#F8F5FB;border:1px solid var(--b);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--m2);text-transform:uppercase;margin-bottom:6px;">Registros Everilio</div><div style="font-size:22px;font-weight:800;color:var(--pd);">${eCount}</div><div style="font-size:12px;color:var(--m2);margin-top:3px;">$ ${fmtArg(eTotalPesos)}</div></div>
    <div style="background:var(--rb);border:1px solid var(--rbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--r);text-transform:uppercase;margin-bottom:6px;">Solo en Ventas</div><div style="font-size:22px;font-weight:800;color:var(--r);">${soloVentas.length}</div><div style="font-size:12px;color:var(--r);margin-top:3px;">$ ${fmtArg(soloVentas.reduce((a,r)=>a+r.total,0))}</div></div>
    <div style="background:#FFF8E1;border:1px solid #FFD54F;border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:#7B5800;text-transform:uppercase;margin-bottom:6px;">Solo en Everilio</div><div style="font-size:22px;font-weight:800;color:#7B5800;">${soloEv.length}</div><div style="font-size:12px;color:#7B5800;margin-top:3px;">$ ${fmtArg(soloEv.reduce((a,r)=>a+r.pvp,0))}</div></div>
    <div style="background:var(--rb);border:1px solid var(--rbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--r);text-transform:uppercase;margin-bottom:6px;">Dif. monto &gt;$20</div><div style="font-size:22px;font-weight:800;color:var(--r);">${diffMonto.length}</div></div>
    <div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:14px;"><div style="font-size:11px;font-weight:700;color:var(--g);text-transform:uppercase;margin-bottom:6px;">Sin diferencias</div><div style="font-size:22px;font-weight:800;color:var(--g);">${Math.max(0,ok)}</div></div>
  </div>`;

  const th=`padding:8px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;`;

  // Filas con validador
  // Ordenar: OK primero, luego el resto
  const svSorted=[...soloVentas].sort((a,b)=>{
    const va=val['sv:'+normRemito(a.remito)]||{};
    const vb=val['sv:'+normRemito(b.remito)]||{};
    const aOK=va.estado==='ok'?0:1;
    const bOK=vb.estado==='ok'?0:1;
    return aOK-bOK;
  });

  const svRows=svSorted.map((r,i)=>{
    const vKey='sv:'+normRemito(r.remito);
    const v=val[vKey]||{};
    const isOK=v.estado==='ok';
    const isLinked=!!v.evLink;
    const rowBg=isOK?'#E8FFF0':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFF8F8';
    const okBadge=isOK?`<span style="font-size:10px;font-weight:800;color:#1B6B35;background:#C6F6D5;padding:1px 6px;border-radius:4px;margin-left:4px;">✓ OK${isLinked?' → '+v.evLink:''}</span>`:'';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(r.remito)}${okBadge}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;color:var(--m2);">${esc(r.fecha.slice(0,16))}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;">${esc(r.desc)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">${fmtArg(Math.round(r.litros),0)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;font-weight:700;color:var(--r);">$ ${fmtArg(r.total)}</td>
      ${valCell(vKey,'sv')}
    </tr>`;
  }).join('');

  // Ordenar Everilio: los que están vinculados (OK desde Ventas) primero
  const linkedEvRemitos=new Set(Object.values(val).map(v=>v.evLink).filter(Boolean));
  const seSorted=[...soloEv].sort((a,b)=>{
    const aNorm=a.remitoNorm||normRemito(a.remito);
    const bNorm=b.remitoNorm||normRemito(b.remito);
    const aOK=linkedEvRemitos.has(aNorm)?0:1;
    const bOK=linkedEvRemitos.has(bNorm)?0:1;
    return aOK-bOK;
  });

  const seRows=seSorted.map((r,i)=>{
    const vKey='se:'+normRemito(r.remito);
    const v=val[vKey]||{};
    const rNorm=r.remitoNorm||normRemito(r.remito);
    const isLinkedFromV=linkedEvRemitos.has(rNorm);
    const rowBg=isLinkedFromV?'#E8FFF0':v.estado==='ok'?'#E8FFF0':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFFCF0';
    const okBadge=isLinkedFromV?`<span style="font-size:10px;font-weight:800;color:#1B6B35;background:#C6F6D5;padding:1px 6px;border-radius:4px;margin-left:4px;">✓ OK</span>`:'';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(r.remito)}${okBadge}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;color:var(--m2);">${esc(r.fecha)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;font-weight:700;color:#7B5800;">$ ${fmtArg(r.pvp)}</td>
      ${valCell(vKey,'se')}
    </tr>`;
  }).join('');

  const dmRows=diffMonto.map((d,i)=>{
    const s=d.diff>0?'+':'';
    const col=Math.abs(d.diff)>500?'var(--r)':'#B8860B';
    const vKey='dm:'+normRemito(d.vRow.remito);
    const v=val[vKey]||{};
    const rowBg=v.estado==='ok'?'#F0FFF4':v.estado==='error'?'#FFF0F0':v.estado==='pendiente'?'#FFFCF0':i%2===0?'#fff':'#FFF8F8';
    return `<tr style="background:${rowBg}">
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;font-family:monospace;">${esc(d.vRow.remito)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;">${esc(d.vRow.desc)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">${fmtArg(Math.round(d.vRow.litros),0)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">$ ${fmtArg(d.vRow.total)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;">$ ${fmtArg(d.eRow.pvp)}</td>
      <td style="padding:6px 10px;border:1px solid var(--b);font-size:12px;text-align:right;font-weight:800;color:${col};">${s}$ ${fmtArg(Math.abs(d.diff))}</td>
      ${valCell(vKey)}
    </tr>`;
  }).join('');

  const tbSV=soloVentas.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:var(--rb);padding:9px 14px;font-size:13px;font-weight:800;color:var(--r);">En Ventas sin respaldo en Everilio — <span id="sv-count-lbl">${soloVentas.length}</span> de ${soloVentas.length} registros</div>
    ${renderSearchBar('sv-search','Buscar remito, fecha, producto...',soloVentas.length)}
    <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="${th}">Remito</th><th style="${th}">Fecha</th><th style="${th}">Producto</th><th style="${th}">Litros</th><th style="${th}">Total $</th>
      <th style="${th}">Validación</th>
    </tr></thead><tbody class="sv-tbody">${svRows}</tbody></table></div></div>`
    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Todos los remitos de Ventas tienen respaldo en Everilio</div>`;

  const tbSE=soloEv.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:#FFF8E1;padding:9px 14px;font-size:13px;font-weight:800;color:#7B5800;">En Everilio sin respaldo en Ventas — <span id="se-count-lbl">${soloEv.length}</span> de ${soloEv.length} registros</div>
    ${renderSearchBar('se-search','Buscar remito, fecha...',soloEv.length)}
    <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="${th}">Remito</th><th style="${th}">Fecha</th><th style="${th}">Total PVP $</th>
      <th style="${th}">Validación</th>
    </tr></thead><tbody class="se-tbody">${seRows}</tbody></table></div></div>`
    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Todos los remitos de Everilio tienen respaldo en Ventas</div>`;

  const tbDM=diffMonto.length?`<div style="border:1px solid var(--b);border-radius:10px;overflow:hidden;margin-bottom:14px;">
    <div style="background:var(--rb);padding:9px 14px;font-size:13px;font-weight:800;color:var(--r);">Diferencias de monto significativas (&gt;$20) — <span id="dm-count-lbl">${diffMonto.length}</span> de ${diffMonto.length} casos</div>
    ${renderSearchBar('dm-search','Buscar remito, producto...',diffMonto.length)}
    <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead><tr>
      <th style="${th}">Remito</th><th style="${th}">Producto</th><th style="${th}">Litros</th><th style="${th}">$ Ventas</th><th style="${th}">$ Everilio</th><th style="${th}">Diferencia</th>
      <th style="${th}">Validación</th>
    </tr></thead><tbody class="dm-tbody">${dmRows}</tbody></table></div></div>`
    :`<div style="background:var(--gb);border:1px solid var(--gbr);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--g);font-weight:700;">Sin diferencias de monto significativas</div>`;

  // ── HISTORIAL DE LIQUIDACIONES ────────────────────────────────
  const liqHistory = YER.liqHistory||[];
  const thL=`padding:8px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;text-align:center;`;

  const liqRows=liqHistory.map((liq,i)=>{
    return `<tr style="background:${i%2===0?'#FFFFF0':'#FFFDE0'}">
      <td style="padding:8px 10px;border:1px solid #D4C830;font-weight:700;font-size:13px;">${esc(liq.mesLabel)}</td>
      ${YER_COMBUST.map(c=>{
        const s=liq.detalle.find(d=>d.key===c.key)||{litros:0,importe:0};
        return `<td style="padding:8px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;">
          <div style="font-size:11px;color:var(--m2);">${fmtArg(Math.round(s.litros),0)} Lt</div>
          <div style="font-weight:700;color:var(--g);">$ ${fmtArg(s.importe)}</div>
        </td>`;
      }).join('')}
      <td style="padding:8px 10px;border:1px solid #D4C830;font-size:14px;font-weight:900;color:var(--p);text-align:right;">$ ${fmtArg(liq.totalCom)}</td>
      <td style="padding:8px 10px;border:1px solid #D4C830;text-align:center;">
        <div style="display:flex;gap:5px;justify-content:center;">
          <button data-liq-ver="${i}" style="background:var(--yl);color:var(--pd);border:1px solid var(--y2);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">👁 Ver</button>
          <button data-liq-edit="${i}" style="background:var(--p);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">✏</button>
          <button data-liq-del="${i}" style="background:var(--rb);color:var(--r);border:1px solid var(--rbr);border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  return cards+tbSV+tbSE+tbDM;
}

function renderYERDetalleVentas(){
  const rows=[...(YER.rows||[])], mesLabel=yerMesLabel();
  if(!rows.length) return `<div class="empty-s"><p>Subi el archivo de Ventas Especiales para ver el detalle.</p></div>`;
  // Ordenar por fecha ascendente
  const parseF=s=>{const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);return m?new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]):0;};
  rows.sort((a,b)=>parseF(a.fecha)-parseF(b.fecha));
  const trs=rows.map((r,i)=>{
    const isNoComb = r.motivo==='YER_NoComb';
    const rowBg = isNoComb ? (i%2===0?'#F0F4FF':'#E8EEFF') : (i%2===0?'#FFFFF0':'#FFFDE0');
    const motivoBadge = isNoComb
      ? `<span style="background:#5C6BC0;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;">NO COMB</span>`

    return `<tr class="yer-v-row" style="background:${rowBg}">
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;white-space:nowrap;">${esc(r.fecha)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;">${esc(r.desc)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;font-family:monospace;">${esc(r.remito)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;">${fmtArg(Math.round(r.litros),0)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;">$ ${fmtArg(r.total)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:center;">${motivoBadge}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;">${isNoComb?'—':'$ '+fmtArg(r.precio)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:center;">${isNoComb?'—':r.pct+'%'}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;">${isNoComb?'—':'$ '+fmtArg(r.comxLt)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;font-weight:700;color:${isNoComb?'var(--m2)':'var(--g)'};">${isNoComb?'—':'$ '+fmtArg(r.totalCom)}</td>
      <td style="padding:6px 8px;border:1px solid #D4C830;text-align:center;"><button style="background:#FFEBEE;color:#B71C1C;border:1px solid #EF9A9A;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;" data-yer-del="${r.id}">X</button></td>
    </tr>`;
  }).join('');
  return `<div style="border-radius:10px;box-shadow:0 2px 12px rgba(36,19,56,.1);overflow:hidden;">
    <div style="background:var(--p);color:#fff;font-weight:800;font-size:14px;text-align:center;padding:11px 16px;">DETALLE VENTAS YER — ${mesLabel} (<span id="yer-v-search-count">${rows.length} registros</span>)</div>
    ${renderSearchBar('yer-v-search','Buscar por fecha, producto, remito...',rows.length)}
    <div style="overflow-x:auto;">
      <table id="yer-v-table" style="border-collapse:collapse;width:100%;min-width:900px;">
        <thead><tr style="background:var(--y);color:var(--pd);">
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">FECHA</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">PRODUCTO</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">REMITO</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">LITROS</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">TOTAL $</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">MOTIVO</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">PRECIO OP.</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">%</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">COM/LT</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">TOTAL COM.</th>
          <th style="padding:8px;border:1px solid #C9A800;"></th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>
  </div>`;
}

function renderYERDetalleEverilio(){
  const rows=[...(YER.evRows||[])], mesLabel=yerMesLabel();
  if(!rows.length) return `<div class="empty-s"><p>Subi el archivo de Everilio para ver el detalle.</p></div>`;
  rows.sort((a,b)=>{
    const parse=s=>{const m=s.match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);return m?new Date(+m[3],+m[2]-1,+m[1],+m[4],+m[5]):0;};

    <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;font-family:monospace;">${esc(r.remito)}</td>
    <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;font-weight:700;">$ ${fmtArg(r.pvp)}</td>
    <td style="padding:6px 8px;border:1px solid #D4C830;font-size:12px;text-align:right;color:var(--m2);">${r.totalYer>0?'$ '+fmtArg(r.totalYer):'--'}</td>
  </tr>`).join('');
  return `<div style="border-radius:10px;box-shadow:0 2px 12px rgba(36,19,56,.1);overflow:hidden;">
    <div style="background:var(--p);color:#fff;font-weight:800;font-size:14px;text-align:center;padding:11px 16px;">DETALLE EVERILIO — ${mesLabel} — Total PVP: $ ${fmtArg(totalPVP)} (<span id="yer-e-search-count">${rows.length} registros</span>)</div>
    ${renderSearchBar('yer-e-search','Buscar por fecha, remito...',rows.length)}
    <div style="overflow-x:auto;">
      <table id="yer-e-table" style="border-collapse:collapse;width:100%;min-width:600px;">
        <thead><tr style="background:var(--y);color:var(--pd);">
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">FECHA</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">REMITO</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">TOTAL PVP $</th>
          <th style="padding:8px;border:1px solid #C9A800;font-size:11px;text-transform:uppercase;">TOTAL YER $</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>
  </div>`;
}

async function abrirModalPeriodoAnteriorYER(){
  const liquidados=new Set((YER.liqHistory||[]).map(l=>l.period));
  const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const opciones=[];
  const hoy=new Date();
  for(let i=12;i>=1;i--){
    let y=hoy.getFullYear(),m=hoy.getMonth()+1-i;
    while(m<=0){m+=12;y--;}
    const p=`${y}-${String(m).padStart(2,'0')}`;
    if(!liquidados.has(p)) opciones.push({p,label:`${MESES[m-1]} ${y}`});
  }
  if(!opciones.length){toast('Todos los períodos anteriores ya tienen liquidación registrada.');return;}
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML=`<div style="background:var(--card);border-radius:14px;padding:28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <h3 style="font-size:16px;font-weight:800;color:var(--pd);margin-bottom:6px">📅 Cargar período anterior</h3>
    <p style="font-size:13px;color:var(--m2);margin-bottom:18px">Seleccioná el mes. Se limpiarán los archivos actuales para que subas los de ese período.</p>
    <select id="yer-sel-periodo" style="width:100%;padding:10px 12px;border:1.5px solid var(--b);border-radius:8px;font-size:14px;background:var(--card2);color:var(--pd);margin-bottom:18px">
      ${opciones.map(o=>`<option value="${o.p}">${o.label}</option>`).join('')}
    </select>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button id="yer-ant-cancel" style="background:var(--card2);color:var(--pd);border:1px solid var(--b);border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer">Cancelar</button>
      <button id="yer-ant-ok" style="background:var(--p);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer">Cargar ese período</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#yer-ant-cancel').addEventListener('click',()=>modal.remove());

function yerHistorialVer(idx){
  const liq=(YER.liqHistory||[])[idx];
  if(!liq){toast('No se encontró la liquidación');return;}
  // Guardar estado actual de Junio como backup
  YER._backup={
    rows:JSON.parse(JSON.stringify(YER.rows||[])),
    evRows:JSON.parse(JSON.stringify(YER.evRows||[])),
    ventasFile:YER.ventasFile?{...YER.ventasFile}:null,
    everilioFile:YER.everilioFile?{...YER.everilioFile}:null,
    validaciones:JSON.parse(JSON.stringify(YER.validaciones||{}))
  };
  // Restaurar datos del período histórico si tiene snapshot
  if(liq.snapshot){
    YER.rows=JSON.parse(JSON.stringify(liq.snapshot.rows||[]));
    YER.evRows=JSON.parse(JSON.stringify(liq.snapshot.evRows||[]));
    YER.ventasFile=liq.snapshot.ventasFile?{...liq.snapshot.ventasFile}:null;
    YER.everilioFile=liq.snapshot.everilioFile?{...liq.snapshot.everilioFile}:null;
    YER.validaciones=JSON.parse(JSON.stringify(liq.snapshot.validaciones||{}));
  } else {
    // Sin snapshot — limpiar rows para que renderYER muestre solo el resumen
    YER.rows=[]; YER.evRows=[]; YER.validaciones={};
    YER.ventasFile=liq.ventasFile?{...liq.ventasFile}:null;
    YER.everilioFile=liq.everilioFile?{...liq.everilioFile}:null;
  }
  YER._viewingLiq=idx;
  YER._editingLiq=null;
  yerSub='diferencias';
  renderTab();
}

function attachYER(){
  const el=document.getElementById('tab-content');
  // Imprimir diferencias via iframe oculto (evita popup blockers y CSP)
  el.querySelector('#btn-yer-imprimir')?.addEventListener('click',()=>{
    // Usar calcConciliacion() igual que la pantalla — mismos datos que se ven
    const {soloVentas, soloEv} = calcConciliacion();
    const esOK=v=>v&&(v==='ok'||v.toLowerCase().includes('ok'));
    // Filtrar los que NO tienen validación OK
    const sv=soloVentas.filter(r=>!esOK(r.validacion));
    const se=soloEv.filter(r=>!esOK(r.validacion));
    const fmt=v=>v!=null?'$'+new Intl.NumberFormat('es-AR',{minimumFractionDigits:2}).format(v):'';
    const fd=s=>{
      if(!s) return '';
      // Formato Everilio: "dd/mm/yyyy hh:mm"
      const m=String(s).match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if(m) return `${m[1]}/${m[2]}/${m[3]}`;
      // Formato ISO: "2026-06-01T..."
      try{return new Date(s).toLocaleDateString('es-AR');}catch{return String(s);}
    };    function tbl(t,h,rows){
      if(!rows.length)return '';
      return`<h3>${t} (${rows.length})</h3><table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${c??''}</td>`).join('')}</tr>`).join('')}</table>`;
    }
    const cuerpo=tbl('En Ventas sin respaldo en Everilio',['Remito','Fecha','Producto','Lt','Total $','Validación','Comentario'],
      sv.map(r=>[r.remito||'',fd(r.fecha),r.producto||r.motivo_combust||'',r.litros??'',fmt(r.pvp||r.total||0),r.validacion||'—',r.comentario||'']))
    +tbl('En Everilio sin respaldo en Ventas',['Remito','Fecha','Total PVP $','Validación'],
      se.map(r=>[r.remitoNorm||r.remito||'',fd(r.fecha),fmt(r.pvp||0),r.validacion||'—']));
    if(!cuerpo){toast('No hay diferencias para imprimir');return;}
    const html=`<html><head><meta charset="UTF-8"><style>body{font-family:Arial;font-size:10px;margin:16px}h3{font-size:11px;text-transform:uppercase;color:#3D1F6E;margin:14px 0 4px}table{border-collapse:collapse;width:100%}th{background:#F5C842;color:#3D1F6E;padding:5px 7px;text-align:left;font-size:9px}td{padding:4px 7px;border-bottom:1px solid #eee;font-size:9px}@media print{@page{size:landscape;margin:8mm}}</style></head><body>${cuerpo}</body></html>`;
    const f=document.createElement('iframe');
    f.style.cssText='position:fixed;width:0;height:0;border:0;top:-1000px;left:-1000px;';
    document.body.appendChild(f);
    f.contentDocument.open();
    f.contentDocument.write(html);
    f.contentDocument.close();
    setTimeout(()=>{f.contentWindow.focus();f.contentWindow.print();setTimeout(()=>f.remove(),2000);},300);
  });

  el.querySelectorAll('.yer-sub-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{ yerSub=btn.getAttribute('data-sub'); renderTab(); });
  });

  // Validador de diferencias — guardar al cambiar
  if(yerSub==='diferencias'){
    activateSearch('sv-search','.sv-tbody tr','sv-count-lbl');
    activateSearch('se-search','.se-tbody tr','se-count-lbl');
    activateSearch('dm-search','.dm-tbody tr','dm-count-lbl');

    if(!YER.validaciones)YER.validaciones={};

    const saveVal=async()=>{ await saveYER(); toast('Validación guardada ✓'); };

    // Select de estado
    el.querySelectorAll('select[data-val-key][data-val-field=estado]').forEach(sel=>{
      sel.addEventListener('change',async()=>{
        const key=sel.getAttribute('data-val-key');
        if(!YER.validaciones[key])YER.validaciones[key]={};
        YER.validaciones[key].estado=sel.value;
        await saveVal();
        // Re-renderizar diferencias para reordenar filas y sincronizar colores
        renderTab();
      });
    });

    // Selector de vinculación con Everilio
    el.querySelectorAll('select[data-val-key][data-val-field=evLink]').forEach(sel=>{
      sel.addEventListener('change',async()=>{
        const key=sel.getAttribute('data-val-key');
        const evLinkVal=sel.value;
        if(!YER.validaciones[key])YER.validaciones[key]={};
        YER.validaciones[key].evLink=evLinkVal;
        // Si se vincula con Everilio, auto-setear estado OK y copiar comentario
        if(evLinkVal){
          YER.validaciones[key].estado='ok';
          // También marcar el comentario si no tiene uno
          if(!YER.validaciones[key].comentario){
            YER.validaciones[key].comentario='Error en numeracion, el registro es correcto';
          }
        }
        await saveVal();
        // Re-renderizar para sincronizar color en ambas tablas
        renderTab();
      });
    });

    // Input de comentario — guardar con debounce
    let valTimer=null;
    el.querySelectorAll('input[data-val-key][data-val-field=comentario]').forEach(inp=>{
      inp.addEventListener('input',()=>{
        const key=inp.getAttribute('data-val-key');
        if(!YER.validaciones[key])YER.validaciones[key]={};
        YER.validaciones[key].comentario=inp.value.trim();
        inp.style.background=inp.value.trim()?'#FFFDE0':'#fff';
        clearTimeout(valTimer);
        valTimer=setTimeout(()=>saveYER(),800);
      });
    });
  }

  // Filtro búsqueda — Ventas
  if(yerSub==='detalle-ventas') activateSearch('yer-v-search','.yer-v-row','yer-v-count');

  // Filtro búsqueda — Everilio
  if(yerSub==='detalle-everilio') activateSearch('yer-e-search','.yer-e-row','yer-e-count');
  el.querySelector('#yer-pct-edit')?.addEventListener('click',()=>{ YER.pctLocked=false; saveYER(); renderTab(); });
  el.querySelector('#yer-pct-save')?.addEventListener('click',async()=>{
    el.querySelectorAll('[data-pct]').forEach(inp=>{ YER.pcts[inp.getAttribute('data-pct')]=parseFloat(inp.value)||0; });
    YER.pctLocked=true; recalcYERRows();
    showLoad(true); await saveYER(); showLoad(false);
    toast('Porcentajes guardados'); renderTab();
  });
  el.querySelector('#yer-ventas-input')?.addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    showLoad(true);
    try{ const ab=await file.arrayBuffer(); YER.rows=processVentasExcel(ab); YER.ventasFile={fileName:file.name,size:file.size}; await saveYER(); toast(YER.rows.length+' operaciones YER cargadas'); }
    catch(err){alert('Error: '+err.message);}
    showLoad(false); renderTab();
  });
  el.querySelector('#yer-del-ventas')?.addEventListener('click',async()=>{
    if(!confirm('Quitar archivo y borrar operaciones?')) return;
    YER.rows=[]; YER.ventasFile=null; showLoad(true); await saveYER(); showLoad(false); renderTab();
  });
  el.querySelector('#yer-everilio-input')?.addEventListener('change',async e=>{
    const file=e.target.files[0]; if(!file) return;
    showLoad(true);
    try{ const ab=await file.arrayBuffer(); YER.evRows=processEverilioExcel(ab); YER.everilioFile={fileName:file.name,size:file.size}; await saveYER(); toast(YER.evRows.length+' registros Everilio cargados'); }
    catch(err){alert('Error: '+err.message);}
    showLoad(false); renderTab();
  });
  el.querySelector('#yer-del-everilio')?.addEventListener('click',async()=>{
    if(!confirm('Quitar archivo Everilio?')) return;
    YER.evRows=[]; YER.everilioFile=null; showLoad(true); await saveYER(); showLoad(false); renderTab();
  });
  el.querySelectorAll('[data-yer-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      YER.rows=YER.rows.filter(r=>r.id!==btn.getAttribute('data-yer-del'));
      showLoad(true); await saveYER(); showLoad(false); renderTab();
    });
  });
  // Helper: armar contenido del modal de liquidación

  function openLiqModal(liqData, canSave){
    document.getElementById('yer-liq-content').innerHTML=buildLiqContent(liqData);
    const modal=document.getElementById('yer-modal-liq');
    const btnSave=document.getElementById('yer-liq-save');
    btnSave.style.display=canSave?'':'none';
    modal.style.display='flex';

    document.getElementById('yer-liq-close').onclick=()=>{ modal.style.display='none'; };
    document.getElementById('yer-liq-print').onclick=()=>{
      const w=window.open('','_blank');
      w.document.write(`<html><head><title>Liquidacion YER ${liqData.mesLabel}</title><style>body{font-family:Arial,sans-serif;margin:0;}table{width:100%;border-collapse:collapse;}td,th{padding:8px 12px;border-bottom:1px solid #eee;}</style></head><body>${document.getElementById('yer-liq-printable').innerHTML}</body></html>`);
      w.document.close(); w.focus(); setTimeout(()=>{w.print();w.close();},400);
    };
    if(canSave){
      btnSave.onclick=async()=>{
        if(!YER.liqHistory) YER.liqHistory=[];
        YER.liqHistory=YER.liqHistory.filter(l=>l.mesLabel!==liqData.mesLabel);
        // Guardar snapshot completo del período para Ver/Editar
        liqData.snapshot={
          rows: JSON.parse(JSON.stringify(YER.rows||[])),
          evRows: JSON.parse(JSON.stringify(YER.evRows||[])),
          ventasFile: YER.ventasFile||null,
          everilioFile: YER.everilioFile||null,
          validaciones: JSON.parse(JSON.stringify(YER.validaciones||{}))
        };
        YER.liqHistory.push(liqData);
        // Ordenar por período
        YER.liqHistory.sort((a,b)=>(a.period||'').localeCompare(b.period||''));
        // Resetear para el próximo mes y limpiar período anterior seleccionado
        YER.rows=[]; YER.evRows=[];
        YER.ventasFile=null; YER.everilioFile=null;
        YER.validaciones={};
        delete YER._periodoAnterior;
        modal.style.display='none';
        showLoad(true); await saveYER(); showLoad(false);
        toast('Liquidación guardada ✓');
        yerSub='historial';
        renderTab();
      };
    }

  // LIQUIDAR — calcula y abre modal con botón Guardar
  el.querySelector('#yer-liquidar')?.addEventListener('click',()=>{
    const mesLabel=yerMesLabel();
    const summary={};
    YER_COMBUST.forEach(c=>{summary[c.key]={key:c.key,label:c.label,litros:0,importe:0,precio:0};});
    YER.rows.filter(r=>r.motivo!=='YER_NoComb').forEach(r=>{
      if(r.combustKey&&summary[r.combustKey]){
        summary[r.combustKey].litros+=r.litros;
        summary[r.combustKey].importe+=r.totalCom;
      }
    });
    const detalle=YER_COMBUST.map(c=>{const s=summary[c.key];return {...s,precio:s.litros>0?s.importe/s.litros:0};});
    const totalLt=YER.rows.filter(r=>r.motivo!=='YER_NoComb').reduce((a,r)=>a+r.litros,0);
    const totalCom=YER.rows.filter(r=>r.motivo!=='YER_NoComb').reduce((a,r)=>a+r.totalCom,0);
    // Calcular resumen de diferencias para guardar en el historial
    function calcDiferencias(vRows, eRows){
      if(!vRows||!eRows||!vRows.length||!eRows.length) return [];
      try{
        const {soloVentas,soloEv,diffMonto,vTotalPesos,vTotalLitros,eTotalPesos,vCount,eCount}=calcConciliacion();
        return [{
          registrosVentas:vCount,
          registrosEverilio:eCount,
          soloVentas:soloVentas.length,
          montoSoloVentas:soloVentas.reduce((a,r)=>a+(r.total||0),0),
          soloEverilio:soloEv.length,
          montoSoloEverilio:soloEv.reduce((a,r)=>a+(r.pvp||0),0),
          diffMonto:diffMonto.length,
          totalPesosVentas:vTotalPesos,
          totalLitrosVentas:vTotalLitros,
          totalPesosEverilio:eTotalPesos,
          sinDiferencias:Math.max(0,vCount-soloVentas.length-diffMonto.length)
        }];
      }catch(e){return [];}
    }

    const liq={
      mesLabel,
      period: YER._periodoAnterior || prevMonth(CP),
      detalle, totalLt, totalCom,
      fecha:new Date().toLocaleDateString('es-AR'),
      // Guardar referencia a los archivos cargados
      ventasFile: YER.ventasFile ? {fileName:YER.ventasFile.fileName,size:YER.ventasFile.size} : null,
      everilioFile: YER.everilioFile ? {fileName:YER.everilioFile.fileName,size:YER.everilioFile.size} : null,
      // Guardar resumen de diferencias
      diferencias: calcDiferencias(YER.rows, YER.evRows)
    };
    openLiqModal(liq, true); // canSave=true
  });

  // Nuevo período — resetea archivos y datos del período actual
  // ── Historial: Ver y Eliminar ─────────────────────────────────
  el.querySelectorAll('.yer-hist-ver').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx=parseInt(btn.getAttribute('data-liq-idx'));
      const liq=(YER.liqHistory||[])[idx];
      if(!liq) return;
      // Crear modal dinámico (no depende del estado yaLiquidado)
      const existingModal=document.getElementById('yer-dyn-modal');
      if(existingModal) existingModal.remove();
      const modal=document.createElement('div');
      modal.id='yer-dyn-modal';
      modal.style.cssText='position:fixed;inset:0;background:rgba(20,10,36,.6);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;';
      modal.innerHTML=`<div style="background:#fff;border-radius:14px;width:100%;max-width:660px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;max-height:90vh;display:flex;flex-direction:column;">
        <div id="yer-dyn-content" style="overflow-y:auto;flex:1;">${buildLiqContent(liq)}</div>
        <div style="padding:12px 20px 18px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid #E8E4F0;flex-shrink:0;">
          <button id="yer-dyn-print" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">🖨 Imprimir</button>
          <button id="yer-dyn-close" style="background:#fff;color:var(--m2);border:1px solid var(--b);border-radius:7px;padding:9px 20px;font-size:13px;font-weight:700;cursor:pointer;">Cerrar</button>
        </div>
      </div>`;
      document.body.appendChild(modal);
      modal.querySelector('#yer-dyn-close').onclick=()=>modal.remove();
      modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
      modal.querySelector('#yer-dyn-print').onclick=()=>{
        const w=window.open('','_blank');
        w.document.write(`<html><head><title>YER ${liq.mesLabel||liq.period||''}</title>
          <style>body{font-family:Arial,sans-serif;margin:0;}table{width:100%;border-collapse:collapse;}
          td,th{padding:8px 12px;border-bottom:1px solid #eee;}</style></head>
          <body>${modal.querySelector('#yer-liq-printable')?.innerHTML||''}</body></html>`);
        w.document.close();w.print();w.close();
      };
    });
  });

  el.querySelectorAll('.yer-hist-del').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const idx=parseInt(btn.getAttribute('data-liq-idx'));
      const liq=(YER.liqHistory||[])[idx];
      if(!liq)return;
      if(!confirm(`¿Eliminar liquidación de ${liq.mesLabel||liq.period}?`))return;
      YER.liqHistory.splice(idx,1);
      showLoad(true);await saveYER();showLoad(false);
      toast('Liquidación eliminada ✓');
      renderTab();
    });
  });
  el.querySelector('#yer-cancelar-anterior')?.addEventListener('click',async()=>{
    delete YER._periodoAnterior;
    YER.rows=[]; YER.evRows=[];
    YER.ventasFile=null; YER.everilioFile=null;
    YER.validaciones={};
    showLoad(true); await saveYER(); showLoad(false);
    renderTab();
  });

  // Historial y cargar período anterior — presentes en cualquier estado
  el.querySelector('#yer-hist-btn-top')?.addEventListener('click',()=>{yerSub='historial';renderTab();});
  el.querySelector('#yer-cargar-anterior-libre')?.addEventListener('click',()=>abrirModalPeriodoAnteriorYER());
  el.querySelector('#yer-cargar-anterior')?.addEventListener('click',()=>abrirModalPeriodoAnteriorYER());

// función movida afuera de attachYER para que onclick global funcione

  // Imprimir diferencias
  el.querySelector('#yer-nuevo-periodo')?.addEventListener('click',async()=>{
    if(!confirm('¿Limpiar los archivos del período actual para cargar el nuevo mes?')) return;
    YER.rows=[]; YER.evRows=[];
    YER.ventasFile=null; YER.everilioFile=null;
    YER.validaciones={};
    showLoad(true); await saveYER(); showLoad(false);
    yerSub='diferencias'; renderTab();
  });

  // Ver liquidación — restaura snapshot y muestra toda la pantalla de trabajo
  el.querySelectorAll('[data-liq-ver]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const i=parseInt(btn.getAttribute('data-liq-ver'));
      const liq=YER.liqHistory?.[i]; if(!liq) return;
      // Guardar estado actual
      YER._backup={rows:YER.rows,evRows:YER.evRows,ventasFile:YER.ventasFile,everilioFile:YER.everilioFile,validaciones:YER.validaciones};
      // Restaurar snapshot si existe, sino dejar los datos actuales
      if(liq.snapshot){
        YER.rows=JSON.parse(JSON.stringify(liq.snapshot.rows||[]));
        YER.evRows=JSON.parse(JSON.stringify(liq.snapshot.evRows||[]));
        YER.ventasFile=liq.snapshot.ventasFile||null;
        YER.everilioFile=liq.snapshot.everilioFile||null;
        YER.validaciones=JSON.parse(JSON.stringify(liq.snapshot.validaciones||{}));
      }
      YER._viewingLiq=i;
      YER._editingLiq=null;
      yerSub='diferencias';
      // Render directo sin loadYER para preservar los flags
      document.getElementById('tab-content').innerHTML=renderYER();
      attachYER();
    });
  });

  // Botón volver desde modo vista
  el.querySelector('#yer-volver-liq')?.addEventListener('click',()=>{
    if(YER._backup){
      YER.rows=YER._backup.rows;
      YER.evRows=YER._backup.evRows;
      YER.ventasFile=YER._backup.ventasFile;
      YER.everilioFile=YER._backup.everilioFile;
      YER.validaciones=YER._backup.validaciones;
    }
    YER._backup=null; YER._viewingLiq=null; YER._editingLiq=null;
    document.getElementById('tab-content').innerHTML=renderYER();
    attachYER();
  });

  // Editar liquidación — restaura snapshot y muestra pantalla completa para re-liquidar
  el.querySelectorAll('[data-liq-edit]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const i=parseInt(btn.getAttribute('data-liq-edit'));
      const liqOld=YER.liqHistory?.[i]; if(!liqOld) return;
      YER._backup={rows:YER.rows,evRows:YER.evRows,ventasFile:YER.ventasFile,everilioFile:YER.everilioFile,validaciones:YER.validaciones};
      if(liqOld.snapshot){
        YER.rows=JSON.parse(JSON.stringify(liqOld.snapshot.rows||[]));
        YER.evRows=JSON.parse(JSON.stringify(liqOld.snapshot.evRows||[]));
        YER.ventasFile=liqOld.snapshot.ventasFile||null;
        YER.everilioFile=liqOld.snapshot.everilioFile||null;
        YER.validaciones=JSON.parse(JSON.stringify(liqOld.snapshot.validaciones||{}));
      }
      YER._viewingLiq=i;
      YER._editingLiq=true;
      yerSub='diferencias';
      document.getElementById('tab-content').innerHTML=renderYER();
      attachYER();
    });
  });

  // Eliminar liquidación
  el.querySelectorAll('[data-liq-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const i=parseInt(btn.getAttribute('data-liq-del'));
      const liq=YER.liqHistory?.[i];
      if(!liq||!confirm('¿Eliminar la liquidación de '+liq.mesLabel+'?')) return;
      YER.liqHistory.splice(i,1);
      showLoad(true); await saveYER(); showLoad(false); toast('Eliminada'); renderTab();
    });
  });
}

// ── CANCELACIONES ─────────────────────────────────────────────

// ══════════════════════════════════════════════════════════════
// ── CANCELACIONES ─────────────────────────────────────────────
// ══════════════════════════════════════════════════════════════

const CANCEL_TIPOS=[
  'SERVICLUB','PELOTAS','CAMISETAS','REINTEGRO PROMO FULL + COSMÉTICA',
  'CUOCAM','REINTEGRO PROMO 20% BOXES','YER NO LUBRICANTE','LUBRICANTES POR COMBO',
  'OBJETIVO PLUS','YER','INCÓGNITO 100%','CANON SERVICIOS','SERVICIOS','VARIOS'
];
const CANCEL_COMP_TIPOS=['FACTURA','RECIBO','NOTA DE CRÉDITO','NOTA DE DÉBITO','OTROS'];

const MESES_LABELS=['Enero','Febrero','Marzo','Abril','Mayo','Junio',
  'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

let cancelView=null; // null=grilla, 'YYYY-MM'=vista mes, 'historial'=historial

function cancelPeriodLabel(period){
  const [y,m]=period.split('-');
  return MESES_LABELS[parseInt(m)-1]+' '+y;
}

function renderCancel(){
  if(cancelView==='historial') return renderCancelHistorial();
  if(cancelView) return renderCancelMes(cancelView);
  return renderCancelGrid();
}

// ── GRILLA MESES ─────────────────────────────────────────────
let cancelAnio=new Date().getFullYear();

function renderCancelGrid(){
  const anios=[];
  const yearNow=new Date().getFullYear();
  for(let y=yearNow-2;y<=yearNow+1;y++) anios.push(y);

  let html=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <h3 style="font-size:18px;font-weight:800;color:var(--pd);margin:0;">📋 Cancelaciones</h3>
      <div style="display:flex;align-items:center;gap:12px;">
        <div>
          <label style="font-size:11px;font-weight:700;color:var(--m2);text-transform:uppercase;margin-right:8px;">AÑO</label>
          <select id="cancel-anio-sel" style="padding:8px 14px;border:1.5px solid var(--p);border-radius:7px;font-size:14px;font-weight:700;color:var(--pd);cursor:pointer;">
            ${anios.map(y=>`<option value="${y}" ${y===cancelAnio?'selected':''}>${y}</option>`).join('')}
          </select>
        </div>
        <button id="cancel-historial-btn" style="background:var(--p);color:#fff;border:none;border-radius:7px;padding:8px 18px;font-size:13px;font-weight:700;cursor:pointer;">📂 Historial</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;">`;

  for(let m=1;m<=12;m++){
    const period=cancelAnio+'-'+String(m).padStart(2,'0');
    const regs=(PD.cancelaciones||[]).filter(r=>r.periodo===period);
    const count=regs.length;
    const done=count>0;
    const bg=done?'var(--gb)':'var(--rb)';
    const border=done?'var(--gbr)':'var(--rbr)';
    const labelColor=done?'var(--g)':'var(--r)';
    const badge=done
      ?`<span style="background:var(--g);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:4px;">${count} reg.</span>`
      :`<span style="background:var(--r);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:4px;">Sin datos</span>`;

    html+=`<div data-cancel-mes="${period}" style="background:${bg};border:2px solid ${border};border-radius:12px;padding:16px 14px;cursor:pointer;transition:all .15s;user-select:none;"
      onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.15)'"
      onmouseout="this.style.transform='';this.style.boxShadow=''">
      <div style="font-size:16px;font-weight:800;color:${labelColor};margin-bottom:8px;">${MESES_LABELS[m-1]}</div>
      ${badge}
    </div>`;
  }

  html+=`</div>`;
  return `<div class="cards"><div class="card"><div class="card-body">${html}</div></div></div>`;
}

// ── VISTA MES ─────────────────────────────────────────────────
function renderCancelMes(period){
  const regs=(PD.cancelaciones||[]).filter(r=>r.periodo===period)
    .sort((a,b)=>(a.fechaReg||'').localeCompare(b.fechaReg||''));
  const th=`padding:9px 10px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;text-align:center;`;

  const trs=regs.map((r,i)=>{
    const locked=!!r.locked;
    const rowBg=locked?(i%2===0?'#F8FFF8':'#F0FFF4'):(i%2===0?'#FFFFF0':'#FFFDE0');
    return `<tr style="background:${rowBg}" data-cancel-id="${r.id}">
      <td style="padding:7px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;">${esc(r.fechaReg||'—')}</td>
      <td style="padding:7px 10px;border:1px solid #D4C830;font-size:13px;font-weight:700;">${esc(r.tipo)}</td>
      <td style="padding:7px 10px;border:1px solid #D4C830;font-size:12px;text-align:center;">
        <span style="background:var(--p);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;">${esc(r.tipoComp)}</span>
      </td>
      <td style="padding:7px 10px;border:1px solid #D4C830;font-size:13px;text-align:center;font-family:monospace;">${esc(r.nroComp||'—')}</td>
      <td style="padding:7px 10px;border:1px solid #D4C830;font-size:13px;text-align:right;font-weight:700;color:var(--g);">${r.importe?'$ '+fmtArg(r.importe):'—'}</td>
      <td style="padding:7px 10px;border:1px solid #D4C830;text-align:center;">
        ${r.archivo
          ?`<button style="${BSTYLE_VER}" data-cancel-ver="${r.id}">👁 Ver</button>`
          :(!locked?`<label style="${BSTYLE_SUB};cursor:pointer;font-size:11px;">📁<input type="file" data-cancel-upload="${r.id}" accept=".pdf,.jpg,.jpeg,.png" hidden></label>`:'—')}
      </td>
      <td style="padding:7px 10px;border:1px solid #D4C830;text-align:center;">
        <div style="display:flex;gap:5px;justify-content:center;">
          ${locked
            ?`<button data-cancel-edit="${r.id}" style="background:var(--p);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;">✏</button>

function attachCancel(){
  const el=document.getElementById('tab-content');
  if(!PD.cancelaciones) PD.cancelaciones=[];

  // Selector de año
  el.querySelector('#cancel-anio-sel')?.addEventListener('change',e=>{
    cancelAnio=parseInt(e.target.value);
    renderTab();
  });

  // Grilla: click en mes
  el.querySelectorAll('[data-cancel-mes]').forEach(tile=>{
    tile.addEventListener('click',()=>{
      cancelView=tile.getAttribute('data-cancel-mes');
      renderTab();
    });
  });

  // Historial
  el.querySelector('#cancel-historial-btn')?.addEventListener('click',()=>{
    cancelView='historial'; renderTab();
  });

  // Volver
  el.querySelector('#cancel-back')?.addEventListener('click',()=>{
    cancelView=null; renderTab();
  });

  // Mostrar/ocultar formulario
  el.querySelector('#cancel-new-btn')?.addEventListener('click',()=>{
    const f=el.querySelector('#cancel-form');
    if(f) f.style.display=f.style.display==='none'?'block':'none';
  });
  el.querySelector('#cancel-form-cancel')?.addEventListener('click',()=>{
    const f=el.querySelector('#cancel-form');
    if(f) f.style.display='none';
  });

  // Agregar
  el.querySelector('#cancel-form-add')?.addEventListener('click',async()=>{
    const tipo=el.querySelector('#cancel-tipo')?.value;
    const fecha=el.querySelector('#cancel-fecha')?.value||'';
    const tipoComp=el.querySelector('#cancel-tipo-comp')?.value||'FACTURA';
    const nroComp=el.querySelector('#cancel-nro')?.value.trim()||'';
    const importe=pN(el.querySelector('#cancel-importe')?.value)||null;
    if(!tipo){alert('Seleccioná un tipo.');return;}
    const id=Math.random().toString(36).slice(2,10);
    PD.cancelaciones.push({id,tipo,periodo:cancelView,fechaReg:fecha,tipoComp,nroComp,importe,archivo:null,locked:false});
    showLoad(true);await saveP();showLoad(false);
    toast('Cancelación agregada ✓');renderTab();
  });

  // Guardar
  el.querySelectorAll('[data-cancel-save]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const r=PD.cancelaciones.find(x=>x.id===btn.getAttribute('data-cancel-save'));
      if(r){r.locked=true;showLoad(true);await saveP();showLoad(false);toast('Guardado ✓');renderTab();}
    });
  });

  // Editar
  el.querySelectorAll('[data-cancel-edit]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const r=PD.cancelaciones.find(x=>x.id===btn.getAttribute('data-cancel-edit'));
      if(r){r.locked=false;showLoad(true);await saveP();showLoad(false);renderTab();}
    });
  });

  // Eliminar
  el.querySelectorAll('[data-cancel-del]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const r=PD.cancelaciones.find(x=>x.id===btn.getAttribute('data-cancel-del'));
      if(!r||!confirm('¿Eliminar esta cancelación?'))return;
      showLoad(true);
      await sDel('file:cancel:'+r.id,true);
      PD.cancelaciones=PD.cancelaciones.filter(x=>x.id!==r.id);
      await saveP();showLoad(false);toast('Eliminado');renderTab();
    });
  });

  // Subir archivo
  el.querySelectorAll('[data-cancel-upload]').forEach(inp=>{
    inp.addEventListener('change',async e=>{
      const file=e.target.files[0];if(!file)return;
      if(file.size>MAX_FILE){alert('Archivo muy grande (máx 3,5 MB)');return;}
      const id=inp.getAttribute('data-cancel-upload');
      showLoad(true);
      try{
        const du=await readDU(file);
        await sSet('file:cancel:'+id,JSON.stringify({fileName:file.name,type:file.type,dataUrl:du}),true);
        const r=PD.cancelaciones.find(x=>x.id===id);
        if(r) r.archivo={fileName:file.name,size:file.size,uploadedAt:new Date().toISOString()};
        await saveP();toast('Archivo subido ✓');
      }catch(err){alert('Error: '+err.message);}
      showLoad(false);renderTab();
    });
  });

  // Ver archivo
  el.querySelectorAll('[data-cancel-ver]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const id=btn.getAttribute('data-cancel-ver');
      showLoad(true);
      const raw=await sGet('file:cancel:'+id,true);
      showLoad(false);
      if(!raw){alert('No se pudo recuperar el archivo.');return;}
      openFileViewer(JSON.parse(raw));
    });
  });

  // Búsqueda mes
  activateSearch('cancel-search','.cancel-tbody tr');
  // Búsqueda historial
  activateSearch('cancel-hist-search','.cancel-hist-row');
}

// ── PARSER PDF FACTURA / NC HOTEL ────────────────────────────
function parseHotelPDF(text){
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);

  let tipo='', puntoVenta='', numero='', fecha='', total=null;

  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(l==='FACTURA'||l==='N.CREDITO'||l==='FACTURA X'){
      tipo=l;
      if(i>0&&/^\d{8}$/.test(lines[i-1])) numero=lines[i-1];
      if(i+1<lines.length&&/^\d{4}$/.test(lines[i+1])) puntoVenta=lines[i+1];
      if(i+2<lines.length&&/^\d{2}\/\d{2}\/\d{4}$/.test(lines[i+2])) fecha=lines[i+2];
    }
  }

  // El TOTAL real está como el último número grande del documento
  // (el template tiene "TOTAL" al inicio pero los valores vienen al final)
  // Buscar todos los números con formato de importe (con puntos y coma) que sean > 1000
  const importeRE=/^\d{1,3}(\.\d{3})*,\d{2}$/;
  let lastGrande=null;
  for(const l of lines){
    if(importeRE.test(l)){
      const v=parseFloat(l.replace(/\./g,'').replace(',','.'));
      if(v>1000) lastGrande=v; // el último importe grande es el TOTAL
    }
  }
  total=lastGrande;

  const nroCompleto = puntoVenta&&numero ? `${puntoVenta}-${numero}` : '';
  const esNC = tipo==='N.CREDITO';

  return { tipo, nroCompleto, fecha, total: esNC&&total ? -(Math.abs(total)) : total };
}
