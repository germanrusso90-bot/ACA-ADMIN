let checksAnio=new Date().getFullYear();
let checksView=null; // null=grilla, 'YYYY-MM'=vista mes

function parseCheckPDF(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const ESTADOS=new Set(['Cumple','No cumple','No Cumple','N/A','Sí','Si','No']);
  let eess='',fecha='',auditor='';

  // ── Detectar formato ──────────────────────────────────────────
  // Formato SafetyCulture: tiene "Score" y "Flagged items" en encabezado
  // y sectores seguidos de "X / Y (Z%)"
  const esSafetyCulture = lines.slice(0,20).some(l=>l==='Score'||l==='Flagged items'||l.includes('safetyculture.com'));
  // Formato 1 (Alina/MAS tabla): tiene líneas que son solo números (N° de pregunta)
  // PERO el número debe estar seguido de texto de pregunta real, no del resumen ejecutivo
  const RESUMEN_KW=new Set(['Cumplimiento','Total','Score','Flagged','Indicador','Valor','Hallazgos','Resumen']);
  const esFormato1 = !esSafetyCulture && lines.slice(0,120).some((l,idx)=>{
    if(!/^\d+$/.test(l)) return false;
    const n=parseInt(l);
    if(n<1||n>110) return false;
    const next=lines.slice(idx+1).find(x=>x.length>0);
    if(!next) return false;
    if(/^\d+$/.test(next)) return false;
    if(['Cumple','No Cumple','N/A','No cumple'].includes(next)) return false;
    if([...RESUMEN_KW].some(k=>next.includes(k))) return false;
    if(next.includes('%')) return false;
    return next.length > 15;
  });

  // ── Extraer encabezado ────────────────────────────────────────
  for(let i=0;i<Math.min(25,lines.length);i++){
    const l=lines[i];
    if(l.includes('EESS:'))      eess=l.replace(/.*EESS:\s*/,'').replace(/Fecha:.*/,'').trim();
    if(l.includes('Fecha:'))     fecha=l.replace(/.*Fecha:\s*/,'').trim();
    if(l.includes('Auditor:'))   auditor=l.replace(/.*Auditor:\s*/,'').trim();
    if(l==='Establecimiento'&&lines[i+1]) eess=lines[i+1];
    if(l==='Fecha de la auditoría'&&lines[i+1]) fecha=lines[i+1];
    if(l==='Auditor'&&lines[i+1]&&!auditor) auditor=lines[i+1];
    if(l==='Dependencia'&&lines[i+1]&&!eess) eess=lines[i+1];
    if(l==='Fecha'&&lines[i+1]&&!fecha) fecha=lines[i+1];
  }

  // ── FORMATO SAFETYCULTURE ─────────────────────────────────────
  // ── Detectar tipo de auditor automáticamente ─────────────────
  // SafetyCulture = Gestor de Calidad
  // Alina Sierra / A. Sierra = Seguridad e Higiene
  // Andrés Sierra / Andres Sierra = Seguridad e Higiene
  // Cualquier otro = Otros
  let auditorTipo='';
  const auditorNorm=(auditor||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(esSafetyCulture)                           auditorTipo='Gestor Calidad';
  else if(/sierra|alina|andres/i.test(auditorNorm)) auditorTipo='Seguridad e Higiene';
  else if(auditor)                              auditorTipo='Otros';

  if(esSafetyCulture){
    // Filtrar letras sueltas (header visual del PDF) y URLs
    const filt=lines.filter(l=>l.length>1&&!l.includes('safetyculture.com'));
    const items=[];
    let n=1, sectorActual='', i=0;
    // Buscar inicio del primer sector real
    while(i<filt.length&&!/^\d+ \/ \d+/.test(filt[i]))i++;
    if(i>0)i--;
    while(i<filt.length){
      const l=filt[i];
      // Sector: seguido de score
      if(i+1<filt.length&&/^\d+ \/ \d+/.test(filt[i+1])){sectorActual=l;i+=2;continue;}
      // Score solo (encabezado global)
      if(/^\d+ \/ \d+/.test(l)){i++;continue;}
      // Estado solo sin pregunta
      if(ESTADOS.has(l)){i++;continue;}
      // Acumular pregunta hasta estado
      const preg=[];
      while(i<filt.length){
        const ll=filt[i];
        if(ESTADOS.has(ll)||/^\d+ \/ \d+/.test(ll))break;
        if(i+1<filt.length&&/^\d+ \/ \d+/.test(filt[i+1]))break;
        preg.push(ll);i++;
      }
      if(!preg.length){i++;continue;}
      const pregunta=preg.join(' ');
      // Descartar el item del encabezado global (Score/Flagged/etc.)
      if(pregunta.includes('Flagged items')||pregunta.includes('Apies')||pregunta.length<5){i++;continue;}
      let estado='Cumple';
      const obs=[];
      if(i<filt.length&&ESTADOS.has(filt[i])){
        estado=filt[i];i++;
        // Obs: hasta próxima pregunta larga o sector
        while(i<filt.length){
          const nxt=filt[i];
          if(ESTADOS.has(nxt))break;
          if(/^\d+ \/ \d+/.test(nxt))break;
          if(i+1<filt.length&&/^\d+ \/ \d+/.test(filt[i+1])){obs.push(nxt);i++;break;}
          // Si la observación siguiente es claramente una nueva pregunta (larga, empieza con mayúscula)
          if(obs.length>0&&nxt.length>40&&/^[A-ZÁÉÍÓÚ]/.test(nxt))break;
          obs.push(nxt);i++;
        }
      }
      // Ignorar ítems Sí/No (preguntas comerciales)
      if(!['Sí','Si','No'].includes(estado)){
        items.push({n:n++,pregunta,estado,obs:obs.join(' '),sector:sectorActual,fechaObs:''});
      }
    }
    return{eess,fecha,auditor,auditorTipo,items};
  }

  // ── FORMATO MAS TABLA (Alina/Andrés) ─────────────────────────
  const SECTORES_RE=/^(PLAYA Y SURTIDORES|PLAYA|PROTECCION CONTRA INCENDIO|PROTECCION CONTRA|INSTALACIONES ELECTRICAS|INSTALACIONES|BOXES|LAVADERO|DEPOSITOS|TIENDA Y CAJA EDIFICADA|TIENDA|EQUIPAMIENTO|EPP|DOCUMENTACION|OTROS)/i;
  const PALABRAS_SECTOR=new Set(['PLAYA','SURTIDORES','PROTECCION','INCENDIO','INSTALACIONES',
    'ELECTRICAS','BOXES','LAVADERO','DEPOSITOS','TIENDA','CAJA','EDIFICADA',
    'EQUIPAMIENTO','EPP','DOCUMENTACION','OTROS','CONTRA']);

  if(esFormato1){
    // ── FORMATO 1: N° | pregunta | estado | obs | fechaObs | sector ──
    const items=[];
    let i=0;
    while(i<lines.length&&!/^\d+$/.test(lines[i]))i++;
    let n=1;
    while(i<lines.length){
      const l=lines[i];
      if(!/^\d+$/.test(l)){i++;continue;}
      const num=parseInt(l);
      if(num<1||num>110){i++;continue;}
      i++;
      const preg=[],obs=[],sect=[];
      let estado=null,fechaObs='';
      while(i<lines.length){
        const ll=lines[i];
        if(/^(Cumple|No Cumple|N\/A)/i.test(ll)){estado=ll;i++;break;}
        if(/^N° Pregunta/.test(ll)){i++;break;}
        preg.push(ll);i++;
      }
      if(!estado)continue;
      while(i<lines.length){
        const ll=lines[i];
        if(/^\d+$/.test(ll)&&parseInt(ll)>=1&&parseInt(ll)<=110)break;
        if(/^N° Pregunta/.test(ll))break;
        if(/^\d{2}\/\d{4}$/.test(ll))fechaObs=ll;
        else if(/^[A-ZÁÉÍÓÚÑ\s\/\-Y]+$/.test(ll)&&ll.length>3&&ll===ll.toUpperCase()&&PALABRAS_SECTOR.has(ll.split(' ')[0]))sect.push(ll);
        else if(ll)obs.push(ll);
        i++;
      }
      items.push({n:num,pregunta:preg.filter(Boolean).join(' '),estado:estado.trim(),
        obs:obs.filter(Boolean).join(' '),fechaObs,sector:sect.join(' ')});
    }
    return{eess,fecha,auditor,auditorTipo,items};
  }

  // ── FORMATO 2 (Andrés): SECTOR | pregunta | estado | [obs] ───
  const filt=lines.filter(Boolean);
  let start=0;
  for(let i=0;i<filt.length;i++){
    if(filt[i]==='Observaciones'&&i>0&&(filt[i-1]==='Resultado'||filt[i-1]==='Pregunta')){start=i+1;break;}
    if(SECTORES_RE.test(filt[i])&&start===0)start=i;
  }
  // Fusionar sectores partidos
  const fused=[];
  let i=start;
  while(i<filt.length){
    const l=filt[i];
    if(PALABRAS_SECTOR.has(l.toUpperCase())&&!ESTADOS.has(l)){
      let merged=l;let j=i+1;
      while(j<filt.length&&PALABRAS_SECTOR.has(filt[j].toUpperCase())&&!ESTADOS.has(filt[j])&&filt[j].length<25){merged+=' '+filt[j];j++;}
      fused.push(merged);i=j;
    } else {fused.push(l);i++;}
  }
  const items=[];
  let ni=1,sectorActual2='';i=0;
  while(i<fused.length){
    const l=fused[i];
    if(SECTORES_RE.test(l.toUpperCase())){
      sectorActual2=l;i++;
      const preg=[];
      while(i<fused.length){const ll=fused[i];if(ESTADOS.has(ll)||SECTORES_RE.test(ll.toUpperCase()))break;preg.push(ll);i++;}
      if(!preg.length)continue;
      const estado=ESTADOS.has(fused[i])?fused[i++]:'Cumple';
      const obs=[];
      while(i<fused.length){const ll=fused[i];if(SECTORES_RE.test(ll.toUpperCase())||ESTADOS.has(ll))break;obs.push(ll);i++;}
      items.push({n:ni++,pregunta:preg.join(' '),estado,obs:obs.join(' '),fechaObs:'',sector:sectorActual2});
    } else {i++;}
  }
  return{eess,fecha,auditor,auditorTipo,items};
}

// Busca un item por n en todos los checks del período (maneja array o objeto)
function findAndUpdateNC(raw, n, updateFn){
  const parsed=JSON.parse(raw);
  const checkArr=Array.isArray(parsed)?parsed:[parsed];
  let found=false;
  for(const chk of checkArr){
    const item=(chk.items||[]).find(x=>x.n===n);
    if(item){updateFn(item);found=true;break;}
  }
  return{updated:JSON.stringify(checkArr.length===1?checkArr[0]:checkArr),found};
}

async function attachNCHandlers(container){
  // Guardar detalle sin cerrar
  container.querySelectorAll('[data-nc-guardar]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const periodo=btn.getAttribute('data-nc-guardar');
      const n=parseInt(btn.getAttribute('data-nc-n'));
      const det=container.querySelector(`#nc-det-${periodo}-${n}`)?.value.trim()||'';
      showLoad(true);
      const raw=await sGet(`check:${periodo}`,true);
      if(raw){
        const{updated,found}=findAndUpdateNC(raw,n,item=>{item.detalle=det;item.detalleAt=new Date().toISOString();});
        if(found)await sSet(`check:${periodo}`,updated,true);
        toast('Detalle guardado ✓');
      }
      showLoad(false);
    });
  });

  // Cerrar NC
  container.querySelectorAll('[data-nc-cerrar]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const periodo=btn.getAttribute('data-nc-cerrar');
      const n=parseInt(btn.getAttribute('data-nc-n'));
      const det=container.querySelector(`#nc-det-${periodo}-${n}`)?.value.trim()||'';
      if(!confirm('¿Marcar como cerrada?'))return;
      showLoad(true);
      const raw=await sGet(`check:${periodo}`,true);
      if(raw){
        const{updated,found}=findAndUpdateNC(raw,n,item=>{item.cerrada=true;item.detallecierre=det;item.fechaCierre=new Date().toISOString();});
        if(found)await sSet(`check:${periodo}`,updated,true);
        toast('No conformidad cerrada ✓');
        const card=container.querySelector(`#nc-card-${periodo}-${n}`);
        if(card){
          card.style.background='var(--gb)';card.style.borderColor='var(--gbr)';
          card.innerHTML=`<div style="display:flex;align-items:center;gap:10px;padding:4px"><span style="font-size:20px">✅</span><span style="font-size:13px;font-weight:700;color:var(--g)">Cerrada — N°${n}</span></div>`;
        }
      }
      showLoad(false);
    });
  });

  // Reabrir NC (desde historial)
  container.querySelectorAll('[data-nc-reabrir]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const periodo=btn.getAttribute('data-nc-reabrir');
      const n=parseInt(btn.getAttribute('data-nc-n'));
      if(!confirm('¿Reabrir esta no conformidad? Volverá a aparecer en Pendientes.'))return;
      showLoad(true);
      const raw=await sGet(`check:${periodo}`,true);
      if(raw){
        const{updated,found}=findAndUpdateNC(raw,n,item=>{delete item.cerrada;delete item.detallecierre;delete item.fechaCierre;});
        if(found)await sSet(`check:${periodo}`,updated,true);
        toast('NC reabierta — vuelve a Pendientes ✓');
        // Actualizar fila visualmente
        const row=container.querySelector(`#hist-row-${periodo}-${n}`);
        if(row){
          row.style.background='#FFF5F5';
          const badge=row.querySelector('span[style*="background"]');
          if(badge){badge.style.background='var(--r)';badge.textContent='⏳ Abierta';}
          btn.remove();
        }
      }
      showLoad(false);
    });
  });
}

// ── Helper: extrae TODOS los items de un check (puede ser objeto o array de checks)
function getItemsDeCheck(raw){
  if(!raw) return [];
  const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
  const checkArr = Array.isArray(parsed) ? parsed : [parsed];
  // Concatenar items de todos los checks del mes
  return checkArr.flatMap(c => (c.items||[]).map(x=>({
    ...x,
    auditor: x.auditor || c.auditor || '',
    auditorTipo: x.auditorTipo || c.auditorTipo || ''
  })));
}
function getUltimoCheckData(raw){
  // Devuelve el último check cargado del mes (para auditor, pdfMeta, etc.)
  if(!raw) return null;
  const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
  const checkArr = Array.isArray(parsed) ? parsed : [parsed];
  return checkArr[checkArr.length-1];
}

async function loadCheckBadges(el){
  const yn=checksAnio;
  for(let m=1;m<=12;m++){
    const period=`${yn}-${String(m).padStart(2,'0')}`;
    const raw=await sGet(`check:${period}`,true);
    if(!raw)continue;
    const items=getItemsDeCheck(raw);
    const tile=el.querySelector(`#check-tile-${period}`);
    const badge=el.querySelector(`#check-badge-${period}`);
    const label=el.querySelector(`#check-tile-label-${period}`);
    const nc=items.filter(x=>/no cumple/i.test(x.estado));
    const ncAbiertas=nc.filter(x=>!x.cerrada);
    if(tile){tile.style.background='var(--gb)';tile.style.borderColor='var(--gbr)';}
    if(label)label.style.color=ncAbiertas.length>0?'var(--r)':'var(--g)';
    if(badge){
      badge.style.background=ncAbiertas.length>0?'var(--r)':'var(--g)';
      badge.textContent=ncAbiertas.length>0?`${ncAbiertas.length} NC abiertas`:`✓ ${nc.length===0?'Compliant':'NC cerradas'}`;
    }
  }
}

async function getNcPendientes(cr){
  const yn=new Date().getFullYear();
  const periodos=[];
  for(let y=yn-1;y<=yn;y++)for(let m=1;m<=12;m++)periodos.push(`${y}-${String(m).padStart(2,'0')}`);
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  let pendientes=0;
  const todasNC=[];
  let ultimoCheck=null;
  for(const p of periodos){
    const raw=await sGetCR(cr,'check:'+p);
    if(!raw)continue;
    const[y,m]=p.split('-');
    const mesLabel=`${MESES[parseInt(m)-1]}-${y}`;
    ultimoCheck=mesLabel;
    // Usar helper que maneja array o objeto
    const items=getItemsDeCheck(raw);
    const nc=items.filter(x=>/no cumple/i.test(x.estado));
    nc.forEach(x=>todasNC.push({...x,periodo:p,mesLabel,cerrada:!!x.cerrada}));
    pendientes+=nc.filter(x=>!x.cerrada).length;
  }
  return{pendientes,todasNC,ultimoCheck};
}

async function sGetCR(cr,k){
  const fk=`cr${cr}:${k}`;
  // 1. Memoria
  if(_cache[fk]!==undefined)return _cache[fk];
  // 2. localStorage con TTL
  const lv=lsGet(fk);
  if(lv!==null){_cache[fk]=lv;_fbRefresh(fk);return lv;}
  // 3. Firebase
  try{
    const db=await getDB();
    const snap=await db.getDoc(db.doc(db.fs,'kv',encodeKey(fk)));
    const val=snap.exists()?snap.data().v:null;
    _cache[fk]=val;
    if(val!==null)lsSet(fk,val,getTTL(fk));
    return val;
  }catch(e){return null;}
}

function ncColor(n){
  if(n===0)return{bg:'var(--gb)',border:'var(--gbr)',text:'var(--g)',circle:'#1E9E6B'};
  if(n<=3)return{bg:'#FFFBEB',border:'#FDE68A',text:'#92400E',circle:'#F59E0B'};
  if(n<=7)return{bg:'#FFF7ED',border:'#FED7AA',text:'#9A3412',circle:'#F97316'};
  return{bg:'var(--rb)',border:'var(--rbr)',text:'var(--r)',circle:'#EF4444'};
}

// ── EXPORT EXCEL COMPLETO (todas las dependencias) ────────────
function exportResumenExcel(results){
  if(typeof XLSX==='undefined'){alert('Error: librería XLSX no disponible');return;}
  // Hoja 1: Resumen por dependencia
  const rows1=[['CR','Dependencia','Último Check','NC Pendientes','NC Totales','Estado']];
  results.forEach(d=>{
    const estado=d.pendientes===0?'OK':d.pendientes<=3?'Atención':d.pendientes<=7?'Alerta':'Crítico';
    rows1.push([d.cr,d.nombre,d.ultimoCheck||'Sin check',d.pendientes,d.todasNC?.length||0,estado]);
  });
  // Hoja 2: Detalle NC de todas
  const rows2=[['CR','Dependencia','Período','No Conformidad','Observación','Sector','Auditor','Estado','Detalle cierre']];
  results.forEach(d=>{
    (d.todasNC||[]).forEach(x=>rows2.push([
      d.cr,d.nombre,x.mesLabel||'',x.pregunta||'',x.obs||'',
      x.sector||'',x.auditor||'',x.cerrada?'Cerrada':'Pendiente',x.detallecierre||x.detalle||''
    ]));
  });
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.aoa_to_sheet(rows1);
  ws1['!cols']=[{wch:8},{wch:22},{wch:12},{wch:14},{wch:12},{wch:10}];
  const ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:8},{wch:22},{wch:10},{wch:55},{wch:40},{wch:25},{wch:20},{wch:12},{wch:35}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
  XLSX.utils.book_append_sheet(wb,ws2,'Detalle NC');
  XLSX.writeFile(wb,'NC_Todas_Dependencias.xlsx');
}

      onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,.12)'"
      onmouseout="this.style.transform='';this.style.boxShadow=''">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px">
        <div>
          <div style="font-size:10px;font-weight:700;color:${c.text};opacity:.7;margin-bottom:2px">CR ${d.cr}</div>
          <div style="font-size:14px;font-weight:800;color:var(--pd)">${esc(d.nombre)}</div>
        </div>
        <div style="width:38px;height:38px;border-radius:50%;background:${c.circle};display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:900;flex-shrink:0">${d.pendientes}</div>
      </div>
      <div style="font-size:11px;color:${c.text};font-weight:700;margin-bottom:4px">${d.pendientes===0?'✅ Sin NC pendientes':d.pendientes+' NC pendiente'+(d.pendientes>1?'s':'')}</div>
      <div style="font-size:10px;color:var(--m2);">${d.ultimoCheck?'📅 Último check: <strong>'+d.ultimoCheck+'</strong>':'⚠️ Sin check registrado'}</div>
    </div>`;
  }).join('');

  const totalNC=results.reduce((a,d)=>a+d.pendientes,0);
  const sinNC=results.filter(d=>d.pendientes===0).length;
  const ct=ncColor(totalNC>7?8:totalNC);

  el.innerHTML=`<div class="cards"><div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
      <h3>✅ No Conformidades — Todas las Dependencias</h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="background:${ct.bg};border:1px solid ${ct.border};color:${ct.text};font-size:12px;font-weight:800;padding:5px 14px;border-radius:6px">${totalNC} NC pendientes</span>
        <span style="background:var(--gb);border:1px solid var(--gbr);color:var(--g);font-size:12px;font-weight:800;padding:5px 14px;border-radius:6px">${sinNC}/${results.length} OK</span>
        <button id="div-exp-xlsx" style="background:#1E9E6B;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">📥 Excel</button>
        <button id="div-exp-pdf" style="background:#EF4444;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">📄 PDF</button>
      </div>
    </div>
    <div class="card-body">
      <div style="display:flex;gap:12px;font-size:11px;font-weight:700;margin-bottom:16px;flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#1E9E6B;display:inline-block"></span>0 — OK</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#F59E0B;display:inline-block"></span>1-3</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#F97316;display:inline-block"></span>4-7</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#EF4444;display:inline-block"></span>8+</span>
      </div>
      <div id="div-cards-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">${cards}</div>
    </div>
  </div></div>`;

  el.querySelector('#div-exp-xlsx')?.addEventListener('click',()=>{
    if(window._divResults)exportResumenExcel(window._divResults);
  });
  el.querySelector('#div-exp-pdf')?.addEventListener('click',()=>{
    if(!window._divResults)return;
    const rows=window._divResults.map(d=>`
      <tr><td>${d.cr}</td><td>${d.nombre}</td><td>${d.ultimoCheck||'—'}</td>
      <td>${d.pendientes}</td><td>${d.todasNC?.length||0}</td>
      <td><span class="${d.pendientes===0?'cerr':'pend'}">${d.pendientes===0?'OK':d.pendientes<=3?'Atención':d.pendientes<=7?'Alerta':'Crítico'}</span></td></tr>`).join('');
    exportDivPDF('Resumen NC — Todas las Dependencias',
      `<table><thead><tr><th>CR</th><th>Dependencia</th><th>Último Check</th><th>NC Pend.</th><th>NC Total</th><th>Estado</th></tr></thead><tbody>${rows}</tbody></table>`);
  });
  el.querySelectorAll('[data-div-cr]').forEach(card=>{
    card.addEventListener('click',async()=>{
      divView=card.getAttribute('data-div-cr');
      el.innerHTML=`<div class="cards"><div class="card"><div class="card-body"><div style="text-align:center;padding:40px;color:var(--m2)">⏳ Cargando...</div></div></div></div>`;
      await renderDivisionalNC(divView);
    });
  });
}

async function renderDivisionalNC(cr){
  const el=document.getElementById('tab-content');
  const dep=DEPENDENCIAS.find(d=>d.cr===cr);
  const yn=new Date().getFullYear();
  const periodos=[];
  for(let y=yn-1;y<=yn;y++)for(let m=1;m<=12;m++)periodos.push(`${y}-${String(m).padStart(2,'0')}`);
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const todasNC=[];
  let ultimoCheck=null;
  for(const p of periodos){
    const raw=await sGetCR(cr,'check:'+p);
    if(!raw)continue;
    const[y,m]=p.split('-');
    const mesLabel=`${MESES[parseInt(m)-1]}-${y}`;
    ultimoCheck=mesLabel;
    const items=getItemsDeCheck(raw);
    items.filter(x=>/no cumple/i.test(x.estado))
      .forEach(x=>todasNC.push({...x,periodo:p,mesLabel}));
  }
  const pendientes=todasNC.filter(x=>!x.cerrada).length;
  const c=ncColor(pendientes);

  // Períodos únicos para filtro
  const periodosUnicos=[...new Set(todasNC.map(x=>x.mesLabel))].sort();

  function buildTable(data){
    if(!data.length)return`<div class="empty-s" style="padding:32px;text-align:center;color:var(--m2)">No hay no conformidades con los filtros seleccionados.</div>`;
    const th=`padding:9px 12px;background:var(--y);color:var(--pd);font-size:11px;text-transform:uppercase;font-weight:800;border:1px solid #C9A800;`;
    const trs=data.map((x,i)=>{
      const cerrada=!!x.cerrada;
      const rowBg=cerrada?(i%2===0?'#F0FFF4':'#F5FFFA'):(i%2===0?'#ffffff':'#FFF5F5');
      return`<tr style="background:${rowBg}">
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:12px;font-weight:700;white-space:nowrap;text-align:center">${x.mesLabel}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:12px">${esc(x.pregunta)}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:11px;color:${cerrada?'var(--m2)':'var(--r)'}">${esc(x.obs||'')}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:11px">${esc(x.sector||'')}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;text-align:center">${badgeEstado(cerrada)}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:11px;color:var(--m2)">${esc(x.detallecierre||x.detalle||'')}</td>
        <td style="padding:8px 10px;border:1px solid #E0D4F0;font-size:11px;color:var(--m2)">${esc(x.auditor||'—')}</td>
      </tr>`;
    }).join('');
    return`<div style="overflow-x:auto"><table id="div-nc-table" style="border-collapse:collapse;width:100%;min-width:820px">
      <thead><tr>
        <th style="${th}width:90px">Período</th>
        <th style="${th}">No Conformidad</th>
        <th style="${th}">Observación</th>
        <th style="${th}width:130px">Sector</th>
        <th style="${th}width:110px">Estado</th>
        <th style="${th}">Detalle</th>
        <th style="${th}width:120px">Auditor</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table></div>`;
  }

  function getFiltered(){
    const busq=(document.getElementById('div-busq')?.value||'').toLowerCase();
    const filtPer=document.getElementById('div-filt-per')?.value||'';
    const filtEst=document.getElementById('div-filt-est')?.value||'';
    return todasNC.filter(x=>{
      if(filtPer&&x.mesLabel!==filtPer)return false;
      if(filtEst==='pendiente'&&x.cerrada)return false;
      if(filtEst==='cerrada'&&!x.cerrada)return false;
      if(busq){
        const txt=(x.pregunta+x.obs+x.sector+x.mesLabel+x.auditor).toLowerCase();
        if(!txt.includes(busq))return false;
      }
      return true;
    });
  }

  function getTableHtmlForExport(data){
    return`<table><thead><tr><th>Período</th><th>No Conformidad</th><th>Observación</th><th>Sector</th><th>Estado</th><th>Detalle</th><th>Auditor</th></tr></thead>
    <tbody>${data.map(x=>`<tr><td>${x.mesLabel}</td><td>${x.pregunta}</td><td>${x.obs||''}</td><td>${x.sector||''}</td>
      <td><span class="${x.cerrada?'cerr':'pend'}">${x.cerrada?'Cerrada':'Pendiente'}</span></td>
      <td>${x.detallecierre||x.detalle||''}</td><td>${x.auditor||''}</td></tr>`).join('')}
    </tbody></table>`;
  }

  el.innerHTML=`<div class="cards"><div class="card">
    <div class="card-header" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button id="div-back" style="background:none;border:none;color:var(--p);font-size:20px;cursor:pointer;font-weight:700">←</button>
      <div style="flex:1">
        <h3>${esc(dep?.nombre||cr)} — No Conformidades</h3>
        <div style="font-size:12px;color:var(--m2);margin-top:2px">CR ${cr} · ${todasNC.length} registradas · <span style="color:${c.text};font-weight:700">${pendientes} pendientes</span>${ultimoCheck?' · Último check: '+ultimoCheck:''}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button id="div-nc-xlsx" style="background:#1E9E6B;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">📥 Excel</button>
        <button id="div-nc-jpg" style="background:#6366F1;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">🖼 JPG</button>
        <button id="div-nc-pdf" style="background:#EF4444;color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer">📄 PDF</button>
      </div>
    </div>
    <div class="card-body">
      <!-- Filtros y buscador -->
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center">
        <div style="position:relative;flex:1;min-width:180px">
          <input id="div-busq" type="text" placeholder="🔍 Buscar en NC, observaciones, sector..."
            style="width:100%;padding:9px 12px 9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;background:var(--card2);color:var(--pd);box-sizing:border-box">
        </div>
        <select id="div-filt-per" style="padding:9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;background:var(--card2);color:var(--pd);cursor:pointer">
          <option value="">📅 Todos los períodos</option>
          ${periodosUnicos.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <select id="div-filt-est" style="padding:9px 14px;border:1.5px solid var(--b);border-radius:8px;font-size:13px;background:var(--card2);color:var(--pd);cursor:pointer">
          <option value="">🔘 Todos los estados</option>
          <option value="pendiente">⏳ Pendientes</option>
          <option value="cerrada">✓ Cerradas</option>
        </select>
      </div>
      <!-- Tabla -->
      <div id="div-nc-content">${buildTable(todasNC)}</div>
    </div>
  </div></div>`;

  // Filtros reactivos
  ['div-busq','div-filt-per','div-filt-est'].forEach(id=>{
    el.querySelector('#'+id)?.addEventListener('input',()=>{
      el.querySelector('#div-nc-content').innerHTML=buildTable(getFiltered());
    });
    el.querySelector('#'+id)?.addEventListener('change',()=>{
      el.querySelector('#div-nc-content').innerHTML=buildTable(getFiltered());
    });
  });

  el.querySelector('#div-back')?.addEventListener('click',()=>{divView=null;renderDivisionalTablero();});

  el.querySelector('#div-nc-xlsx')?.addEventListener('click',()=>{
    if(typeof XLSX==='undefined'){alert('XLSX no disponible');return;}
    const data=getFiltered();
    const rows=[['Período','No Conformidad','Observación','Sector','Estado','Detalle','Auditor']];
    data.forEach(x=>rows.push([x.mesLabel,x.pregunta,x.obs||'',x.sector||'',x.cerrada?'Cerrada':'Pendiente',x.detallecierre||x.detalle||'',x.auditor||'']));
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:10},{wch:55},{wch:40},{wch:25},{wch:12},{wch:35},{wch:20}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'NC');
    XLSX.writeFile(wb,`NC_${dep?.nombre||cr}.xlsx`);
  });

  el.querySelector('#div-nc-pdf')?.addEventListener('click',()=>{
    exportDivPDF(`No Conformidades — ${dep?.nombre||cr} (CR ${cr})`,getTableHtmlForExport(getFiltered()));
  });

  el.querySelector('#div-nc-jpg')?.addEventListener('click',async()=>{
    const tabla=el.querySelector('#div-nc-content');
    if(tabla)await exportDivJPG(tabla,`NC_${dep?.nombre||cr}`);
  });
}


} // cierre attachYER

render();
</script>
</body>
</html>
